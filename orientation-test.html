<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>全屏方向锁定测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .status-box {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .status-box div {
            margin: 5px 0;
        }

        .btn {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .error {
            color: #e74c3c;
        }

        .success {
            color: #2ecc71;
        }

        .warning {
            color: #f39c12;
        }

        #log {
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <h2>🧪 全屏方向锁定测试</h2>
    
    <div class="status-box">
        <div>全屏状态: <span id="fs-status">❌ 未全屏</span></div>
        <div>当前方向: <span id="orientation">-</span></div>
        <div>API 支持: <span id="api-support">检测中...</span></div>
        <div>锁定状态: <span id="lock-status">未锁定</span></div>
    </div>

    <button class="btn btn-primary" id="btn-fullscreen">🖥️ 进入全屏</button>
    <button class="btn btn-secondary" id="btn-lock-portrait">📱 锁定竖屏</button>
    <button class="btn btn-secondary" id="btn-lock-landscape">📲 锁定横屏</button>
    <button class="btn btn-danger" id="btn-unlock">🔓 解锁方向</button>

    <div id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        
        function log(msg) {
            const div = document.createElement('div');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        // 检测 API 支持
        function checkSupport() {
            const hasLock = !!(
                screen.orientation?.lock || 
                screen.lockOrientation || 
                screen.webkitLockOrientation ||
                screen.mozLockOrientation ||
                screen.msLockOrientation
            );
            
            const hasFullscreen = !!(
                document.documentElement.requestFullscreen ||
                document.documentElement.webkitRequestFullscreen
            );
            
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            
            const supportEl = document.getElementById('api-support');
            if (isIOS) {
                supportEl.innerHTML = '<span class="error">❌ iOS 不支持（浏览器限制）</span>';
                log('警告：iOS Safari 不支持 Screen Orientation Lock API');
            } else if (hasLock && hasFullscreen) {
                supportEl.innerHTML = '<span class="success">✅ 支持</span>';
            } else {
                supportEl.innerHTML = '<span class="error">❌ 不支持</span>';
            }
            
            log(`检测：lock=${hasLock}, fullscreen=${hasFullscreen}, iOS=${isIOS}`);
        }

        // 更新方向显示
        function updateOrientation() {
            const type = screen.orientation?.type || 'unknown';
            const angle = screen.orientation?.angle || 0;
            document.getElementById('orientation').textContent = `${type} (${angle}°)`;
            log(`方向变化: ${type}`);
        }

        // 更新全屏状态
        function updateFullscreen() {
            const isFullscreen = !!(
                document.fullscreenElement || 
                document.webkitFullscreenElement
            );
            document.getElementById('fs-status').textContent = isFullscreen ? '✅ 已全屏' : '❌ 未全屏';
            return isFullscreen;
        }

        // 进入全屏
        async function enterFullscreen() {
            try {
                const el = document.documentElement;
                if (el.requestFullscreen) {
                    await el.requestFullscreen();
                } else if (el.webkitRequestFullscreen) {
                    await el.webkitRequestFullscreen();
                }
                log('✅ 进入全屏成功');
            } catch (err) {
                log(`❌ 进入全屏失败: ${err.message}`);
            }
        }

        // 锁定方向（核心函数）
        async function lockOrientation(orientation) {
            try {
                // 必须先全屏
                if (!updateFullscreen()) {
                    log('❌ 错误：必须先进入全屏才能锁定方向');
                    alert('请先点击"进入全屏"按钮');
                    return;
                }

                // 尝试各种 API
                if (screen.orientation?.lock) {
                    await screen.orientation.lock(orientation);
                    log(`✅ 锁定成功: ${orientation}`);
                    document.getElementById('lock-status').textContent = `已锁定 ${orientation}`;
                } else if (screen.lockOrientation) {
                    screen.lockOrientation(orientation);
                    log(`✅ 锁定成功 (legacy): ${orientation}`);
                } else if (screen.webkitLockOrientation) {
                    screen.webkitLockOrientation(orientation);
                    log(`✅ 锁定成功 (webkit): ${orientation}`);
                } else {
                    throw new Error('API 不可用');
                }
            } catch (err) {
                log(`❌ 锁定失败: ${err.message}`);
                document.getElementById('lock-status').textContent = `锁定失败: ${err.message}`;
            }
        }

        // 解锁
        function unlock() {
            try {
                if (screen.orientation?.unlock) {
                    screen.orientation.unlock();
                } else if (screen.unlockOrientation) {
                    screen.unlockOrientation();
                }
                log('🔓 已解锁方向');
                document.getElementById('lock-status').textContent = '未锁定';
            } catch (err) {
                log(`解锁错误: ${err.message}`);
            }
        }

        // 事件绑定
        document.getElementById('btn-fullscreen').addEventListener('click', enterFullscreen);
        document.getElementById('btn-lock-portrait').addEventListener('click', () => lockOrientation('portrait-primary'));
        document.getElementById('btn-lock-landscape').addEventListener('click', () => lockOrientation('landscape-primary'));
        document.getElementById('btn-unlock').addEventListener('click', unlock);

        // 监听变化
        screen.orientation?.addEventListener('change', updateOrientation);
        document.addEventListener('fullscreenchange', () => {
            updateFullscreen();
            if (!updateFullscreen()) {
                document.getElementById('lock-status').textContent = '未锁定（退出全屏）';
            }
        });

        // 初始化
        checkSupport();
        updateOrientation();
        updateFullscreen();
        log('页面加载完成，请测试');
    </script>
</body>
</html>
