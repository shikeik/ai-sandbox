<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Layout Lab - 虚拟手机布局系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ========== 布局实验室控制面板 ========== */
        #lab-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 200px;
            max-height: 90vh;
            overflow-y: auto;
        }

        #lab-controls h3 {
            font-size: 14px;
            margin-bottom: 5px;
            color: #4ecdc4;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mode-btn, .action-btn {
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mode-btn:hover, .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .mode-btn.active {
            background: #4ecdc4;
            color: #000;
            border-color: #4ecdc4;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: bold;
            margin-top: 5px;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.exit {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .status-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            margin-left: 8px;
        }

        .status-badge.active {
            background: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        .info-panel {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
            font-family: monospace;
        }

        .warning-text {
            color: #f39c12;
            font-size: 10px;
            margin-top: 5px;
            line-height: 1.4;
        }

        /* ========== 物理容器（真实屏幕） ========== */
        #physical-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ========== 虚拟手机（1080x1920） ========== */
        #virtual-phone {
            width: 1080px;
            height: 1920px;
            background: #0f0f1e;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
            transform-origin: center center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* PC 手机壳样式 */
        .phone-frame {
            border: 12px solid #2c3e50;
            border-radius: 40px;
            box-shadow: 
                0 0 0 2px #34495e,
                0 20px 60px rgba(0, 0, 0, 0.6),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* ========== 卡片布局系统 ========== */
        #card-stack {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 5%;  /* 10% margin 分摊到上下左右 */
            gap: 3%;      /* 间隙 */
        }

        .card {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 高度比例：35% / 35% / 20% （剩余10%是padding和gap） */
        #card-debug { height: 35%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        #card-game { height: 35%; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        #card-control { height: 20%; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }

        .card-header {
            padding: 20px 30px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-content {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 模拟游戏画面 */
        .game-simulator {
            width: 90%;
            height: 80%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .fox-avatar {
            width: 80px;
            height: 80px;
            background: #e67e22;
            border-radius: 50%;
            position: absolute;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        /* 模拟神经网络可视化 */
        .neuron-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 80%;
        }

        .neuron-node {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* 控制按钮模拟 */
        .control-grid {
            display: flex;
            gap: 40px;
        }

        .control-btn {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .control-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.3);
        }

        /* 方向指示器 */
        #orientation-indicator {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            z-index: 10000;
            color: #4ecdc4;
        }

        /* 触摸测试点 */
        .touch-dot {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 0, 0.8);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1000;
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }

        /* 全屏按钮特殊样式 */
        #fullscreen-btn {
            position: relative;
            overflow: hidden;
        }

        #fullscreen-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        #fullscreen-btn:hover::before {
            left: 100%;
        }
    </style>
</head>
<body>

    <!-- 方向指示器 -->
    <div id="orientation-indicator">
        <div>物理: <span id="phys-size">-</span></div>
        <div>逻辑: <span id="logic-size">1080x1920</span></div>
        <div>模式: <span id="current-mode">-</span></div>
        <div>缩放: <span id="scale-ratio">-</span></div>
        <div>全屏: <span id="fullscreen-status">❌ 未全屏</span></div>
    </div>

    <!-- 实验室控制面板 -->
    <div id="lab-controls">
        <h3>🧪 布局实验室</h3>
        
        <!-- 全屏控制按钮 -->
        <button class="action-btn" id="fullscreen-btn" onclick="fullscreenManager.toggle()">
            <span>🖥️ 进入全屏</span>
            <span class="status-badge" id="fs-badge"></span>
        </button>
        <button class="action-btn exit hidden" id="exit-fs-btn" onclick="fullscreenManager.exit()" style="display: none;">
            <span>❌ 退出全屏</span>
        </button>
        
        <div class="warning-text" id="fs-warning">
            提示：iOS Safari 不支持全屏 API，请使用"添加到主屏幕"获得类似体验
        </div>

        <div style="height: 1px; background: rgba(255,255,255,0.1); margin: 10px 0;"></div>

        <button class="mode-btn active" onclick="layoutEngine.setMode('auto')">自动检测</button>
        <button class="mode-btn" onclick="layoutEngine.setMode('portrait')">强制竖屏</button>
        <button class="mode-btn" onclick="layoutEngine.setMode('landscape')">强制横屏(旋转)</button>
        <button class="mode-btn" onclick="layoutEngine.setMode('desktop')">PC手机壳</button>
        
        <div class="info-panel">
            <div>点击卡片测试坐标转换</div>
            <div>黄色圆点 = 触摸位置</div>
            <div style="margin-top: 8px; color: #4ecdc4;">全屏后自动锁定竖屏</div>
        </div>
    </div>

    <!-- 物理容器 -->
    <div id="physical-container">
        <!-- 虚拟手机（1080x1920 逻辑像素） -->
        <div id="virtual-phone" class="phone-frame">
            <div id="card-stack">
                
                <!-- 卡片1: 调试/神经元区域 (35%) -->
                <div id="card-debug" class="card">
                    <div class="card-header">🧠 神经网络可视化 (35%)</div>
                    <div class="card-content">
                        <div class="neuron-grid">
                            <div class="neuron-node">N1</div>
                            <div class="neuron-node">N2</div>
                            <div class="neuron-node">N3</div>
                        </div>
                    </div>
                </div>

                <!-- 卡片2: 游戏区域 (35%) -->
                <div id="card-game" class="card">
                    <div class="card-header">🎮 游戏区域 (35%)</div>
                    <div class="card-content">
                        <div class="game-simulator" id="game-area">
                            <div class="fox-avatar" id="fox">🦊</div>
                            <div style="position: absolute; bottom: 20px; color: rgba(255,255,255,0.5); font-size: 18px;">
                                点击移动狐狸 | 双指拖动切换视图
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 卡片3: 控制区域 (20%) -->
                <div id="card-control" class="card">
                    <div class="card-header">🎮 操作控制 (20%)</div>
                    <div class="card-content">
                        <div class="control-grid">
                            <div class="control-btn" onclick="gameLogic.move('left')">⬅️</div>
                            <div class="control-btn" onclick="gameLogic.jump()">⬆️</div>
                            <div class="control-btn" onclick="gameLogic.move('right')">➡️</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        /**
         * 全屏管理器 - FullscreenManager
         * 处理跨浏览器全屏 API 和屏幕方向锁定
         */
        class FullscreenManager {
            constructor() {
                this.isFullscreen = false;
                this.isSupported = this.checkSupport();
                this.init();
            }

            init() {
                // 监听全屏状态变化
                const events = ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'];
                events.forEach(event => {
                    document.addEventListener(event, () => this.onChange(), false);
                });

                // 更新 UI
                this.updateUI();
            }

            checkSupport() {
                const doc = document.documentElement;
                return !!(
                    doc.requestFullscreen ||
                    doc.webkitRequestFullscreen ||
                    doc.mozRequestFullScreen ||
                    doc.msRequestFullscreen
                );
            }

            /**
             * 进入全屏（跨浏览器兼容）
             */
            async enter() {
                const doc = document.documentElement;
                
                try {
                    if (doc.requestFullscreen) {
                        await doc.requestFullscreen();
                    } else if (doc.webkitRequestFullscreen) {
                        await doc.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
                    } else if (doc.mozRequestFullScreen) {
                        await doc.mozRequestFullScreen();
                    } else if (doc.msRequestFullscreen) {
                        await doc.msRequestFullscreen();
                    } else {
                        throw new Error('Fullscreen API not supported');
                    }

                    // 全屏成功后尝试锁定竖屏
                    setTimeout(() => this.lockOrientation(), 100);
                    
                } catch (err) {
                    console.warn('进入全屏失败:', err);
                    alert('进入全屏失败，请确保是通过点击按钮触发');
                }
            }

            /**
             * 退出全屏
             */
            async exit() {
                try {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        await document.webkitExitFullscreen();
                    } else if (document.mozCancelFullScreen) {
                        await document.mozCancelFullScreen();
                    } else if (document.msExitFullscreen) {
                        await document.msExitFullscreen();
                    }
                } catch (err) {
                    console.warn('退出全屏失败:', err);
                }
            }

            toggle() {
                if (this.isFullscreen) {
                    this.exit();
                } else {
                    this.enter();
                }
            }

            /**
             * 锁定屏幕方向为竖屏（必须在全屏后调用）
             */
            async lockOrientation() {
                try {
                    if (screen.orientation && screen.orientation.lock) {
                        await screen.orientation.lock('portrait-primary');
                        console.log('✅ 屏幕方向已锁定为竖屏');
                    } else if (screen.lockOrientation) {
                        // 旧版 API
                        screen.lockOrientation('portrait-primary');
                    } else if (screen.webkitLockOrientation) {
                        screen.webkitLockOrientation('portrait-primary');
                    } else if (screen.mozLockOrientation) {
                        screen.mozLockOrientation('portrait-primary');
                    } else if (screen.msLockOrientation) {
                        screen.msLockOrientation('portrait-primary');
                    } else {
                        console.warn('屏幕方向锁定不支持');
                    }
                } catch (err) {
                    console.warn('锁定屏幕方向失败:', err);
                }
            }

            /**
             * 解锁屏幕方向
             */
            unlockOrientation() {
                try {
                    if (screen.orientation && screen.orientation.unlock) {
                        screen.orientation.unlock();
                    } else if (screen.unlockOrientation) {
                        screen.unlockOrientation();
                    } else if (screen.webkitUnlockOrientation) {
                        screen.webkitUnlockOrientation();
                    } else if (screen.mozUnlockOrientation) {
                        screen.mozUnlockOrientation();
                    } else if (screen.msUnlockOrientation) {
                        screen.msUnlockOrientation();
                    }
                } catch (err) {
                    console.warn('解锁屏幕方向失败:', err);
                }
            }

            onChange() {
                const fullscreenElement = 
                    document.fullscreenElement ||
                    document.webkitFullscreenElement ||
                    document.mozFullScreenElement ||
                    document.msFullscreenElement;

                this.isFullscreen = !!fullscreenElement;
                this.updateUI();
                
                // 通知布局引擎重新计算
                if (layoutEngine) {
                    setTimeout(() => layoutEngine.handleFullscreenChange(this.isFullscreen), 100);
                }

                // 如果退出全屏，解锁方向
                if (!this.isFullscreen) {
                    this.unlockOrientation();
                }
            }

            updateUI() {
                const enterBtn = document.getElementById('fullscreen-btn');
                const exitBtn = document.getElementById('exit-fs-btn');
                const badge = document.getElementById('fs-badge');
                const status = document.getElementById('fullscreen-status');
                const warning = document.getElementById('fs-warning');

                if (this.isFullscreen) {
                    enterBtn.style.display = 'none';
                    exitBtn.style.display = 'flex';
                    badge.classList.add('active');
                    status.innerHTML = '✅ 已全屏';
                    status.style.color = '#2ecc71';
                } else {
                    enterBtn.style.display = 'flex';
                    exitBtn.style.display = 'none';
                    badge.classList.remove('active');
                    status.innerHTML = '❌ 未全屏';
                    status.style.color = '#e74c3c';
                }

                // iOS 警告
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                if (isIOS) {
                    warning.style.display = 'block';
                    warning.textContent = 'iOS 不支持全屏 API，请使用"添加到主屏幕"并从中打开以获得全屏体验';
                } else if (!this.isSupported) {
                    warning.style.display = 'block';
                    warning.textContent = '您的浏览器不支持全屏 API';
                } else {
                    warning.style.display = 'none';
                }
            }
        }

        /**
         * 布局引擎 - LayoutEngine
         * 核心职责：将物理屏幕适配到 1080x1920 虚拟手机
         */
        class LayoutEngine {
            constructor() {
                this.virtualWidth = 1080;
                this.virtualHeight = 1920;
                this.mode = 'auto';
                this.physWidth = window.innerWidth;
                this.physHeight = window.innerHeight;
                this.isFullscreen = false;
                
                this.els = {
                    phone: document.getElementById('virtual-phone'),
                    container: document.getElementById('physical-container'),
                    indicator: {
                        phys: document.getElementById('phys-size'),
                        logic: document.getElementById('logic-size'),
                        mode: document.getElementById('current-mode'),
                        scale: document.getElementById('scale-ratio')
                    }
                };

                this.init();
            }

            init() {
                this.detect();
                this.bindEvents();
                this.setupInputTransformation();
            }

            bindEvents() {
                window.addEventListener('resize', () => {
                    this.physWidth = window.innerWidth;
                    this.physHeight = window.innerHeight;
                    if (this.mode === 'auto') this.detect();
                    else this.applyMode(this.mode);
                });

                window.addEventListener('orientationchange', () => {
                    setTimeout(() => {
                        this.physWidth = window.innerWidth;
                        this.physHeight = window.innerHeight;
                        if (this.mode === 'auto') this.detect();
                    }, 300); // iOS 需要更长的延迟
                });
            }

            handleFullscreenChange(isFullscreen) {
                this.isFullscreen = isFullscreen;
                // 全屏变化后重新检测布局
                setTimeout(() => {
                    this.physWidth = window.innerWidth;
                    this.physHeight = window.innerHeight;
                    if (this.mode === 'auto') this.detect();
                    else this.applyMode(this.mode);
                }, 100);
            }

            /**
             * 自动检测设备类型和方向
             */
            detect() {
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                const isLandscape = this.physWidth > this.physHeight;
                
                // 全屏模式下的特殊处理
                if (this.isFullscreen && isLandscape) {
                    // 全屏时如果是横屏，使用旋转模式
                    this.applyMode('landscape');
                    return;
                }

                if (!isMobile && this.physWidth > 1024) {
                    this.applyMode('desktop');
                } else if (isLandscape) {
                    this.applyMode('landscape');
                } else {
                    this.applyMode('portrait');
                }
            }

            setMode(mode) {
                this.mode = mode;
                
                // 更新按钮状态
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.textContent.includes(this.getModeLabel(mode))) {
                        btn.classList.add('active');
                    }
                });
                
                this.applyMode(mode);
            }

            getModeLabel(mode) {
                const labels = {
                    'auto': '自动',
                    'portrait': '竖屏',
                    'landscape': '横屏',
                    'desktop': 'PC'
                };
                return labels[mode] || mode;
            }

            /**
             * 应用特定模式
             */
            applyMode(mode) {
                const phone = this.els.phone;
                
                this.els.indicator.mode.textContent = mode.toUpperCase();
                this.els.indicator.phys.textContent = `${this.physWidth}x${this.physHeight}`;

                switch(mode) {
                    case 'portrait':
                        this.applyPortrait(phone);
                        break;
                    
                    case 'landscape':
                        this.applyLandscape(phone);
                        break;
                    
                    case 'desktop':
                        this.applyDesktop(phone);
                        break;
                    
                    default:
                        this.detect();
                }
            }

            applyPortrait(phone) {
                // 计算缩放：让虚拟手机高度填满物理屏幕的 95%
                const scale = Math.min(
                    this.physWidth / this.virtualWidth,
                    this.physHeight / this.virtualHeight
                ) * 0.95;

                phone.style.transform = `scale(${scale})`;
                phone.className = 'phone-frame';
                
                this.els.indicator.scale.textContent = `${(scale*100).toFixed(1)}%`;
                this.currentTransform = { scale, rotate: 0 };
            }

            applyLandscape(phone) {
                // 物理横屏但显示竖屏内容：旋转90度
                const scale = Math.min(
                    this.physHeight / this.virtualWidth,
                    this.physWidth / this.virtualHeight
                ) * 0.95;

                // rotate(90deg) 让竖屏内容在横屏上显示
                phone.style.transform = `rotate(90deg) scale(${scale})`;
                phone.className = 'phone-frame rotated-mode';
                
                this.els.indicator.scale.textContent = `${(scale*100).toFixed(1)}% (rotated)`;
                this.currentTransform = { scale, rotate: 90 };
            }

            applyDesktop(phone) {
                // PC端：居中显示手机壳
                const maxWidth = this.physWidth * 0.4;
                const scale = maxWidth / this.virtualWidth;
                
                phone.style.transform = `scale(${scale})`;
                phone.className = 'phone-frame desktop-mode';
                
                this.els.indicator.scale.textContent = `${(scale*100).toFixed(1)}% (desktop)`;
                this.currentTransform = { scale, rotate: 0 };
            }

            /**
             * 设置输入坐标转换
             */
            setupInputTransformation() {
                const cards = document.querySelectorAll('.card');
                cards.forEach(card => {
                    card.addEventListener('touchstart', (e) => this.handleInput(e), {passive: false});
                    card.addEventListener('click', (e) => this.handleInput(e));
                });

                const gameArea = document.getElementById('game-area');
                gameArea.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const logicPos = this.transformCoordinates(touch.clientX, touch.clientY);
                    this.showTouchIndicator(logicPos.x, logicPos.y);
                    gameLogic.moveTo(logicPos.x, logicPos.y);
                });
            }

            transformCoordinates(clientX, clientY) {
                const phone = this.els.phone;
                const rect = phone.getBoundingClientRect();
                
                let x = clientX - rect.left;
                let y = clientY - rect.top;
                
                if (this.currentTransform?.rotate === 90) {
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const newDx = dy;
                    const newDy = -dx;
                    x = centerX + newDx;
                    y = centerY + newDy;
                }
                
                const scale = this.currentTransform?.scale || 1;
                x = x / scale;
                y = y / scale;
                
                return { x, y };
            }

            showTouchIndicator(x, y) {
                const dot = document.createElement('div');
                dot.className = 'touch-dot';
                dot.style.left = x + 'px';
                dot.style.top = y + 'px';
                document.getElementById('virtual-phone').appendChild(dot);
                setTimeout(() => dot.remove(), 1000);
            }

            handleInput(e) {
                if (e.type === 'touchstart') e.preventDefault();
            }
        }

        /**
         * 游戏逻辑模拟
         */
        const gameLogic = {
            fox: document.getElementById('fox'),
            
            moveTo(x, y) {
                const gameArea = document.getElementById('game-area');
                const relX = (x / 1080) * 100;
                const relY = (y / 1920) * 100;
                
                this.fox.style.left = `calc(${relX}% - 40px)`;
                this.fox.style.top = `calc(${relY}% - 40px)`;
            },

            move(direction) {
                const currentLeft = parseFloat(this.fox.style.left) || 50;
                const step = 10;
                
                if (direction === 'left') {
                    this.fox.style.left = Math.max(10, currentLeft - step) + '%';
                } else if (direction === 'right') {
                    this.fox.style.left = Math.min(90, currentLeft + step) + '%';
                }
            },

            jump() {
                this.fox.style.transform = 'translateY(-50px)';
                setTimeout(() => {
                    this.fox.style.transform = 'translateY(0)';
                }, 300);
            }
        };

        // 初始化
        const fullscreenManager = new FullscreenManager();
        const layoutEngine = new LayoutEngine();
        
        window.addEventListener('load', () => {
            layoutEngine.detect();
        });
    </script>
</body>
</html>
