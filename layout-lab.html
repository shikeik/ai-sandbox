<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Layout Lab - 重构版</title>
    <style>
        /* ===== 设计令牌 (Design Tokens) ===== */
        :root {
            /* 颜色系统 */
            --color-bg: #1a1a2e;
            --color-surface: #0f0f1e;
            --color-surface-elevated: rgba(0, 0, 0, 0.9);
            --color-primary: #4ecdc4;
            --color-secondary: #f39c12;
            --color-success: #2ecc71;
            --color-danger: #e74c3c;
            --color-text: #ffffff;
            --color-text-muted: rgba(255, 255, 255, 0.6);
            --color-border: rgba(255, 255, 255, 0.1);
            
            /* 尺寸系统 */
            --phone-w: 1080px;
            --phone-h: 1920px;
            --drawer-w: 220px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 40px;
            
            /* 动画 */
            --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
            --duration-fast: 0.2s;
            --duration-normal: 0.3s;
        }

        /* ===== 重置与基础 ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== 布局层 (Layout Layer) ===== */
        .l-app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .l-viewport {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ===== 虚拟手机组件 (VirtualPhone) ===== */
        .c-virtual-phone {
            width: var(--phone-w);
            height: var(--phone-h);
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 0 2px rgba(255,255,255,0.1),
                0 20px 60px rgba(0,0,0,0.6),
                inset 0 0 40px rgba(0,0,0,0.3);
            transform-origin: center center;
            will-change: transform;
            transition: transform var(--duration-normal) var(--ease-out);
        }

        .c-virtual-phone--framed {
            border: 12px solid #2c3e50;
        }

        /* ===== 卡片堆叠组件 (CardStack) ===== */
        .c-card-stack {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 5%;
            gap: 3%;
        }

        .c-card {
            width: 100%;
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .c-card__header {
            padding: 20px 30px;
            font-size: 24px;
            font-weight: 600;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--color-border);
        }

        .c-card__content {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 卡片变体 - 高度比例 */
        .c-card--debug { height: 35%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .c-card--game { height: 35%; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .c-card--control { height: 20%; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }

        /* ===== 抽屉组件 (Drawer) - 完全自包含 ===== */
        .c-drawer {
            position: fixed;
            top: 10px;
            right: 10px;
            width: var(--drawer-w);
            background: var(--color-surface-elevated);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            z-index: 1000;
            transition: transform var(--duration-normal) var(--ease-out);
        }

        .c-drawer--collapsed {
            transform: translateX(calc(100% - 40px));
        }

        .c-drawer__handle {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translate(-100%, -50%);
            width: 32px;
            height: 50px;
            background: inherit;
            border-radius: var(--radius-sm) 0 0 var(--radius-sm);
            border: 1px solid var(--color-border);
            border-right: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            transition: background var(--duration-fast);
        }

        .c-drawer__handle:hover {
            background: rgba(255,255,255,0.1);
        }

        .c-drawer__handle-icon {
            transition: transform var(--duration-normal) var(--ease-out);
            font-size: 12px;
        }

        .c-drawer--collapsed .c-drawer__handle-icon {
            transform: rotate(180deg);
        }

        .c-drawer__content {
            padding: 15px;
            opacity: 1;
            transition: opacity var(--duration-fast);
        }

        .c-drawer--collapsed .c-drawer__content {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== 按钮组件 (Button) ===== */
        .c-btn {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 8px;
            border: 1px solid var(--color-border);
            background: rgba(255,255,255,0.1);
            color: var(--color-text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            transition: all var(--duration-fast);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .c-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
        }

        .c-btn--primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: 600;
        }

        .c-btn--primary:hover {
            filter: brightness(1.1);
        }

        .c-btn--danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
        }

        .c-status-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-danger);
            transition: background var(--duration-fast);
        }

        .c-status-badge--active {
            background: var(--color-success);
            box-shadow: 0 0 8px var(--color-success);
        }

        /* ===== 信息面板组件 (InfoPanel) ===== */
        .c-info-panel {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--color-border);
            font-size: 11px;
            color: var(--color-text-muted);
            font-family: monospace;
            line-height: 1.6;
        }

        .c-info-panel__row {
            display: flex;
            justify-content: space-between;
        }

        .c-info-panel__label {
            color: var(--color-text-muted);
        }

        .c-info-panel__value {
            color: var(--color-primary);
        }

        /* ===== 游戏模拟组件 (GameSimulator) ===== */
        .c-game-simulator {
            width: 90%;
            height: 80%;
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
        }

        .c-fox {
            width: 80px;
            height: 80px;
            background: #e67e22;
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            user-select: none;
        }

        .c-fox--jumping {
            animation: fox-jump 0.3s ease;
        }

        @keyframes fox-jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-50px); }
        }

        .c-control-grid {
            display: flex;
            gap: 40px;
        }

        .c-control-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .c-control-btn:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.25);
        }

        /* ===== 神经元可视化组件 (NeuronVisualizer) ===== */
        .c-neuron-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 80%;
        }

        .c-neuron-node {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: neuron-pulse 2s infinite;
            border: 2px solid rgba(255,255,255,0.1);
        }

        @keyframes neuron-pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* ===== 触摸指示器 (TouchIndicator) ===== */
        .c-touch-dot {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 0, 0.8);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1000;
            animation: touch-fade 1s forwards;
        }

        @keyframes touch-fade {
            to { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }

        /* ===== 警告提示 (Alert) ===== */
        .c-alert {
            margin-top: 10px;
            padding: 8px;
            background: rgba(243, 156, 18, 0.2);
            border: 1px solid rgba(243, 156, 18, 0.3);
            border-radius: var(--radius-sm);
            font-size: 10px;
            color: #f39c12;
            line-height: 1.4;
        }

        .c-alert--hidden {
            display: none;
        }

        /* ===== 工具类 (Utilities) ===== */
        .u-text-center { text-align: center; }
        .u-text-muted { color: var(--color-text-muted); }
        .u-text-small { font-size: 0.85em; }
        .u-mt-sm { margin-top: 8px; }
        .u-hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app" class="l-app">
        <!-- 视口层 -->
        <div class="l-viewport" id="viewport">
            <!-- 虚拟手机由 JS 动态创建和管理 -->
        </div>

        <!-- 抽屉由 JS 动态创建 -->
    </div>

    <script type="module">
        /**
         * @typedef {Object} LayoutConfig
         * @property {number} virtualWidth
         * @property {number} virtualHeight
         * @property {number} margin
         */

        /**
         * @typedef {Object} TransformResult
         * @property {number} scale
         * @property {number} rotation
         * @property {string} mode
         */

        /**
         * @typedef {'auto'|'portrait'|'landscape'|'desktop'} LayoutMode
         */

        // ===== 1. 事件总线 (EventBus) - 核心解耦机制 =====
        
        class EventBus {
            /** @type {Map<string, Set<Function>>} */
            #events = new Map();

            /**
             * @param {string} event
             * @param {Function} callback
             * @returns {Function} unsubscribe
             */
            on(event, callback) {
                if (!this.#events.has(event)) {
                    this.#events.set(event, new Set());
                }
                this.#events.get(event).add(callback);
                
                return () => this.off(event, callback);
            }

            /**
             * @param {string} event
             * @param {Function} callback
             */
            off(event, callback) {
                this.#events.get(event)?.delete(callback);
            }

            /**
             * @param {string} event
             * @param {*} data
             */
            emit(event, data) {
                this.#events.get(event)?.forEach(cb => {
                    try {
                        cb(data);
                    } catch (err) {
                        console.error(`Event handler error for ${event}:`, err);
                    }
                });
            }
        }

        const bus = new EventBus();

        // ===== 2. 领域服务 (Domain Services) =====

        /**
         * 布局计算服务 - 纯数学，无DOM操作
         */
        class LayoutService {
            /** @type {LayoutConfig} */
            #config = {
                virtualWidth: 1080,
                virtualHeight: 1920,
                margin: 0.05
            };

            /**
             * 计算布局变换参数
             * @param {number} physWidth
             * @param {number} physHeight
             * @param {LayoutMode} mode
             * @returns {TransformResult}
             */
            calculate(physWidth, physHeight, mode) {
                const { virtualWidth: vw, virtualHeight: vh } = this.#config;
                const isPhysLandscape = physWidth > physHeight;
                
                let scale, rotation, finalMode;

                switch (mode) {
                    case 'desktop':
                        scale = (physWidth * 0.4) / vw;
                        rotation = 0;
                        finalMode = 'desktop';
                        break;
                    
                    case 'landscape':
                        scale = Math.min(physHeight / vw, physWidth / vh) * 0.95;
                        rotation = -90;
                        finalMode = 'landscape';
                        break;
                    
                    case 'portrait':
                        scale = Math.min(physWidth / vw, physHeight / vh) * 0.95;
                        rotation = 0;
                        finalMode = 'portrait';
                        break;
                    
                    case 'auto':
                    default:
                        if (!this.#isMobile() && physWidth > 1024) {
                            scale = (physWidth * 0.4) / vw;
                            rotation = 0;
                            finalMode = 'desktop';
                        } else if (isPhysLandscape) {
                            scale = Math.min(physHeight / vw, physWidth / vh) * 0.95;
                            rotation = -90;
                            finalMode = 'landscape';
                        } else {
                            scale = Math.min(physWidth / vw, physHeight / vh) * 0.95;
                            rotation = 0;
                            finalMode = 'portrait';
                        }
                }

                return { scale, rotation, mode: finalMode };
            }

            /**
             * 坐标转换：物理屏幕 → 虚拟手机逻辑坐标
             * @param {number} clientX
             * @param {number} clientY
             * @param {DOMRect} rect
             * @param {TransformResult} transform
             * @returns {{x: number, y: number}}
             */
            toVirtualCoordinates(clientX, clientY, rect, transform) {
                let x = clientX - rect.left;
                let y = clientY - rect.top;

                // 如果有旋转，需要逆向旋转坐标
                if (transform.rotation === -90) {
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const dx = x - centerX;
                    const dy = y - centerY;
                    // 逆旋转 -90 度
                    const newDx = -dy;
                    const newDy = dx;
                    x = centerX + newDx;
                    y = centerY + newDy;
                }

                x = x / transform.scale;
                y = y / transform.scale;

                return {
                    x: Math.max(0, Math.min(1080, x)),
                    y: Math.max(0, Math.min(1920, y))
                };
            }

            #isMobile() {
                return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            }
        }

        /**
         * 全屏服务 - 封装浏览器差异
         */
        class FullscreenService {
            /**
             * @returns {boolean}
             */
            isSupported() {
                const el = document.documentElement;
                return !!(el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen);
            }

            /**
             * @returns {Promise<void>}
             */
            async enter() {
                const el = document.documentElement;
                try {
                    if (el.requestFullscreen) await el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
                    else if (el.mozRequestFullScreen) await el.mozRequestFullScreen();
                    else if (el.msRequestFullscreen) await el.msRequestFullscreen();
                } catch (err) {
                    throw new Error(`Fullscreen failed: ${err.message}`);
                }
            }

            /**
             * @returns {Promise<void>}
             */
            async exit() {
                try {
                    if (document.exitFullscreen) await document.exitFullscreen();
                    else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
                    else if (document.mozCancelFullScreen) await document.mozCancelFullScreen();
                    else if (document.msExitFullscreen) await document.msExitFullscreen();
                } catch (err) {
                    throw new Error(`Exit fullscreen failed: ${err.message}`);
                }
            }

            /**
             * @returns {boolean}
             */
            isActive() {
                return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
            }

            /**
             * @param {Function} callback
             */
            onChange(callback) {
                ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange']
                    .forEach(evt => document.addEventListener(evt, callback));
            }
        }

        /**
         * 屏幕方向服务
         */
        class OrientationService {
            /**
             * @returns {boolean}
             */
            isSupported() {
                return !!(screen.orientation?.lock || screen.lockOrientation || screen.webkitLockOrientation);
            }

            /**
             * @returns {Promise<void>}
             */
            async lockPortrait() {
                try {
                    if (screen.orientation?.lock) {
                        await screen.orientation.lock('portrait-primary');
                    } else if (screen.lockOrientation) {
                        screen.lockOrientation('portrait-primary');
                    } else if (screen.webkitLockOrientation) {
                        screen.webkitLockOrientation('portrait-primary');
                    }
                } catch (err) {
                    console.warn('Orientation lock failed:', err);
                }
            }

            /**
             * @returns {void}
             */
            unlock() {
                try {
                    if (screen.orientation?.unlock) screen.orientation.unlock();
                    else if (screen.unlockOrientation) screen.unlockOrientation();
                } catch (err) {
                    console.warn('Orientation unlock failed:', err);
                }
            }
        }

        // ===== 3. UI 组件基类与具体实现 =====

        /**
         * 组件基类
         */
        class Component {
            /** @type {HTMLElement} */
            element = null;
            
            /**
             * @param {string} tag
             * @param {string} className
             */
            constructor(tag = 'div', className = '') {
                this.element = document.createElement(tag);
                if (className) this.element.className = className;
            }

            /**
             * @param {HTMLElement} parent
             * @returns {this}
             */
            mount(parent) {
                parent.appendChild(this.element);
                return this;
            }

            /**
             * @returns {void}
             */
            destroy() {
                this.element?.remove();
            }
        }

        /**
         * 抽屉组件 - 完全自包含
         */
        class Drawer extends Component {
            /** @type {boolean} */
            #isOpen = true;
            /** @type {Function} */
            #unsubscribe = null;

            constructor() {
                super('div', 'c-drawer');
                this.#render();
                this.#bindEvents();
                this.#subscribe();
            }

            #render() {
                this.element.innerHTML = `
                    <div class="c-drawer__handle" data-action="toggle">
                        <span class="c-drawer__handle-icon">◀</span>
                    </div>
                    <div class="c-drawer__content">
                        <h3 style="font-size: 14px; margin-bottom: 12px; color: var(--color-primary);">
                            🧪 布局实验室
                        </h3>
                        
                        <button class="c-btn c-btn--primary" id="btn-fullscreen">
                            <span>🖥️ 进入全屏</span>
                            <span class="c-status-badge" id="fs-badge"></span>
                        </button>
                        <button class="c-btn u-hidden" id="btn-exit-fullscreen">
                            <span>❌ 退出全屏</span>
                        </button>
                        
                        <div class="c-alert c-alert--hidden" id="ios-warning">
                            iOS 不支持全屏 API，请使用"添加到主屏幕"
                        </div>

                        <div style="height: 1px; background: var(--color-border); margin: 12px 0;"></div>

                        <button class="c-btn" data-mode="auto">🔄 自动检测</button>
                        <button class="c-btn" data-mode="portrait">📱 强制竖屏</button>
                        <button class="c-btn" data-mode="landscape">📲 强制横屏(旋转)</button>
                        <button class="c-btn" data-mode="desktop">💻 PC手机壳</button>

                        <div class="c-info-panel" id="info-panel">
                            <div class="c-info-panel__row">
                                <span class="c-info-panel__label">物理:</span>
                                <span class="c-info-panel__value" id="info-phys">-</span>
                            </div>
                            <div class="c-info-panel__row">
                                <span class="c-info-panel__label">逻辑:</span>
                                <span class="c-info-panel__value">1080x1920</span>
                            </div>
                            <div class="c-info-panel__row">
                                <span class="c-info-panel__label">模式:</span>
                                <span class="c-info-panel__value" id="info-mode">-</span>
                            </div>
                            <div class="c-info-panel__row">
                                <span class="c-info-panel__label">缩放:</span>
                                <span class="c-info-panel__value" id="info-scale">-</span>
                            </div>
                            <div class="c-info-panel__row">
                                <span class="c-info-panel__label">全屏:</span>
                                <span class="c-info-panel__value" id="info-fullscreen">❌ 否</span>
                            </div>
                        </div>

                        <div class="u-mt-sm u-text-small u-text-muted">
                            点击卡片测试坐标<br>黄色圆点 = 触摸位置
                        </div>
                    </div>
                `;
            }

            #bindEvents() {
                // 抽屉把手
                this.element.querySelector('.c-drawer__handle').addEventListener('click', () => {
                    this.toggle();
                });

                // 全屏按钮
                const fsBtn = this.element.querySelector('#btn-fullscreen');
                const exitBtn = this.element.querySelector('#btn-exit-fullscreen');
                
                fsBtn.addEventListener('click', () => bus.emit('fullscreen:request'));
                exitBtn.addEventListener('click', () => bus.emit('fullscreen:exit'));

                // 模式按钮
                this.element.querySelectorAll('[data-mode]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const mode = e.target.dataset.mode;
                        bus.emit('layout:setMode', mode);
                        this.#updateActiveButton(mode);
                    });
                });
            }

            #subscribe() {
                this.#unsubscribe = bus.on('state:update', (state) => {
                    this.#updateUI(state);
                });
            }

            /**
             * @param {boolean} force
             * @returns {this}
             */
            toggle(force) {
                this.#isOpen = force !== undefined ? force : !this.#isOpen;
                this.element.classList.toggle('c-drawer--collapsed', !this.#isOpen);
                bus.emit('drawer:toggle', this.#isOpen);
                return this;
            }

            /**
             * @private
             */
            #updateActiveButton(activeMode) {
                this.element.querySelectorAll('[data-mode]').forEach(btn => {
                    btn.style.background = btn.dataset.mode === activeMode 
                        ? 'rgba(78, 205, 196, 0.3)' 
                        : '';
                });
            }

            /**
             * @private
             * @param {Object} state
             */
            #updateUI(state) {
                // 更新信息面板
                this.element.querySelector('#info-phys').textContent = 
                    `${state.physical.width}x${state.physical.height}`;
                this.element.querySelector('#info-mode').textContent = 
                    state.layout.mode.toUpperCase();
                this.element.querySelector('#info-scale').textContent = 
                    `${(state.layout.scale * 100).toFixed(1)}%`;
                this.element.querySelector('#info-fullscreen').textContent = 
                    state.fullscreen ? '✅ 是' : '❌ 否';

                // 更新全屏按钮状态
                const fsBtn = this.element.querySelector('#btn-fullscreen');
                const exitBtn = this.element.querySelector('#btn-exit-fullscreen');
                const badge = this.element.querySelector('#fs-badge');
                
                if (state.fullscreen) {
                    fsBtn.classList.add('u-hidden');
                    exitBtn.classList.remove('u-hidden');
                    badge.classList.add('c-status-badge--active');
                } else {
                    fsBtn.classList.remove('u-hidden');
                    exitBtn.classList.add('u-hidden');
                    badge.classList.remove('c-status-badge--active');
                }

                // iOS 警告
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                if (isIOS) {
                    this.element.querySelector('#ios-warning').classList.remove('c-alert--hidden');
                }
            }

            destroy() {
                this.#unsubscribe?.();
                super.destroy();
            }
        }

        /**
         * 虚拟手机组件
         */
        class VirtualPhone extends Component {
            /** @type {LayoutService} */
            #layoutService;
            /** @type {Function} */
            #unsubscribe;

            constructor(layoutService) {
                super('div', 'c-virtual-phone c-virtual-phone--framed');
                this.#layoutService = layoutService;
                this.#render();
                this.#bindEvents();
                this.#subscribe();
            }

            #render() {
                this.element.innerHTML = `
                    <div class="c-card-stack">
                        <div class="c-card c-card--debug" id="card-debug">
                            <div class="c-card__header">🧠 神经网络 (35%)</div>
                            <div class="c-card__content">
                                <div class="c-neuron-grid">
                                    <div class="c-neuron-node">N1</div>
                                    <div class="c-neuron-node">N2</div>
                                    <div class="c-neuron-node">N3</div>
                                </div>
                            </div>
                        </div>
                        <div class="c-card c-card--game" id="card-game">
                            <div class="c-card__header">🎮 游戏区域 (35%)</div>
                            <div class="c-card__content">
                                <div class="c-game-simulator" id="game-area">
                                    <div class="c-fox" id="fox" style="left: 50%; top: 50%;">🦊</div>
                                    <div style="position: absolute; bottom: 10px; font-size: 14px;" class="u-text-muted">
                                        点击移动狐狸 | 双指拖动切换视图
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="c-card c-card--control" id="card-control">
                            <div class="c-card__header">🎮 操作控制 (20%)</div>
                            <div class="c-card__content">
                                <div class="c-control-grid">
                                    <div class="c-control-btn" data-action="move-left">⬅️</div>
                                    <div class="c-control-btn" data-action="jump">⬆️</div>
                                    <div class="c-control-btn" data-action="move-right">➡️</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            #bindEvents() {
                // 游戏区域触摸 - 坐标转换测试
                const gameArea = this.element.querySelector('#game-area');
                gameArea.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.#handleGameTouch(touch.clientX, touch.clientY);
                }, { passive: false });

                gameArea.addEventListener('click', (e) => {
                    this.#handleGameTouch(e.clientX, e.clientY);
                });

                // 控制按钮
                this.element.querySelectorAll('.c-control-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const action = e.target.dataset.action;
                        bus.emit(`game:${action}`);
                    });
                });
            }

            #subscribe() {
                this.#unsubscribe = bus.on('layout:transform', (transform) => {
                    this.#applyTransform(transform);
                });
            }

            /**
             * @private
             * @param {TransformResult} transform
             */
            #applyTransform(transform) {
                const transformStr = transform.rotation 
                    ? `rotate(${transform.rotation}deg) scale(${transform.scale})`
                    : `scale(${transform.scale})`;
                
                this.element.style.transform = transformStr;
            }

            /**
             * @private
             * @param {number} clientX
             * @param {number} clientY
             */
            #handleGameTouch(clientX, clientY) {
                const rect = this.element.getBoundingClientRect();
                const state = window.__APP_STATE__; // 临时获取当前状态，实际应通过事件传递
                if (!state) return;

                const virtualPos = this.#layoutService.toVirtualCoordinates(
                    clientX, clientY, rect, state.layout
                );

                // 显示触摸点
                this.#showTouchIndicator(virtualPos.x, virtualPos.y);
                
                // 移动狐狸
                bus.emit('game:moveTo', virtualPos);
            }

            /**
             * @private
             * @param {number} x - 虚拟坐标x
             * @param {number} y - 虚拟坐标y
             */
            #showTouchIndicator(x, y) {
                const dot = document.createElement('div');
                dot.className = 'c-touch-dot';
                dot.style.left = x + 'px';
                dot.style.top = y + 'px';
                this.element.appendChild(dot);
                setTimeout(() => dot.remove(), 1000);
            }

            /**
             * @returns {HTMLElement}
             */
            getFoxElement() {
                return this.element.querySelector('#fox');
            }
        }

        // ===== 4. 游戏逻辑控制器 =====

        class GameController {
            /** @type {HTMLElement} */
            #foxEl;
            /** @type {{x: number, y: number}} */
            #position = { x: 50, y: 50 }; // 百分比

            constructor(foxElement) {
                this.#foxEl = foxElement;
                this.#bindEvents();
            }

            #bindEvents() {
                bus.on('game:move-left', () => this.move('left'));
                bus.on('game:move-right', () => this.move('right'));
                bus.on('game:jump', () => this.jump());
                bus.on('game:moveTo', (pos) => this.moveTo(pos));
            }

            move(direction) {
                const step = 10;
                if (direction === 'left') {
                    this.#position.x = Math.max(10, this.#position.x - step);
                } else {
                    this.#position.x = Math.min(90, this.#position.x + step);
                }
                this.#render();
            }

            jump() {
                this.#foxEl.classList.add('c-fox--jumping');
                setTimeout(() => {
                    this.#foxEl.classList.remove('c-fox--jumping');
                }, 300);
            }

            moveTo(pos) {
                // 将虚拟坐标转为百分比
                this.#position.x = (pos.x / 1080) * 100;
                this.#position.y = (pos.y / 1920) * 100;
                this.#render();
            }

            #render() {
                this.#foxEl.style.left = `${this.#position.x}%`;
                this.#foxEl.style.top = `${this.#position.y}%`;
                this.#foxEl.style.transform = 'translate(-50%, -50%)';
            }
        }

        // ===== 5. 应用主控制器 (App Controller) =====

        class App {
            /** @type {LayoutService} */
            #layoutService;
            /** @type {FullscreenService} */
            #fullscreenService;
            /** @type {OrientationService} */
            #orientationService;
            /** @type {Drawer} */
            #drawer;
            /** @type {VirtualPhone} */
            #virtualPhone;
            /** @type {GameController} */
            #game;
            
            /** @type {LayoutMode} */
            #currentMode = 'auto';
            /** @type {boolean} */
            #isFullscreen = false;

            constructor() {
                this.#layoutService = new LayoutService();
                this.#fullscreenService = new FullscreenService();
                this.#orientationService = new OrientationService();
                
                this.#init();
            }

            #init() {
                // 初始化 UI
                const appEl = document.getElementById('app');
                const viewportEl = document.getElementById('viewport');

                this.#drawer = new Drawer().mount(appEl);
                this.#virtualPhone = new VirtualPhone(this.#layoutService).mount(viewportEl);
                this.#game = new GameController(this.#virtualPhone.getFoxElement());

                // 绑定全局事件
                this.#bindBusEvents();
                this.#bindWindowEvents();
                
                // 初始布局
                this.#updateLayout();
                
                // 默认收起抽屉
                setTimeout(() => this.#drawer.toggle(false), 500);
            }

            #bindBusEvents() {
                // 全屏控制
                bus.on('fullscreen:request', () => this.#enterFullscreen());
                bus.on('fullscreen:exit', () => this.#exitFullscreen());
                
                // 布局控制
                bus.on('layout:setMode', (mode) => {
                    this.#currentMode = mode;
                    this.#updateLayout();
                });
            }

            #bindWindowEvents() {
                window.addEventListener('resize', () => {
                    this.#updateLayout();
                });

                this.#fullscreenService.onChange(() => {
                    this.#isFullscreen = this.#fullscreenService.isActive();
                    if (this.#isFullscreen) {
                        this.#orientationService.lockPortrait();
                    } else {
                        this.#orientationService.unlock();
                    }
                    this.#emitState();
                });
            }

            async #enterFullscreen() {
                try {
                    await this.#fullscreenService.enter();
                } catch (err) {
                    console.error('Fullscreen failed:', err);
                    alert('进入全屏失败，请确保是通过点击按钮触发');
                }
            }

            async #exitFullscreen() {
                try {
                    await this.#fullscreenService.exit();
                } catch (err) {
                    console.error('Exit fullscreen failed:', err);
                }
            }

            #updateLayout() {
                const physWidth = window.innerWidth;
                const physHeight = window.innerHeight;
                
                const transform = this.#layoutService.calculate(
                    physWidth, 
                    physHeight, 
                    this.#currentMode
                );

                // 发布布局变换
                bus.emit('layout:transform', transform);
                
                // 保存状态供坐标转换使用
                window.__APP_STATE__ = {
                    physical: { width: physWidth, height: physHeight },
                    layout: transform,
                    fullscreen: this.#isFullscreen
                };

                this.#emitState();
            }

            #emitState() {
                bus.emit('state:update', window.__APP_STATE__);
            }
        }

        // ===== 6. 启动应用 =====
        
        document.addEventListener('DOMContentLoaded', () => {
            new App();
        });
    </script>
</body>
