<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.75, user-scalable=no, viewport-fit=cover">
    <title>Layout Lab - 重构版</title>
    <style>
        /* ===== 设计令牌 (Design Tokens) ===== */
        :root {
            /* 颜色系统 */
            --color-bg: #1a1a2e;
            --color-surface: #0f0f1e;
            --color-surface-elevated: rgba(0, 0, 0, 0.9);
            --color-primary: #4ecdc4;
            --color-secondary: #f39c12;
            --color-success: #2ecc71;
            --color-danger: #e74c3c;
            --color-text: #ffffff;
            --color-text-muted: rgba(255, 255, 255, 0.6);
            --color-border: rgba(255, 255, 255, 0.1);
            
            /* 尺寸系统 */
            --phone-w: 384px;
            --phone-h: 853px;
            --drawer-w: 165px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-xl: 18px;  /* 12px卡片圆角 + 6px边框补偿 */
            
            /* 动画 */
            --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
            --duration-fast: 0.2s;
            --duration-normal: 0.3s;
        }

        /* ===== 重置与基础 ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== 布局层 (Layout Layer) ===== */
        .l-app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .l-viewport {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ===== 虚拟手机组件 (VirtualPhone) ===== */
        .c-virtual-phone {
            width: var(--phone-w);
            height: var(--phone-h);
            background: var(--color-surface);
            border-radius: var(--radius-xl);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 0 2px rgba(255,255,255,0.1),
                0 20px 60px rgba(0,0,0,0.6),
                inset 0 0 40px rgba(0,0,0,0.3);
            transform-origin: center center;
            will-change: transform;
            transition: transform var(--duration-normal) var(--ease-out);
        }

        .c-virtual-phone--framed {
            border: 6px solid #2c3e50;
        }

        /* ===== 卡片堆叠组件 (CardStack) ===== */
        .c-card-stack {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 2%;  /* 改小内边距 */
            gap: 2%;  /* 改小间距 */
        }

        .c-card {
            width: 100%;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .c-card__header {
            padding: 8px 12px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--color-border);
            transition: display 0.2s;
        }

        .c-card__header--hidden {
            display: none !important;
        }

        .c-card__content {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 卡片变体 - 使用flex权重 */
        .c-card--debug { flex: 4; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .c-card--game { flex: 4; background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .c-card--control { flex: 2; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }

        /* ===== 抽屉组件 (Drawer) - 完全自包含 ===== */
        .c-drawer-wrapper {
            position: fixed;
            top: 10px;
            right: 0px;
            padding-right: 10px;
            width: var(--drawer-w);
            height: auto;
            z-index: 1000;
            pointer-events: none;  /* 关键：让点击穿透到下面的把手 */
            will-change: transform;  /* 添加这一行 */
        }
        
        .c-drawer-wrapper > * {
            pointer-events: auto;  /* 抽屉内部恢复点击 */
        }
        
        .c-drawer {
            position: relative;
            width: var(--drawer-w);
            background: var(--color-surface-elevated);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            z-index: 1000;
            transition: transform var(--duration-normal) var(--ease-out);
        }

        .c-drawer--collapsed {
            transform: translateX(100%);
        }

        .c-drawer__handle {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translate(-100%, -50%);
            width: 26px;
            height: 40px;
            background: var(--color-surface);
            border-radius: var(--radius-sm) 0 0 var(--radius-sm);
            border: 1px solid var(--color-border);
            border-right: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            transition: background var(--duration-fast);
        }

        .c-drawer__handle:hover {
            background: #1a1a2e;
        }

        .c-drawer__handle-icon {
            transition: transform var(--duration-normal) var(--ease-out);
            font-size: 12px;
        }

        .c-drawer--collapsed .c-drawer__handle-icon {
            transform: rotate(180deg);
        }

        .c-drawer__content {
            padding: 10px;
            opacity: 1;
            transition: opacity var(--duration-fast);
            max-height: 80vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.3) transparent;
        }
        .c-drawer__content::-webkit-scrollbar { width: 4px; }
        .c-drawer__content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }

        .c-drawer--collapsed .c-drawer__content {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== 按钮组件 (Button) ===== */
        .c-btn {
            width: 100%;
            padding: 6px 8px;
            margin-bottom: 4px;
            border: 1px solid var(--color-border);
            background: rgba(255,255,255,0.1);
            color: var(--color-text);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 10px;
            transition: all var(--duration-fast);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .c-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
        }

        .c-btn--primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: 600;
        }

        .c-btn--primary:hover {
            filter: brightness(1.1);
        }

        .c-btn--danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
        }

        .c-status-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-danger);
            transition: background var(--duration-fast);
        }

        .c-status-badge--active {
            background: var(--color-success);
            box-shadow: 0 0 8px var(--color-success);
        }

        /* ===== 信息面板组件 (InfoPanel) ===== */
        .c-info-panel {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--color-border);
            font-size: 10px;
            color: var(--color-text-muted);
            font-family: monospace;
            line-height: 1.6;
        }

        .c-info-panel__row {
            display: flex;
            justify-content: space-between;
        }

        .c-info-panel__label {
            color: var(--color-text-muted);
        }

        .c-info-panel__value {
            color: var(--color-primary);
        }

        /* ===== 游戏模拟组件 (GameSimulator) ===== */
        .c-game-simulator {
            width: 90%;
            height: 80%;
            background: rgba(0,0,0,0.3);
            border-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .c-game-simulator--hidden {
            width: 100% !important;
            height: 100% !important;
            background: rgba(0,0,0,0.4) !important;  /* 保持深色背景，稍微加深 */
            border-radius: 0 !important;  /* 去掉圆角 */
        }

        .c-fox {
            width: 28px;
            height: 28px;
            background: #e67e22;
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            user-select: none;
        }

        .c-fox--jumping {
            animation: fox-jump 0.3s ease;
        }

        @keyframes fox-jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-50px); }
        }

        .c-control-grid {
            display: flex;
            gap: 40px;
        }

        .c-control-btn {
            width: min(44px, 12vw);
            height: min(44px, 12vw);
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }

        .c-control-btn:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.25);
        }

        /* ===== 神经元可视化组件 (NeuronVisualizer) ===== */
        .c-neuron-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 80%;
        }

        .c-neuron-node {
            aspect-ratio: 1;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: neuron-pulse 2s infinite;
            border: 2px solid rgba(255,255,255,0.1);
        }

        @keyframes neuron-pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* ===== 触摸指示器 (TouchIndicator) ===== */
        .c-touch-dot {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 0, 0.8);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 1000;
            animation: touch-fade 1s forwards;
        }

        @keyframes touch-fade {
            to { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }

        /* ===== 警告提示 (Alert) ===== */
        .c-alert {
            margin-top: 10px;
            padding: 8px;
            background: rgba(243, 156, 18, 0.2);
            border: 1px solid rgba(243, 156, 18, 0.3);
            border-radius: var(--radius-sm);
            font-size: 10px;
            color: #f39c12;
            line-height: 1.4;
        }

        .c-alert--hidden {
            display: none;
        }

        /* ===== 工具类 (Utilities) ===== */
        .u-text-center { text-align: center; }
        .u-text-muted { color: var(--color-text-muted); }
        .u-text-small { font-size: 0.85em; }
        .u-mt-sm { margin-top: 8px; }
        .u-hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="app" class="l-app">
        <!-- 视口层 -->
        <div class="l-viewport" id="viewport">
            <!-- 虚拟手机由 JS 动态创建和管理 -->
        </div>

        <!-- 抽屉由 JS 动态创建 -->
    </div>

    <script type="module">
        /**
         * @typedef {Object} LayoutConfig
         * @property {number} virtualWidth
         * @property {number} virtualHeight
         * @property {number} margin
         */

        /**
         * @typedef {Object} TransformResult
         * @property {number} scale
         * @property {number} rotation
         * @property {string} mode
         */

        /**
         * @typedef {'auto'|'portrait'|'landscape'|'desktop'} LayoutMode
         */

        // ===== 全局配置 =====
        const CONFIG = {
            initialMargin: 0.00,
            aspectRatio: 9 / 19.5,  // 默认 iPhone 比例
            showCardHeaders: true,   // 卡片标题显隐
            showGameFrame: true      // 游戏区域圆角槽显隐
        };

        // ===== 1. 事件总线 (EventBus) - 核心解耦机制 =====
        
        class EventBus {
            /** @type {Map<string, Set<Function>>} */
            #events = new Map();

            /**
             * @param {string} event
             * @param {Function} callback
             * @returns {Function} unsubscribe
             */
            on(event, callback) {
                if (!this.#events.has(event)) {
                    this.#events.set(event, new Set());
                }
                this.#events.get(event).add(callback);
                
                return () => this.off(event, callback);
            }

            /**
             * @param {string} event
             * @param {Function} callback
             */
            off(event, callback) {
                this.#events.get(event)?.delete(callback);
            }

            /**
             * @param {string} event
             * @param {*} data
             */
            emit(event, data) {
                this.#events.get(event)?.forEach(cb => {
                    try {
                        cb(data);
                    } catch (err) {
                        console.error(`Event handler error for ${event}:`, err);
                    }
                });
            }
        }

        const bus = new EventBus();

        // ===== 2. 领域服务 (Domain Services) =====

        /**
         * 布局计算服务 - 纯数学，无DOM操作
         */
        class LayoutService {
            /** @type {LayoutConfig} */
            #config = {
                virtualWidth: 384,
                virtualHeight: 853,
                margin: CONFIG.initialMargin
            };

            setMargin(marginPercent) {
                this.#config.margin = Math.max(0, Math.min(0.5, marginPercent));
            }

            /**
             * 计算布局变换参数
             * @param {number} physWidth
             * @param {number} physHeight
             * @param {LayoutMode} mode
             * @returns {TransformResult}
             */
            calculate(physWidth, physHeight, mode) {
                // 获取当前设定的宽高比（可从 CONFIG 或外部传入）
                const ASPECT_RATIO = CONFIG.aspectRatio;

                let virtualWidth, virtualHeight, rotation;
                let fitMode = 'normal';  // 记录使用了哪种适配模式

                // 设备边长
                const minSide = Math.min(physWidth, physHeight);  // 短边
                const maxSide = Math.max(physWidth, physHeight);  // 长边

                // 方案A：以短边为宽度（传统方式）
                const widthA = minSide;
                const heightA = widthA / ASPECT_RATIO;

                // 方案B：以长边为高度（防溢出方式）
                const heightB = maxSide * 0.95;  // 留 5% 边距
                const widthB = heightB * ASPECT_RATIO;

                // 智能选择：哪个方案不溢出选哪个
                const overflowA = heightA > maxSide * 0.95;  // A方案高度溢出？
                const overflowB = widthB > minSide;          // B方案宽度溢出？（理论上不会）

                if (overflowA && !overflowB) {
                    // A溢出，B不溢出 → 选B（以长边为高）
                    virtualWidth = widthB;
                    virtualHeight = heightB;
                    fitMode = 'by-height';
                } else {
                    // 默认选A（以短边为宽），或A不溢出时优先A
                    virtualWidth = widthA;
                    virtualHeight = heightA;
                    fitMode = 'by-width';
                }
                let isMobile = physWidth < 1024;
                let layoutMode = 'auto';

                // 根据mode覆盖自动检测
                switch(mode) {
                    case 'portrait':
                        // 强制竖屏：不旋转，应用溢出检测
                        isMobile = true;
                        layoutMode = 'portrait';
                        const pMin = Math.min(physWidth, physHeight);
                        const pMax = Math.max(physWidth, physHeight);
                        const phA = pMin / ASPECT_RATIO;

                        if (phA > pMax * 0.95) {
                            virtualHeight = pMax * 0.95;
                            virtualWidth = virtualHeight * ASPECT_RATIO;
                            fitMode = 'by-height-portrait';
                        } else {
                            virtualWidth = pMin;
                            virtualHeight = phA;
                            fitMode = 'by-width-portrait';
                        }
                        rotation = 0;
                        break;

                    case 'landscape':
                        // 强制横屏：旋转-90°，应用同样的溢出检测
                        isMobile = true;
                        layoutMode = 'landscape';

                        // 横屏时，旋转后虚拟手机的"高"会变成视觉"宽"
                        // 需要确保旋转后不溢出
                        const lMin = Math.min(physWidth, physHeight);
                        const lMax = Math.max(physWidth, physHeight);

                        // 方案A：以短边为虚拟宽
                        const lwA = lMin;
                        const lhA = lMin / ASPECT_RATIO;

                        // 旋转后，虚拟高(lhA)会变成视觉宽，不能超过设备长边
                        const overflowA = lhA > lMax * 0.95;

                        if (overflowA) {
                            // 溢出，以设备长边为限（旋转后变成视觉宽）
                            const lhB = lMax * 0.95;
                            const lwB = lhB * ASPECT_RATIO;
                            virtualWidth = lwB;
                            virtualHeight = lhB;
                            fitMode = 'by-height-landscape';
                        } else {
                            virtualWidth = lwA;
                            virtualHeight = lhA;
                            fitMode = 'by-width-landscape';
                        }
                        rotation = -90;
                        break;

                    case 'desktop':
                        // PC模式：固定比例，不旋转，居中显示
                        isMobile = false;
                        layoutMode = 'desktop';
                        virtualHeight = physHeight * 0.9;  // 留10%边距
                        virtualWidth = virtualHeight * ASPECT_RATIO;
                        rotation = 0;
                        break;

                    case 'auto':
                    default:
                        // 自动检测：使用前面智能计算好的 virtualWidth/virtualHeight
                        layoutMode = 'auto';
                        // 只需计算旋转角度
                        rotation = (physWidth > physHeight) ? -90 : 0;
                        // virtualWidth/virtualHeight 已在前面智能计算好，不再覆盖
                        break;
                }

                // 边距控制通过scale实现
                const margin = this.#config.margin;
                const finalScale = 1.0 - (margin * 2);

                return { 
                    scale: finalScale, 
                    rotation, 
                    mode: layoutMode,
                    virtualWidth,
                    virtualHeight,
                    fitMode  // 适配模式：'by-width' 或 'by-height'
                };
            }

            /**
             * 坐标转换：物理屏幕 → 虚拟手机逻辑坐标
             * @param {number} clientX
             * @param {number} clientY
             * @param {DOMRect} rect
             * @param {TransformResult} transform
             * @returns {{x: number, y: number}}
             */
            toVirtualCoordinates(clientX, clientY, rect, transform) {
                const vx = clientX - rect.left;
                const vy = clientY - rect.top;

                let logicX, logicY;

                if (transform.rotation === -90) {
                    // rotate(-90°)后的坐标映射: 视觉(vx,vy) → 逻辑(x,y)
                    logicX = transform.virtualWidth - (vy / transform.scale);
                    logicY = vx / transform.scale;
                } else {
                    logicX = vx / transform.scale;
                    logicY = vy / transform.scale;
                }

                return {
                    x: Math.max(0, Math.min(transform.virtualWidth, logicX)),
                    y: Math.max(0, Math.min(transform.virtualHeight, logicY))
                };
            }

            #isMobile() {
                return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            }
        }

        /**
         * 全屏服务 - 封装浏览器差异
         */
        class FullscreenService {
            /**
             * @returns {boolean}
             */
            isSupported() {
                const el = document.documentElement;
                return !!(el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen);
            }

            /**
             * @returns {Promise<void>}
             */
            async enter() {
                const el = document.documentElement;
                try {
                    if (el.requestFullscreen) await el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
                    else if (el.mozRequestFullScreen) await el.mozRequestFullScreen();
                    else if (el.msRequestFullscreen) await el.msRequestFullscreen();
                } catch (err) {
                    throw new Error(`Fullscreen failed: ${err.message}`);
                }
            }

            /**
             * @returns {Promise<void>}
             */
            async exit() {
                try {
                    if (document.exitFullscreen) await document.exitFullscreen();
                    else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
                    else if (document.mozCancelFullScreen) await document.mozCancelFullScreen();
                    else if (document.msExitFullscreen) await document.msExitFullscreen();
                } catch (err) {
                    throw new Error(`Exit fullscreen failed: ${err.message}`);
                }
            }

            /**
             * @returns {boolean}
             */
            isActive() {
                return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
            }

            /**
             * @param {Function} callback
             */
            onChange(callback) {
                ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange']
                    .forEach(evt => document.addEventListener(evt, callback));
            }
        }


        /**
         * 屏幕方向服务
         */
        class OrientationService {
            /**
             * @returns {boolean}
             */
            isSupported() {
                return !!(screen.orientation?.lock || screen.lockOrientation || screen.webkitLockOrientation);
            }
        
            /**
             * @param {'portrait-primary'|'landscape-primary'} orientation
             * @returns {Promise<void>}
             */
            async lock(orientation) {
                try {
                    if (screen.orientation?.lock) {
                        await screen.orientation.lock(orientation);
                    } else if (screen.lockOrientation) {
                        screen.lockOrientation(orientation);
                    } else if (screen.webkitLockOrientation) {
                        screen.webkitLockOrientation(orientation);
                    }
                } catch (err) {
                    console.warn('Orientation lock failed:', err);
                }
            }
        
            /**
             * @returns {void}
             */
            unlock() {
                try {
                    if (screen.orientation?.unlock) screen.orientation.unlock();
                    else if (screen.unlockOrientation) screen.unlockOrientation();
                } catch (err) {
                    console.warn('Orientation unlock failed:', err);
                }
            }
        }

        // ===== 3. UI 组件基类与具体实现 =====

        /**
         * 组件基类
         */
        class Component {
            /** @type {HTMLElement} */
            element = null;
            
            /**
             * @param {string} tag
             * @param {string} className
             */
            constructor(tag = 'div', className = '') {
                this.element = document.createElement(tag);
                if (className) this.element.className = className;
            }

            /**
             * @param {HTMLElement} parent
             * @returns {this}
             */
            mount(parent) {
                parent.appendChild(this.element);
                return this;
            }

            /**
             * @returns {void}
             */
            destroy() {
                this.element?.remove();
            }
        }

                    btn.addEventListener('click', (e) => {
                        const mode = e.target.dataset.mode;

                // 边距滑块
                const marginSlider = this.element.querySelector('#margin-slider');
                const marginValue = this.element.querySelector('#margin-value');
                if (marginSlider) {
                    marginSlider.addEventListener('input', (e) => {
                        const percent = parseInt(e.target.value);
                        if (marginValue) marginValue.textContent = percent + '%';
                        bus.emit('layout:setMargin', percent / 100);
                    });

                const ratioValue = this.element.querySelector('#ratio-value');
                if (ratioSlider) {
                    ratioSlider.addEventListener('input', (e) => {
                        const val = parseInt(e.target.value);
                        const ratio = val / 100;  // 30-60 → 0.30-0.60
                        if (ratioValue) ratioValue.textContent = ratio.toFixed(4);
                        CONFIG.aspectRatio = ratio;
                        bus.emit('layout:update');  // 触发布局更新
                    });
                }

                // 宽高比快捷按钮
                this.element.querySelectorAll('[data-ratio]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const ratio = parseFloat(e.target.dataset.ratio);
                        CONFIG.aspectRatio = ratio;
                        if (ratioSlider) ratioSlider.value = Math.round(ratio * 100);
                        if (ratioValue) ratioValue.textContent = ratio.toFixed(4);
                        bus.emit('layout:update');
                    });
                });

                // 显隐控制复选框
                const headerToggle = this.element.querySelector('#toggle-headers');
                const gameFrameToggle = this.element.querySelector('#toggle-gameframe');

                if (headerToggle) {
                    headerToggle.addEventListener('change', (e) => {
                        CONFIG.showCardHeaders = e.target.checked;
                        bus.emit('ui:toggleHeaders', e.target.checked);

                        bus.emit('ui:toggleGameFrame', e.target.checked);

            #subscribe() {
                this.#unsubscribe = bus.on('state:update', (state) => {
                    this.#updateUI(state);
                });
            }

            /**
             * @param {boolean} force
             * @returns {this}
             */
            toggle(force) {
                this.#isOpen = force !== undefined ? force : !this.#isOpen;
                this.element.classList.toggle('c-drawer--collapsed', !this.#isOpen);
                bus.emit('drawer:toggle', this.#isOpen);
                return this;
            }

            /**
             * @private
             */
            #updateActiveButton(activeMode) {
                this.element.querySelectorAll('[data-mode]').forEach(btn => {
                    btn.style.background = btn.dataset.mode === activeMode 
                        ? 'rgba(78, 205, 196, 0.3)' 
                        : '';
                });
            }

            /**
             * @private
             * @param {Object} state
             */
            #updateUI(state) {
                // 更新信息面板
                this.element.querySelector('#info-phys').textContent = 
                    `${state.physical.width}x${state.physical.height}`;
                const fitInfo = state.layout.fitMode === 'by-height' ? '(限高)' : '(限宽)';
                    this.element.querySelector('#info-logic').textContent = 
                        `${Math.round(state.layout.virtualWidth)}x${Math.round(state.layout.virtualHeight)}${fitInfo}`;
                this.element.querySelector('#info-mode').textContent = 
                    state.layout.mode.toUpperCase();
                this.element.querySelector('#info-scale').textContent = 
                    `${(state.layout.scale * 100).toFixed(1)}%`;
                this.element.querySelector('#info-fullscreen').textContent = 
                    state.fullscreen ? '✅ 是' : '❌ 否';

                // 更新全屏按钮状态
                const fsBtn = this.element.querySelector('#btn-fullscreen');
                const exitBtn = this.element.querySelector('#btn-exit-fullscreen');
                const badge = this.element.querySelector('#fs-badge');
                
                if (state.fullscreen) {
                    fsBtn.classList.add('u-hidden');
                    exitBtn.classList.remove('u-hidden');
                    badge.classList.add('c-status-badge--active');
                } else {
                    fsBtn.classList.remove('u-hidden');
                    exitBtn.classList.add('u-hidden');
                    badge.classList.remove('c-status-badge--active');
                }

                // iOS 警告
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                if (isIOS) {
                    this.element.querySelector('#ios-warning').classList.remove('c-alert--hidden');
                }
            }

            destroy() {
                this.#unsubscribe?.();
                super.destroy();
            }
        }

            #bindEvents() {
                // 游戏区域触摸 - 坐标转换测试
                const gameArea = this.element.querySelector('#game-area');
                gameArea.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.#handleGameTouch(touch.clientX, touch.clientY);
                }, { passive: false });

                gameArea.addEventListener('click', (e) => {
                    this.#handleGameTouch(e.clientX, e.clientY);
                });

                // 控制按钮
                this.element.querySelectorAll('.c-control-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const action = e.target.dataset.action;
                        bus.emit(`game:${action}`);
                    });
                });
            }

            #subscribe() {
                this.#unsubscribe = bus.on('layout:transform', (transform) => {
                    this.#applyTransform(transform);
                });
            }

            /**
             * @private
             * @param {TransformResult} transform
             */
            #applyTransform(transform) {
                this.element.style.width = transform.virtualWidth + 'px';
                this.element.style.height = transform.virtualHeight + 'px';
                this.element.style.setProperty('--phone-w', transform.virtualWidth + 'px');
                this.element.style.setProperty('--phone-h', transform.virtualHeight + 'px');

                const transformStr = transform.rotation 
                    ? `rotate(${transform.rotation}deg) scale(${transform.scale})`
                    : `scale(${transform.scale})`;
                
                this.element.style.transform = transformStr;
            }

            /**
             * @private
             * @param {number} clientX
             * @param {number} clientY
             */
            #handleGameTouch(clientX, clientY) {
                const rect = this.element.getBoundingClientRect();
                const state = window.__APP_STATE__; // 临时获取当前状态，实际应通过事件传递
                if (!state) return;

                const virtualPos = this.#layoutService.toVirtualCoordinates(
                    clientX, clientY, rect, state.layout
                );

                // 显示触摸点
                this.#showTouchIndicator(virtualPos.x, virtualPos.y);
                
                // 移动狐狸
                bus.emit('game:moveTo', virtualPos);
            }

            /**
             * @private
             * @param {number} x - 虚拟坐标x
             * @param {number} y - 虚拟坐标y
             */
            #showTouchIndicator(x, y) {
                const dot = document.createElement('div');
                dot.className = 'c-touch-dot';
                dot.style.left = x + 'px';
                dot.style.top = y + 'px';
                this.element.appendChild(dot);
                setTimeout(() => dot.remove(), 1000);
            }

            /**
             * @returns {HTMLElement}
             */
            getFoxElement() {
                return this.element.querySelector('#fox');
            }
        }

        // ===== 4. 游戏逻辑控制器 =====

        class GameController {
            /** @type {HTMLElement} */
            #foxEl;
            /** @type {{x: number, y: number}} */
            #position = { x: 50, y: 50 }; // 百分比

            constructor(foxElement) {
                this.#foxEl = foxElement;
                this.#bindEvents();
            }

            #bindEvents() {
                bus.on('game:move-left', () => this.move('left'));
                bus.on('game:move-right', () => this.move('right'));
                bus.on('game:jump', () => this.jump());
                bus.on('game:moveTo', (pos) => this.moveTo(pos));
            }

            move(direction) {
                const step = 10;
                if (direction === 'left') {
                    this.#position.x = Math.max(10, this.#position.x - step);
                } else {
                    this.#position.x = Math.min(90, this.#position.x + step);
                }
                this.#render();
            }

            jump() {
                this.#foxEl.classList.add('c-fox--jumping');
                setTimeout(() => {
                    this.#foxEl.classList.remove('c-fox--jumping');
                }, 300);
            }

            moveTo(pos) {
                // 使用当前状态中的虚拟尺寸（动态计算，非固定384x853）
                const state = window.__APP_STATE__;
                if (state && state.layout) {
                    this.#position.x = (pos.x / state.layout.virtualWidth) * 100;
                    this.#position.y = (pos.y / state.layout.virtualHeight) * 100;
                } else {
                    // 备用：使用固定比例（应该不会走到这里）
                    this.#position.x = (pos.x / 384) * 100;
                    this.#position.y = (pos.y / 853) * 100;
                }
                this.#render();
            }

            #render() {
                this.#foxEl.style.left = `${this.#position.x}%`;
                this.#foxEl.style.top = `${this.#position.y}%`;
                this.#foxEl.style.transform = 'translate(-50%, -50%)';
            }
        }

        // ===== 5. 应用主控制器 (App Controller) =====

        class App {
            /** @type {LayoutService} */
            #layoutService;
            /** @type {FullscreenService} */
            #fullscreenService;
            /** @type {OrientationService} */
            #orientationService;
            /** @type {Drawer} */
            #drawer;
            /** @type {VirtualPhone} */
            #virtualPhone;
            /** @type {GameController} */
            #game;
            
            /** @type {LayoutMode} */
            #currentMode = 'auto';
            /** @type {boolean} */
            #isFullscreen = false;

            constructor() {
                this.#layoutService = new LayoutService();
                this.#fullscreenService = new FullscreenService();
                this.#orientationService = new OrientationService();
                
                this.#init();
            }

            #init() {
                // 初始化 UI
                const appEl = document.getElementById('app');
                const viewportEl = document.getElementById('viewport');

                this.#drawer = new Drawer().mount(appEl);
                this.#virtualPhone = new VirtualPhone(this.#layoutService).mount(viewportEl);
                this.#game = new GameController(this.#virtualPhone.getFoxElement());

                // 绑定全局事件
                this.#bindBusEvents();
                this.#bindWindowEvents();
                
                // 初始布局
                this.#updateLayout();
            }

            #bindBusEvents() {
                // 全屏控制
                bus.on('fullscreen:request', () => this.#enterFullscreen());
                bus.on('fullscreen:exit', () => this.#exitFullscreen());
                
                // 布局控制
                bus.on('layout:setMode', (mode) => {
                    this.#currentMode = mode;
                    this.#updateLayout();
                });

                // 边距控制
                bus.on('layout:setMargin', (margin) => {
                    this.#layoutService.setMargin(margin);
                    this.#updateLayout();
                });

                // 宽高比变化时更新布局
                bus.on('layout:update', () => {
                    this.#updateLayout();
                });

                // UI 显隐控制
                bus.on('ui:toggleHeaders', (show) => {
                    document.querySelectorAll('.c-card__header').forEach(el => {
                        el.classList.toggle('c-card__header--hidden', !show);
                    });
                });

                bus.on('ui:toggleGameFrame', (show) => {
                    const gameFrame = document.querySelector('.c-game-simulator');
                    if (gameFrame) {
                        gameFrame.classList.toggle('c-game-simulator--hidden', !show);
                    }
                });
            }

            #bindWindowEvents() {
                window.addEventListener('resize', () => {
                    this.#updateLayout();
                });

                this.#fullscreenService.onChange(() => {
                    const wasFullscreen = this.#isFullscreen;
                    this.#isFullscreen = this.#fullscreenService.isActive();

                    if (this.#isFullscreen) {
                        // 进入全屏：根据当前模式锁定方向
                        const lockMode = this.#currentMode === 'landscape' 
                            ? 'landscape-primary' 
                            : 'portrait-primary';
                        this.#orientationService.lock(lockMode);
                    } else {
                        // 退出全屏：解锁并重置为auto模式（支持返回键退出）
                        this.#orientationService.unlock();
                        this.#currentMode = 'auto';
                        setTimeout(() => this.#updateLayout(), 100);
                    }

                    this.#emitState();
           
                });
            }
            
            
            async #enterFullscreen() {
                try {
                    // 1. 强制锁定横屏（无论手机当前怎么拿）
                    await this.#orientationService.lock('landscape-primary');
                    
                    // 2. 延迟一点等方向锁定生效，再进全屏
                    setTimeout(async () => {
                        await this.#fullscreenService.enter();
                        // 3. 强制使用 landscape 旋转模式（-90° 抵消）
                        this.#currentMode = 'landscape';
                        this.#updateLayout();
                    }, 300);
                    
                } catch (err) {
                    console.error('Fullscreen failed:', err);
                }
            }

            async #exitFullscreen() {
                try {
                    await this.#fullscreenService.exit();
                } catch (err) {
                    console.error('Exit fullscreen failed:', err);
                }
            }

            #updateLayout() {
                const physWidth = window.innerWidth;
                const physHeight = window.innerHeight;
                
                const transform = this.#layoutService.calculate(
                    physWidth, 
                    physHeight, 
                    this.#currentMode
                );

                // 发布布局变换
                bus.emit('layout:transform', transform);
                
                // 保存状态供坐标转换使用
                window.__APP_STATE__ = {
                    physical: { width: physWidth, height: physHeight },
                    layout: transform,
                    fullscreen: this.#isFullscreen
                };

                this.#emitState();
            }

            #emitState() {
                bus.emit('state:update', window.__APP_STATE__);
            }
        }

        // ===== 6. 启动应用 =====
        
        document.addEventListener('DOMContentLoaded', () => {
            new App();
        });
    </script>
</body>
</html>
