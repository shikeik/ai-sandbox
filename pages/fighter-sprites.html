<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>格斗角色 - Garou风格升级版</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
			color: #e0e0e0;
			padding: 20px;
			min-height: 100vh;
		}
		h1 {
			text-align: center;
			color: #4ade80;
			margin-bottom: 8px;
			font-size: 22px;
		}
		.subtitle {
			text-align: center;
			color: #888;
			margin-bottom: 20px;
			font-size: 13px;
		}
		.container {
			display: flex;
			justify-content: center;
			max-width: 600px;
			margin: 0 auto;
		}
		.card {
			background: rgba(255, 255, 255, 0.05);
			border-radius: 10px;
			padding: 12px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			width: 100%;
			max-width: 300px;
		}
		.card-title {
			font-size: 14px;
			color: #4ade80;
			margin-bottom: 6px;
			text-align: center;
		}
		.card-info {
			font-size: 11px;
			color: #666;
			text-align: center;
			margin-bottom: 8px;
		}
		.canvas-wrapper {
			position: relative;
			width: 100%;
			aspect-ratio: 1 / 1;
			background: rgba(0, 0, 0, 0.5);
			border-radius: 6px;
			overflow: hidden;
		}
		canvas {
			width: 100%;
			height: 100%;
			image-rendering: pixelated;
		}
		.controls {
			text-align: center;
			margin-top: 20px;
			padding: 15px;
			background: rgba(255, 255, 255, 0.05);
			border-radius: 10px;
			max-width: 600px;
			margin-left: auto;
			margin-right: auto;
		}
		.controls h3 {
			color: #4ade80;
			margin-bottom: 12px;
			font-size: 14px;
		}
		.btn-group {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			justify-content: center;
			margin-bottom: 12px;
		}
		button {
			padding: 6px 14px;
			border: none;
			border-radius: 5px;
			background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
			color: white;
			font-size: 11px;
			cursor: pointer;
			transition: all 0.2s;
		}
		button:hover {
			transform: translateY(-1px);
			box-shadow: 0 3px 10px rgba(34, 197, 94, 0.3);
		}
		button.toggle-on {
			background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
		}
		button.toggle-off {
			background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
		}
		.back-link {
			display: inline-block;
			margin-bottom: 15px;
			color: #888;
			text-decoration: none;
			font-size: 13px;
		}
		.back-link:hover { color: #4ade80; }
		.legend {
			font-size: 11px;
			color: #666;
			margin-top: 10px;
		}
	</style>
</head>
<body>
	<a href="../index.html" class="back-link">← 返回首页</a>
	
	<h1>🥊 格斗角色 - Garou风格升级版</h1>
	<p class="subtitle">7.5头身 · 战斗待机 · 流畅动画</p>
	
	<div class="container" id="sprite-container"></div>
	
	<div class="controls">
		<h3>🎮 播放控制</h3>
		<div class="btn-group">
			<button onclick="setSpeed(1)">▶️ 正常</button>
			<button onclick="setSpeed(0.3)">🐢 慢速</button>
			<button onclick="setSpeed(2)">🐰 快速</button>
			<button onclick="togglePause()">⏸️ 暂停</button>
		</div>
		<h3>🔧 调试选项</h3>
		<div class="btn-group">
			<button id="skin-btn" class="toggle-on" onclick="toggleSkin()">👤 皮肤: 开</button>
			<button id="wire-btn" class="toggle-on" onclick="toggleWire()">🔲 线框: 开</button>
			<button id="joint-btn" class="toggle-off" onclick="toggleJoints()">🔵 关节: 关</button>
		</div>
		<div class="legend">
			 Garou: Mark of the Wolves 风格 | 7.5头身 | 微蹲战斗姿态
		</div>
	</div>

	<script>
		// ========== 高清 Canvas 设置 ==========
		function setupHighDPICanvas(canvas) {
			const ctx = canvas.getContext('2d');
			const rect = canvas.getBoundingClientRect();
			const dpr = window.devicePixelRatio || 1;
			
			canvas.width = Math.floor(rect.width * dpr);
			canvas.height = Math.floor(rect.height * dpr);
			ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
			
			return { ctx, rect, dpr, width: rect.width, height: rect.height };
		}
		
		// ========== Garou风格骨骼定义 ==========
		// 7.5头身比例：头1 + 颈0.3 + 躯干2 + 腿3.2 + 脚1
		
		const JOINTS = {
			// 根关节（髋部中心）
			hips: { x: 0, y: 0, parent: null, children: ['spine', 'thighL', 'thighR'] },
			
			// 脊柱（短，Garou风格上身紧凑）
			spine: { x: 0, y: -14, parent: 'hips', children: ['chest'] },
			
			// 胸部
			chest: { x: 0, y: -12, parent: 'spine', children: ['neck', 'shoulderL', 'shoulderR'] },
			
			// 脖子（稍长，抬头姿势）
			neck: { x: 3, y: -8, parent: 'chest', children: ['head'] },
			
			// 头部（稍小，7.5头身）
			head: { x: 2, y: -9, parent: 'neck', children: [] },
			
			// 肩膀（宽肩）
			shoulderL: { x: -8, y: -3, parent: 'chest', children: ['elbowL'] },
			shoulderR: { x: 6, y: -3, parent: 'chest', children: ['elbowR'] },
			
			// 肘部（手臂弯曲，保护姿态）
			elbowL: { x: -3, y: 8, parent: 'shoulderL', children: ['handL'] },
			elbowR: { x: 5, y: 10, parent: 'shoulderR', children: ['handR'] },
			
			// 手（拳套位置）
			handL: { x: 2, y: 6, parent: 'elbowL', children: ['handLTip'] },
			handR: { x: 4, y: 4, parent: 'elbowR', children: ['handRTip'] },
			
			// 手指尖
			handLTip: { x: 3, y: 0, parent: 'handL', children: [] },
			handRTip: { x: 3, y: 0, parent: 'handR', children: [] },
			
			// 大腿（微蹲，膝盖向前）
			thighL: { x: -3, y: 2, parent: 'hips', children: ['kneeL'] },
			thighR: { x: 3, y: 2, parent: 'hips', children: ['kneeR'] },
			
			// 膝盖（弯曲角度）
			kneeL: { x: -2, y: 16, parent: 'thighL', children: ['footL'] },
			kneeR: { x: 2, y: 16, parent: 'thighR', children: ['footR'] },
			
			// 脚
			footL: { x: 0, y: 14, parent: 'kneeL', children: ['footLToe'] },
			footR: { x: 0, y: 14, parent: 'kneeR', children: ['footRToe'] },
			
			// 脚尖
			footLToe: { x: 5, y: 0, parent: 'footL', children: [] },
			footRToe: { x: 5, y: 0, parent: 'footR', children: [] }
		};
		
		// 肢体定义（Garou风格配色）
		const LIMBS = {
			// 躯干
			spine: { 
				startJoint: 'hips', endJoint: 'chest', 
				width: 12, color: '#c94a4a', z: 0, type: 'gi'  // 红色道服
			},
			// 脖子
			neck: { 
				startJoint: 'chest', endJoint: 'neck', 
				width: 5, color: '#e8b89a', z: 1, type: 'skin' 
			},
			// 头
			head: { 
				startJoint: 'neck', endJoint: 'head', 
				width: 9, color: '#e8b89a', z: 1, type: 'head' 
			},
			// 左上臂
			upperArmL: { 
				startJoint: 'shoulderL', endJoint: 'elbowL', 
				width: 5, color: '#c94a4a', z: -1, type: 'gi' 
			},
			// 左前臂
			lowerArmL: { 
				startJoint: 'elbowL', endJoint: 'handL', 
				width: 4.5, color: '#e8b89a', z: -1, type: 'skin' 
			},
			// 左手（拳套）
			handL: { 
				startJoint: 'handL', endJoint: 'handLTip', 
				width: 6, color: '#8b4513', z: -1, type: 'glove' 
			},
			// 右上臂
			upperArmR: { 
				startJoint: 'shoulderR', endJoint: 'elbowR', 
				width: 5, color: '#c94a4a', z: 1, type: 'gi' 
			},
			// 右前臂
			lowerArmR: { 
				startJoint: 'elbowR', endJoint: 'handR', 
				width: 4.5, color: '#e8b89a', z: 1, type: 'skin' 
			},
			// 右手（拳套）
			handR: { 
				startJoint: 'handR', endJoint: 'handRTip', 
				width: 6, color: '#8b4513', z: 1, type: 'glove' 
			},
			// 左大腿
			thighL: { 
				startJoint: 'hips', endJoint: 'kneeL', 
				width: 7, color: '#2a4a8a', z: -1, type: 'pants'  // 蓝色裤子
			},
			// 左小腿
			shinL: { 
				startJoint: 'kneeL', endJoint: 'footL', 
				width: 5.5, color: '#e8b89a', z: -1, type: 'skin' 
			},
			// 左脚
			footL: { 
				startJoint: 'footL', endJoint: 'footLToe', 
				width: 4, color: '#8b4513', z: -1, type: 'shoe' 
			},
			// 右大腿
			thighR: { 
				startJoint: 'hips', endJoint: 'kneeR', 
				width: 7, color: '#3a5aaa', z: 1, type: 'pants' 
			},
			// 右小腿
			shinR: { 
				startJoint: 'kneeR', endJoint: 'footR', 
				width: 5.5, color: '#d4a080', z: 1, type: 'skin' 
			},
			// 右脚
			footR: { 
				startJoint: 'footR', endJoint: 'footRToe', 
				width: 4, color: '#8b4513', z: 1, type: 'shoe' 
			}
		};
		
		// 动画关键帧（呼吸待机）
		const ANIMATIONS = {
			idle: {
				name: '待机 (Idle)',
				frames: [
					// Frame 1: 起始
					{ 
						spine: 0, chest: 0, 
						elbowL: -10, elbowR: -5,
						handL: 5, handR: 0,
						kneeL: 15, kneeR: 10,
						footL: 5, footR: 5,
						head: -5
					},
					// Frame 2: 上升
					{ 
						spine: -1, chest: -1, 
						elbowL: -8, elbowR: -3,
						handL: 3, handR: -2,
						kneeL: 12, kneeR: 8,
						footL: 3, footR: 3,
						head: -3
					},
					// Frame 3: 最高点
					{ 
						spine: -2, chest: -2, 
						elbowL: -6, elbowR: -1,
						handL: 1, handR: -4,
						kneeL: 10, kneeR: 6,
						footL: 2, footR: 2,
						head: -2
					},
					// Frame 4: 下降
					{ 
						spine: -1, chest: -1, 
						elbowL: -8, elbowR: -3,
						handL: 3, handR: -2,
						kneeL: 13, kneeR: 9,
						footL: 4, footR: 4,
						head: -4
					},
					// Frame 5: 最低点
					{ 
						spine: 2, chest: 2, 
						elbowL: -12, elbowR: -7,
						handL: 8, handR: 3,
						kneeL: 18, kneeR: 13,
						footL: 7, footR: 7,
						head: -6
					},
					// Frame 6: 回弹
					{ 
						spine: 1, chest: 1, 
						elbowL: -11, elbowR: -6,
						handL: 6, handR: 1,
						kneeL: 16, kneeR: 11,
						footL: 6, footR: 6,
						head: -5
					}
				]
			}
		};
		
		// ========== 渲染系统 ==========
		
		let showSkin = true;
		let showWire = true;
		let showJoints = false;
		
		function calculateJointPositions(rootX, rootY, rotations) {
			const positions = {};
			const RAD = Math.PI / 180;
			
			positions.hips = { x: rootX, y: rootY };
			
			function calcJoint(jointName, parentX, parentY, parentAngle) {
				const joint = JOINTS[jointName];
				if (!joint) return;
				
				const rotation = (rotations[jointName] || 0) + parentAngle;
				const rad = rotation * RAD;
				
				const worldX = parentX + joint.x * Math.cos(rad) - joint.y * Math.sin(rad);
				const worldY = parentY + joint.x * Math.sin(rad) + joint.y * Math.cos(rad);
				
				positions[jointName] = { x: worldX, y: worldY, angle: rotation };
				
				if (joint.children) {
					joint.children.forEach(child => {
						calcJoint(child, worldX, worldY, rotation);
					});
				}
			}
			
			calcJoint('spine', rootX, rootY, 0);
			calcJoint('thighL', rootX, rootY, 0);
			calcJoint('thighR', rootX, rootY, 0);
			
			return positions;
		}
		
		function drawWireframe(ctx, positions) {
			if (!showWire) return;
			
			Object.keys(LIMBS).forEach(limbName => {
				const limb = LIMBS[limbName];
				const start = positions[limb.startJoint];
				const end = positions[limb.endJoint];
				if (!start || !end) return;
				
				const dx = end.x - start.x;
				const dy = end.y - start.y;
				const length = Math.sqrt(dx * dx + dy * dy);
				const angle = Math.atan2(dy, dx);
				const width = limb.width;
				
				ctx.save();
				ctx.translate(start.x, start.y);
				ctx.rotate(angle);
				
				ctx.strokeStyle = '#4ade80';
				ctx.lineWidth = 1.5;
				ctx.strokeRect(-2, -width/2, length + 4, width);
				
				ctx.fillStyle = 'rgba(74, 222, 128, 0.1)';
				ctx.fillRect(-2, -width/2, length + 4, width);
				
				ctx.restore();
			});
		}
		
		function drawSkin(ctx, positions) {
			if (!showSkin) return;
			
			const sortedLimbs = Object.keys(LIMBS).sort((a, b) => LIMBS[a].z - LIMBS[b].z);
			
			sortedLimbs.forEach(limbName => {
				const limb = LIMBS[limbName];
				const start = positions[limb.startJoint];
				const end = positions[limb.endJoint];
				if (!start || !end) return;
				
				const dx = end.x - start.x;
				const dy = end.y - start.y;
				const length = Math.sqrt(dx * dx + dy * dy);
				const angle = Math.atan2(dy, dx);
				const width = limb.width - 1;
				
				ctx.save();
				ctx.translate(start.x, start.y);
				ctx.rotate(angle);
				
				// 基础填充
				ctx.fillStyle = limb.color;
				ctx.fillRect(-1, -width/2, length + 2, width);
				
				// 衣服细节
				if (limb.type === 'gi') {
					// 道服纹理
					ctx.fillStyle = 'rgba(0,0,0,0.15)';
					ctx.fillRect(length * 0.3, -width * 0.3, length * 0.4, width * 0.6);
					// 领口
					ctx.fillStyle = '#fff';
					ctx.fillRect(0, -width * 0.4, 3, width * 0.8);
				}
				
				if (limb.type === 'glove') {
					// 拳套高光
					ctx.fillStyle = '#a0522d';
					ctx.fillRect(length * 0.2, -width * 0.25, length * 0.5, width * 0.5);
				}
				
				if (limb.type === 'pants') {
					// 裤子褶皱
					ctx.fillStyle = 'rgba(255,255,255,0.1)';
					ctx.fillRect(length * 0.4, -width * 0.3, 2, width * 0.6);
				}
				
				if (limb.type === 'head') {
					// 头发（向后梳）
					ctx.fillStyle = '#1a1a2e';
					ctx.fillRect(length * 0.2, -width * 0.5, length * 0.7, width * 0.4);
					// 发带
					ctx.fillStyle = '#c94a4a';
					ctx.fillRect(length * 0.5, -width * 0.55, length * 0.3, 3);
					// 眼睛
					ctx.fillStyle = '#1a1a2e';
					ctx.fillRect(length * 0.7, -width * 0.1, 2, 2);
				}
				
				ctx.restore();
			});
		}
		
		function drawJoints(ctx, positions) {
			if (!showJoints) return;
			
			Object.keys(positions).forEach(jointName => {
				const pos = positions[jointName];
				const size = JOINTS[jointName]?.children?.length > 0 ? 2 : 1.2;
				
				ctx.fillStyle = '#fbbf24';
				ctx.beginPath();
				ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
				ctx.fill();
			});
		}
		
		function drawCharacter(ctx, rootX, rootY, rotations) {
			const positions = calculateJointPositions(rootX, rootY, rotations);
			drawWireframe(ctx, positions);
			drawSkin(ctx, positions);
			drawJoints(ctx, positions);
			return positions;
		}
		
		// ========== 动画系统 ==========
		
		let animationSpeed = 1;
		let isPaused = false;
		const animationStates = {};
		
		function interpolatePose(pose1, pose2, t) {
			const result = {};
			const allKeys = new Set([...Object.keys(pose1 || {}), ...Object.keys(pose2 || {})]);
			allKeys.forEach(key => {
				const v1 = pose1?.[key] || 0;
				const v2 = pose2?.[key] || 0;
				result[key] = v1 + (v2 - v1) * t;
			});
			return result;
		}
		
		function playAnimation(key, canvas) {
			const { ctx } = setupHighDPICanvas(canvas);
			const anim = ANIMATIONS[key];
			
			let currentFrame = 0;
			let frameProgress = 0;
			let lastTime = 0;
			
			function loop(timestamp) {
				if (isPaused) {
					requestAnimationFrame(loop);
					return;
				}
				
				// 帧时序：上慢下快（重力感）
				const frameTimes = [150, 100, 80, 100, 60, 80];
				const currentFrameTime = frameTimes[currentFrame] / animationSpeed;
				
				if (timestamp - lastTime > 16) {
					frameProgress += 16;
					
					if (frameProgress >= currentFrameTime) {
						frameProgress = 0;
						currentFrame = (currentFrame + 1) % anim.frames.length;
					}
					
					ctx.clearRect(0, 0, canvas.width, canvas.height);
					
					// 计算画布尺寸
					const rect = canvas.getBoundingClientRect();
					const centerX = rect.width / 2;
					const centerY = rect.height / 2;
					
					// 绘制地面线
					const groundY = centerY + 85;
					ctx.strokeStyle = '#4ade80';
					ctx.lineWidth = 2;
					ctx.beginPath();
					ctx.moveTo(0, groundY);
					ctx.lineTo(rect.width, groundY);
					ctx.stroke();
					
					// 计算插值
					const pose1 = anim.frames[currentFrame];
					const pose2 = anim.frames[(currentFrame + 1) % anim.frames.length];
					const t = frameProgress / currentFrameTime;
					const pose = interpolatePose(pose1, pose2, t);
					
					// 绘制角色（放大2倍）
					ctx.save();
					ctx.translate(centerX, centerY + 40);
					ctx.scale(2.2, 2.2);
					drawCharacter(ctx, 0, 0, pose);
					ctx.restore();
					
					lastTime = timestamp;
				}
				
				requestAnimationFrame(loop);
			}
			
			requestAnimationFrame(loop);
		}
		
		// ========== UI ==========
		
		function createCards() {
			const container = document.getElementById('sprite-container');
			
			Object.keys(ANIMATIONS).forEach(key => {
				const anim = ANIMATIONS[key];
				const card = document.createElement('div');
				card.className = 'card';
				
				const title = document.createElement('div');
				title.className = 'card-title';
				title.textContent = anim.name;
				
				const info = document.createElement('div');
				info.className = 'card-info';
				info.textContent = `${anim.frames.length} 帧 · Garou风格`;
				
				const wrapper = document.createElement('div');
				wrapper.className = 'canvas-wrapper';
				
				const canvas = document.createElement('canvas');
				canvas.id = `canvas-${key}`;
				
				wrapper.appendChild(canvas);
				card.appendChild(title);
				card.appendChild(info);
				card.appendChild(wrapper);
				container.appendChild(card);
				
				setTimeout(() => playAnimation(key, canvas), 10);
			});
		}
		
		function setSpeed(speed) {
			animationSpeed = speed;
		}
		
		function togglePause() {
			isPaused = !isPaused;
		}
		
		function toggleSkin() {
			showSkin = !showSkin;
			const btn = document.getElementById('skin-btn');
			btn.textContent = showSkin ? '👤 皮肤: 开' : '👤 皮肤: 关';
			btn.classList.toggle('toggle-on', showSkin);
			btn.classList.toggle('toggle-off', !showSkin);
		}
		
		function toggleWire() {
			showWire = !showWire;
			const btn = document.getElementById('wire-btn');
			btn.textContent = showWire ? '🔲 线框: 开' : '🔲 线框: 关';
			btn.classList.toggle('toggle-on', showWire);
			btn.classList.toggle('toggle-off', !showWire);
		}
		
		function toggleJoints() {
			showJoints = !showJoints;
			const btn = document.getElementById('joint-btn');
			btn.textContent = showJoints ? '🔵 关节: 开' : '🔵 关节: 关';
			btn.classList.toggle('toggle-on', showJoints);
			btn.classList.toggle('toggle-off', !showJoints);
		}
		
		// 初始化
		createCards();
	</script>
</body>
</html>
