<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>格斗角色 - 骨骼动画展示</title>
	<style>

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
			color: #e0e0e0;
			padding: 20px;
			min-height: 100vh;

		h1 {

			font-size: 22px;
		}
		.subtitle {
			text-align: center;
			color: #888;
			margin-bottom: 20px;
			font-size: 13px;
		}
		.container {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
			gap: 15px;
			max-width: 1200px;
			margin: 0 auto;
		}
		.card {
			background: rgba(255, 255, 255, 0.05);
			border-radius: 10px;
			padding: 12px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			transition: transform 0.2s;
		}
		.card:hover {
			transform: translateY(-3px);
			border-color: #4ade80;
		}
		.card-title {
			font-size: 13px;
			color: #4ade80;
			margin-bottom: 6px;
			text-align: center;
		}
		.card-info {
			font-size: 10px;
			color: #666;
			text-align: center;
			margin-bottom: 8px;
		}
		.canvas-wrapper {
			position: relative;
			width: 100%;
			height: 160px;
			background: rgba(0, 0, 0, 0.5);
			border-radius: 6px;
			overflow: hidden;
		}
		canvas {
			width: 100%;
			height: 100%;
			image-rendering: pixelated;
		}
		.controls {
			text-align: center;
			margin-top: 20px;
			padding: 15px;
			background: rgba(255, 255, 255, 0.05);
			border-radius: 10px;
			max-width: 700px;
			margin-left: auto;
			margin-right: auto;
		}
		.controls h3 {
			color: #4ade80;
			margin-bottom: 12px;
			font-size: 14px;
		}
		.btn-group {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			justify-content: center;
			margin-bottom: 12px;
		}
		button {
			padding: 6px 14px;
			border: none;
			border-radius: 5px;
			background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
			color: white;
			font-size: 11px;
			cursor: pointer;
			transition: all 0.2s;
		}
		button:hover {

			box-shadow: 0 3px 10px rgba(34, 197, 94, 0.3);
		}
		button.toggle-on {
			background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);

		.back-link {

		.debug-legend {

			margin-top: 10px;

			color: #888;
		}
		.debug-legend span {
			display: flex;
			align-items: center;
			gap: 5px;
		}
		.legend-wire { width: 20px; height: 8px; border: 2px solid #4ade80; background: rgba(74, 222, 128, 0.2); }
		.legend-joint { width: 8px; height: 8px; border-radius: 50%; background: #fbbf24; }
		.legend-skin { width: 20px; height: 10px; background: rgba(232, 184, 154, 0.5); border: 1px solid #e8b89a; }
	</style>
</head>
<body>
	<a href="../index.html" class="back-link">← 返回首页</a>
	
	<h1>🥊 格斗角色 - 骨骼动画展示</h1>
	<p class="subtitle">线框骨骼系统 · 关节连接 · 高清渲染 · 调试模式</p>
	
	<div class="container" id="sprite-container"></div>
	
	<div class="controls">
		<h3>🎮 播放控制</h3>
		<div class="btn-group">
			<button onclick="setSpeed(1)">▶️ 正常</button>
			<button onclick="setSpeed(0.3)">🐢 慢速</button>
			<button onclick="setSpeed(2)">🐰 快速</button>
			<button onclick="togglePause()">⏸️ 暂停</button>
		</div>
		<h3>🔧 调试选项</h3>
		<div class="btn-group">
			<button id="skin-btn" class="toggle-on" onclick="toggleSkin()">👤 皮肤: 开</button>
			<button id="wire-btn" class="toggle-on" onclick="toggleWire()">🔲 线框: 开</button>
			<button id="joint-btn" class="toggle-on" onclick="toggleJoints()">🔵 关节: 开</button>
		</div>
		<div class="debug-legend">
			<span><span class="legend-wire"></span> 线框骨骼</span>
			<span><span class="legend-joint"></span> 关节点</span>
			<span><span class="legend-skin"></span> 皮肤</span>
		</div>
	</div>

	<script>
		// ========== 高清 Canvas 设置（参考 src/engine/utils/canvas.ts）==========
		function setupHighDPICanvas(canvas) {
			const ctx = canvas.getContext('2d');
			const rect = canvas.getBoundingClientRect();
			const dpr = window.devicePixelRatio || 1;
			
			canvas.width = Math.floor(rect.width * dpr);
			canvas.height = Math.floor(rect.height * dpr);
			ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
			
			return { ctx, rect, dpr, width: rect.width, height: rect.height };
		}
		
		// ========== 骨骼定义：线框+关节点系统 ==========
		// 每个肢体是一个线框，由两个关节点定义起点和终点
		// 确保无论如何旋转，肢体都紧密连接两个关节
		
		const LIMBS = {
			// 躯干（垂直）
			torso: { 
				startJoint: 'hips', endJoint: 'chest', 
				width: 14, color: '#e8b89a', z: 0 
			},
			// 头
			head: { 
				startJoint: 'chest', endJoint: 'head', 
				width: 12, color: '#e8b89a', z: 1 
			},
			// 左上臂
			upperArmL: { 
				startJoint: 'shoulderL', endJoint: 'elbowL', 
				width: 5, color: '#d4a080', z: -1 
			},
			// 左前臂
			lowerArmL: { 
				startJoint: 'elbowL', endJoint: 'handL', 
				width: 4.5, color: '#e8b89a', z: -1 
			},
			// 左手（拳套）
			handL: { 
				startJoint: 'handL', endJoint: 'handLTip', 
				width: 6, color: '#8b4513', z: -1 
			},
			// 右上臂
			upperArmR: { 
				startJoint: 'shoulderR', endJoint: 'elbowR', 
				width: 5, color: '#e8b89a', z: 1 
			},
			// 右前臂
			lowerArmR: { 
				startJoint: 'elbowR', endJoint: 'handR', 
				width: 4.5, color: '#e8b89a', z: 1 
			},
			// 右手（拳套）
			handR: { 
				startJoint: 'handR', endJoint: 'handRTip', 
				width: 6, color: '#8b4513', z: 1 
			},
			// 左大腿
			thighL: { 
				startJoint: 'hips', endJoint: 'kneeL', 
				width: 7, color: '#1e3a5f', z: -1 
			},
			// 左小腿
			shinL: { 
				startJoint: 'kneeL', endJoint: 'footL', 
				width: 5.5, color: '#e8b89a', z: -1 
			},
			// 左脚
			footL: { 
				startJoint: 'footL', endJoint: 'footLToe', 
				width: 4, color: '#333333', z: -1 
			},
			// 右大腿
			thighR: { 
				startJoint: 'hips', endJoint: 'kneeR', 
				width: 7, color: '#2e4a6f', z: 1 
			},
			// 右小腿
			shinR: { 
				startJoint: 'kneeR', endJoint: 'footR', 
				width: 5.5, color: '#d4a080', z: 1 
			},
			// 右脚
			footR: { 
				startJoint: 'footR', endJoint: 'footRToe', 
				width: 4, color: '#333333', z: 1 
			}
		};
		
		// 关节定义（相对于父关节的偏移）
		const JOINTS = {
			// 根关节
			hips: { x: 0, y: 0, parent: null, children: ['spine', 'thighL', 'thighR'] },
			// 脊柱
			spine: { x: 0, y: -20, parent: 'hips', children: ['chest'] },
			// 胸部
			chest: { x: 0, y: -18, parent: 'spine', children: ['head', 'shoulderL', 'shoulderR'] },
			// 头部
			head: { x: 4, y: -12, parent: 'chest', children: [] },
			// 左肩
			shoulderL: { x: -7, y: -6, parent: 'chest', children: ['elbowL'] },
			// 左肘
			elbowL: { x: -2, y: 10, parent: 'shoulderL', children: ['handL'] },
			// 左手
			handL: { x: 0, y: 10, parent: 'elbowL', children: ['handLTip'] },
			// 左手指尖（用于拳套方向）
			handLTip: { x: 2, y: 4, parent: 'handL', children: [] },
			// 右肩
			shoulderR: { x: 7, y: -6, parent: 'chest', children: ['elbowR'] },
			// 右肘
			elbowR: { x: 2, y: 10, parent: 'shoulderR', children: ['handR'] },
			// 右手
			handR: { x: 0, y: 10, parent: 'elbowR', children: ['handRTip'] },
			// 右手指尖
			handRTip: { x: 2, y: 4, parent: 'handR', children: [] },
			// 左膝
			kneeL: { x: 0, y: 14, parent: 'hips', children: ['footL'] },
			// 左脚
			footL: { x: 0, y: 14, parent: 'kneeL', children: ['footLToe'] },
			// 左脚尖
			footLToe: { x: 4, y: 0, parent: 'footL', children: [] },
			// 右膝
			kneeR: { x: 0, y: 14, parent: 'hips', children: ['footR'] },
			// 右脚
			footR: { x: 0, y: 14, parent: 'kneeR', children: ['footRToe'] },
			// 右脚尖
			footRToe: { x: 4, y: 0, parent: 'footR', children: [] }
		};
		
		// ========== 动画系统 ==========
		
		const ANIMATIONS = {
			idle: {
				name: '待机 (Idle)',
				frames: [
					{ elbowL: 10, handL: 5, elbowR: -10, handR: 5, kneeL: -5, footL: 5, kneeR: 5, footR: 5 },
					{ elbowL: 8, handL: 8, elbowR: -8, handR: 8, kneeL: -3, footL: 3, kneeR: 3, footR: 3 },
					{ elbowL: 10, handL: 5, elbowR: -10, handR: 5, kneeL: -5, footL: 5, kneeR: 5, footR: 5 },
					{ elbowL: 12, handL: 3, elbowR: -12, handR: 3, kneeL: -7, footL: 7, kneeR: 7, footR: 7 }
				]
			},
			walk: {
				name: '行走 (Walk)',
				frames: [
					{ kneeL: -25, footL: 20, kneeR: 25, footR: 10, elbowL: 20, elbowR: -20, spine: 2 },
					{ kneeL: 0, footL: 5, kneeR: 0, footR: 5, elbowL: 0, elbowR: 0, spine: 0 },
					{ kneeL: 25, footL: 10, kneeR: -25, footR: 20, elbowL: -20, elbowR: 20, spine: -2 },
					{ kneeL: 0, footL: 5, kneeR: 0, footR: 5, elbowL: 0, elbowR: 0, spine: 0 }
				]
			},
			guard: {
				name: '防御 (Guard)',
				frames: [
					{ elbowL: -100, handL: -80, elbowR: -100, handR: -80, spine: -8, shoulderL: -10, shoulderR: 10 },
					{ elbowL: -95, handL: -75, elbowR: -95, handR: -75, spine: -6, shoulderL: -8, shoulderR: 8 }
				]
			},
			lightPunch: {
				name: '轻拳 (Light)',
				frames: [
					{ elbowR: 0, handR: 0, shoulderR: 0 },
					{ elbowR: -40, handR: -10, shoulderR: -5 },
					{ elbowR: -90, handR: 0, shoulderR: -10 },
					{ elbowR: 0, handR: 0, shoulderR: 0 }
				]
			},
			heavyPunch: {
				name: '重拳 (Heavy)',
				frames: [
					{ elbowR: 0, handR: 0, spine: 0 },
					{ elbowR: 40, handR: 30, spine: -8 },
					{ elbowR: 50, handR: 40, spine: -12 },
					{ elbowR: -100, handR: 0, spine: 15 },
					{ elbowR: -100, handR: 0, spine: 20 },
					{ elbowR: 0, handR: 0, spine: 0 }
				]
			},
			lightKick: {
				name: '轻脚 (Low Kick)',
				frames: [
					{ kneeL: 0, footL: 0, elbowL: 0 },
					{ kneeL: 35, footL: 10, elbowL: -20 },
					{ kneeL: 60, footL: 5, elbowL: -40 },
					{ kneeL: 0, footL: 0, elbowL: 0 }
				]
			},
			heavyKick: {
				name: '重脚 (High Kick)',
				frames: [
					{ kneeL: 0, footL: 0, elbowL: 0 },
					{ kneeL: -40, footL: 80, elbowL: -70 },
					{ kneeL: -80, footL: 10, elbowL: -110 },
					{ kneeL: 0, footL: 0, elbowL: 0 }
				]
			},
			jump: {
				name: '跳跃 (Jump)',
				frames: [
					{ hipsY: 0, kneeL: 0, footL: 0, kneeR: 0, footR: 0, elbowL: 0, elbowR: 0 },
					{ hipsY: 0, kneeL: -40, footL: 80, kneeR: -40, footR: 80, elbowL: -110, elbowR: -110 },
					{ hipsY: -40, kneeL: -30, footL: 40, kneeR: -30, footR: 40, elbowL: -130, elbowR: -130 },
					{ hipsY: -60, kneeL: -10, footL: 10, kneeR: -10, footR: 10, elbowL: -130, elbowR: -130 },
					{ hipsY: -30, kneeL: -30, footL: 40, kneeR: -30, footR: 40, elbowL: -110, elbowR: -110 },
					{ hipsY: 0, kneeL: 0, footL: 0, kneeR: 0, footR: 0, elbowL: 0, elbowR: 0 }
				]
			},
			jumpAttack: {
				name: '跳攻 (Jump Atk)',
				frames: [
					{ hipsY: -40, elbowR: -110, handR: -30 },
					{ hipsY: -60, elbowR: -140, handR: -40 },
					{ hipsY: -20, elbowR: 0, handR: 0 }
				]
			},
			hit: {
				name: '被击中 (Hit)',
				frames: [
					{ spine: 0, head: 0, elbowL: 0, elbowR: 0 },
					{ spine: -20, head: -15, elbowL: -30, elbowR: 20 },
					{ spine: -15, head: -10, elbowL: -20, elbowR: 10 }
				]
			},
			knockdown: {
				name: '击倒 (KO)',
				frames: [
					{ spine: 0, hipsY: 0 },
					{ spine: -40, hipsY: 10 },
					{ spine: -80, hipsY: 30 },
					{ spine: -90, hipsY: 50 },
					{ spine: 0, hipsY: 0 }
				]
			},
			dash: {
				name: '冲刺 (Dash)',
				frames: [
					{ spine: -15, elbowL: -60, handL: -30, elbowR: -80, handR: 0, kneeL: -30, footL: 10, kneeR: 40, footR: 10 },
					{ spine: -10, elbowL: -40, handL: 0, elbowR: -60, handR: -30, kneeL: 40, footL: 10, kneeR: -30, footR: 10 }
				]
			}
		};
		
		// ========== 计算关节位置 ==========
		function calculateJointPositions(rootX, rootY, rotations) {
			const positions = {};
			const RAD = Math.PI / 180;
			
			// 髋部是根
			const hipsY = rootY + (rotations.hipsY || 0);
			positions.hips = { x: rootX, y: hipsY };
			
			function calcJoint(jointName, parentX, parentY, parentAngle) {
				const joint = JOINTS[jointName];
				if (!joint) return;
				
				const rotation = (rotations[jointName] || 0) + parentAngle;
				const rad = rotation * RAD;
				
				const worldX = parentX + joint.x * Math.cos(rad) - joint.y * Math.sin(rad);
				const worldY = parentY + joint.x * Math.sin(rad) + joint.y * Math.cos(rad);
				
				positions[jointName] = { x: worldX, y: worldY, angle: rotation };
				
				// 递归子关节
				if (joint.children) {
					joint.children.forEach(child => {
						calcJoint(child, worldX, worldY, rotation);
					});
				}
			}
			
			// 从脊柱开始
			calcJoint('spine', rootX, hipsY, 0);
			// 左腿
			calcJoint('kneeL', rootX, hipsY, 0);
			// 右腿
			calcJoint('kneeR', rootX, hipsY, 0);
			
			return positions;
		}
		
		// ========== 渲染系统 ==========
		
		let showSkin = true;
		let showWire = true;
		let showJoints = true;
		
		// 绘制线框（连接两个关节的矩形）
		function drawWireframe(ctx, positions) {
			if (!showWire) return;
			
			Object.keys(LIMBS).forEach(limbName => {
				const limb = LIMBS[limbName];
				const start = positions[limb.startJoint];
				const end = positions[limb.endJoint];
				if (!start || !end) return;
				
				const dx = end.x - start.x;
				const dy = end.y - start.y;
				const length = Math.sqrt(dx * dx + dy * dy);
				const angle = Math.atan2(dy, dx);
				const width = limb.width;
				
				ctx.save();
				ctx.translate(start.x, start.y);
				ctx.rotate(angle);
				
				// 线框边框
				ctx.strokeStyle = '#4ade80';
				ctx.lineWidth = 1.5;
				ctx.strokeRect(0, -width/2, length, width);
				
				// 半透明填充
				ctx.fillStyle = 'rgba(74, 222, 128, 0.1)';
				ctx.fillRect(0, -width/2, length, width);
				
				ctx.restore();
			});
		}
		
		// 绘制皮肤（填充线框内部）
		function drawSkin(ctx, positions) {
			if (!showSkin) return;
			
			// 按z轴排序
			const sortedLimbs = Object.keys(LIMBS).sort((a, b) => LIMBS[a].z - LIMBS[b].z);
			
			sortedLimbs.forEach(limbName => {
				const limb = LIMBS[limbName];
				const start = positions[limb.startJoint];
				const end = positions[limb.endJoint];
				if (!start || !end) return;
				
				const dx = end.x - start.x;
				const dy = end.y - start.y;
				const length = Math.sqrt(dx * dx + dy * dy);
				const angle = Math.atan2(dy, dx);
				const width = limb.width - 2; // 比线框略小
				
				ctx.save();
				ctx.translate(start.x, start.y);
				ctx.rotate(angle);
				
				// 皮肤填充
				ctx.fillStyle = limb.color;
				ctx.fillRect(1, -width/2, length - 1, width);
				
				ctx.restore();
			});
		}
		
		// 绘制关节点
		function drawJoints(ctx, positions) {
			if (!showJoints) return;
			
			Object.keys(positions).forEach(jointName => {
				const pos = positions[jointName];
				const size = JOINTS[jointName]?.children?.length > 0 ? 4 : 2.5;
				
				// 关节圆点
				ctx.fillStyle = '#fbbf24';
				ctx.beginPath();
				ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
				ctx.fill();
				
				// 中心白点
				ctx.fillStyle = '#fff';
				ctx.beginPath();
				ctx.arc(pos.x, pos.y, size * 0.4, 0, Math.PI * 2);
				ctx.fill();
			});
		}
		
		// 绘制角色
		function drawCharacter(ctx, rootX, rootY, rotations) {
			const positions = calculateJointPositions(rootX, rootY, rotations);
			
			// 绘制顺序：线框 → 皮肤 → 关节点
			drawWireframe(ctx, positions);
			drawSkin(ctx, positions);
			drawJoints(ctx, positions);
			
			return positions;
		}
		
		// ========== 动画系统 ==========
		
		let animationSpeed = 1;
		let isPaused = false;
		const animationStates = {};
		
		function interpolatePose(pose1, pose2, t) {
			const result = {};
			const allKeys = new Set([...Object.keys(pose1 || {}), ...Object.keys(pose2 || {})]);
			allKeys.forEach(key => {
				const v1 = pose1?.[key] || 0;
				const v2 = pose2?.[key] || 0;
				result[key] = v1 + (v2 - v1) * t;
			});
			return result;
		}
		
		function playAnimation(key, canvas) {
			// 设置高清canvas
			const { ctx } = setupHighDPICanvas(canvas);
			const anim = ANIMATIONS[key];
			
			let currentFrame = 0;
			let frameProgress = 0;
			let lastTime = 0;
			
			animationStates[key] = { currentFrame, ctx, anim, canvas };
			
			function loop(timestamp) {
				if (isPaused) {
					requestAnimationFrame(loop);
					return;
				}
				
				const frameDuration = 150 / animationSpeed;
				
				if (timestamp - lastTime > 16) {
					frameProgress += 16;
					
					if (frameProgress >= frameDuration) {
						frameProgress = 0;
						currentFrame = (currentFrame + 1) % anim.frames.length;
					}
					
					// 清空画布（使用高清canvas的坐标系）
					ctx.clearRect(0, 0, canvas.width, canvas.height);
					
					// 绘制地面线
					ctx.strokeStyle = '#4ade80';
					ctx.lineWidth = 2;
					ctx.beginPath();
					ctx.moveTo(0, 130);
					ctx.lineTo(200, 130);
					ctx.stroke();
					
					// 计算插值姿势
					const pose1 = anim.frames[currentFrame];
					const pose2 = anim.frames[(currentFrame + 1) % anim.frames.length];
					const t = frameProgress / frameDuration;
					const pose = interpolatePose(pose1, pose2, t);
					
					// 绘制角色（60是CSS像素坐标，高清canvas会自动缩放）
					drawCharacter(ctx, 60, 90, pose);
					
					lastTime = timestamp;
				}
				
				requestAnimationFrame(loop);
			}
			
			requestAnimationFrame(loop);
		}
		
		// ========== UI ==========
		
		function createCards() {
			const container = document.getElementById('sprite-container');
			
			Object.keys(ANIMATIONS).forEach(key => {
				const anim = ANIMATIONS[key];
				const card = document.createElement('div');
				card.className = 'card';
				
				const title = document.createElement('div');
				title.className = 'card-title';
				title.textContent = anim.name;
				
				const info = document.createElement('div');
				info.className = 'card-info';
				info.textContent = `${anim.frames.length} 关键帧`;
				
				const wrapper = document.createElement('div');
				wrapper.className = 'canvas-wrapper';
				
				const canvas = document.createElement('canvas');
				// 不设置width/height属性，让CSS控制，然后在playAnimation里设置高清尺寸
				canvas.id = `canvas-${key}`;
				
				wrapper.appendChild(canvas);
				card.appendChild(title);
				card.appendChild(info);
				card.appendChild(wrapper);
				container.appendChild(card);
				
				// 延迟一点确保DOM已渲染
				setTimeout(() => playAnimation(key, canvas), 10);
			});
		}
		
		function setSpeed(speed) {
			animationSpeed = speed;
		}
		
		function togglePause() {
			isPaused = !isPaused;
		}
		
		function toggleSkin() {
			showSkin = !showSkin;
			const btn = document.getElementById('skin-btn');
			btn.textContent = showSkin ? '👤 皮肤: 开' : '👤 皮肤: 关';
			btn.classList.toggle('toggle-on', showSkin);
			btn.classList.toggle('toggle-off', !showSkin);
		}
		
		function toggleWire() {
			showWire = !showWire;
			const btn = document.getElementById('wire-btn');
			btn.textContent = showWire ? '🔲 线框: 开' : '🔲 线框: 关';
			btn.classList.toggle('toggle-on', showWire);
			btn.classList.toggle('toggle-off', !showWire);
		}
		
		function toggleJoints() {
			showJoints = !showJoints;
			const btn = document.getElementById('joint-btn');
			btn.textContent = showJoints ? '🔵 关节: 开' : '🔵 关节: 关';
			btn.classList.toggle('toggle-on', showJoints);
			btn.classList.toggle('toggle-off', !showJoints);
		}
		
		// 初始化
		createCards();
	</script>
</body>
</html>
