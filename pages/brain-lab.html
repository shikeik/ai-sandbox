<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
	<title>Brain Lab - 平台跳跃实验室</title>
	<link rel="stylesheet" href="/src/engine/console/console.css">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: #0a0a14;
			color: #fff;
			min-height: 100vh;
			padding: 8px;
			padding-bottom: 80px;
		}

		/* 标题 */
		.header {
			text-align: center;
			margin-bottom: 10px;
		}

		.header h1 {
			font-size: 18px;
			color: #64b5f6;
			margin-bottom: 3px;
		}

		.header p {
			font-size: 12px;
			color: #888;
		}

		/* 游戏世界区域 */
		.world-section {
			background: #151520;
			border-radius: 12px;
			padding: 10px;
			margin-bottom: 10px;
		}

		.world-title {
			font-size: 12px;
			color: #888;
			margin-bottom: 8px;
			display: flex;
			justify-content: space-between;
		}

		/* 世界容器 */
		#world-container {
			width: 100%;
			height: 170px;
			position: relative;
		}

		/* 世界层容器 */
		.world-layers {
			position: relative;
			display: flex;
			justify-content: center;
		}

		.layer-grid, .layer-objects, .layer-effects {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
		}

		.layer-objects, .layer-effects {
			pointer-events: none;
		}

		/* 格子样式 */
		.cell {
			width: 28px;
			height: 28px;
			border-radius: 6px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 16px;
		}

		/* 格子类型 */
		.cell.air {
			background: rgba(26, 26, 46, 0.5);
			border: 1px dashed rgba(100, 100, 150, 0.2);
		}

		/* 平台 - 支撑块设计（实心但有立体感） */
		.cell.platform {
			background: linear-gradient(180deg, #3ddc84 0%, #27ae60 60%, #1e8449 100%);
			border: 2px solid #2ecc71;
			border-radius: 4px;
			position: relative;
			box-shadow: 
				inset 0 2px 0 rgba(255,255,255,0.3),
				inset 0 -2px 0 rgba(0,0,0,0.2),
				0 2px 4px rgba(0,0,0,0.3);
		}

		.cell.platform::before {
			content: '';
			position: absolute;
			top: 4px;
			left: 4px;
			right: 4px;
			height: 2px;
			background: rgba(255,255,255,0.4);
			border-radius: 2px;
		}

		.cell.goal {
			background: transparent;
			border: none;
			font-size: 18px;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* 游戏对象 */
		.game-object {
			transition: none;
			filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
		}

		.game-object.hero {
			filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
		}

		/* 按钮底座 */
		.cell.button-base {
			background: rgba(52, 152, 219, 0.2);
			border: 2px dashed rgba(52, 152, 219, 0.3);
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* 按钮图标 */
		.button-icon {
			width: 18px;
			height: 18px;
			background: radial-gradient(circle, #64b5f6 0%, #3498db 70%);
			border-radius: 50%;
			box-shadow: 
				0 2px 4px rgba(52, 152, 219, 0.4),
				inset 0 -1px 2px rgba(0,0,0,0.2);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 10px;
		}

		/* 粒子效果 */
		.particle {
			pointer-events: none;
		}

		/* 动画关键帧 */
		@keyframes bounce {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(-4px); }
		}

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.6; }
		}

		@keyframes shake {
			0%, 100% { transform: translateX(0); }
			25% { transform: translateX(-2px); }
			75% { transform: translateX(2px); }
		}

		/* 操作区域 */
		.control-section {
			background: #151520;
			border-radius: 12px;
			padding: 10px;
			margin-bottom: 10px;
		}

		/* 控制区 - 模仿狐狸跳跃 */
		.control-area {
			display: flex;
			flex-direction: column;
			gap: 16px;
			padding: 12px 16px;
			align-items: center;
		}

		/* 按钮排 - 上下两排 */
		.btn-row {
			display: flex;
			justify-content: center;
			gap: 12px;
			width: 100%;
			max-width: 320px;
		}

		/* 按钮基础样式 */
		.ctrl-btn {
			flex: 1;
			height: 56px;
			border: none;
			border-radius: 16px;
			font-size: 20px;
			cursor: pointer;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
			position: relative;
			transition: transform 0.05s;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.ctrl-btn:active {
			transform: scale(0.92);
		}

		/* 按钮标签 */
		.btn-label {
			position: absolute;
			bottom: -18px;
			left: 50%;
			transform: translateX(-50%);
			font-size: 10px;
			color: #888;
			white-space: nowrap;
		}

		/* 移动按钮 - 绿色 */
		#btn-left, #btn-right {
			background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
			box-shadow: 0 4px 0 #166534, 0 5px 15px rgba(39, 174, 96, 0.4);
			color: white;
			max-width: 120px;
		}

		#btn-left:active, #btn-right:active {
			box-shadow: 0 2px 0 #166534, 0 3px 8px rgba(39, 174, 96, 0.4);
			transform: translateY(2px) scale(0.92);
		}

		/* 跳跃按钮 - 橙色 */
		#btn-jump-left, #btn-jump-right {
			background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
			box-shadow: 0 4px 0 #9c5710, 0 5px 15px rgba(243, 156, 18, 0.4);
			color: white;
		}

		#btn-jump-left:active, #btn-jump-right:active {
			box-shadow: 0 2px 0 #9c5710, 0 3px 8px rgba(243, 156, 18, 0.4);
			transform: translateY(2px) scale(0.92);
		}

		/* 远跳按钮 - 蓝色 */
		#btn-jump-left-far, #btn-jump-right-far {
			background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
			box-shadow: 0 4px 0 #1f5f8b, 0 5px 15px rgba(52, 152, 219, 0.4);
			color: white;
		}

		#btn-jump-left-far:active, #btn-jump-right-far:active {
			box-shadow: 0 2px 0 #1f5f8b, 0 3px 8px rgba(52, 152, 219, 0.4);
			transform: translateY(2px) scale(0.92);
		}

		/* 水平翻转符号（用于左跳按钮） */
		.flip-h {
			display: inline-block;
			transform: scaleX(-1);
		}

		/* 动作按钮行 */
		.action-buttons {
			display: flex;
			gap: 10px;
			justify-content: center;
		}

		.action-btn {
			padding: 10px 20px;
			background: #9b59b6;
			border: none;
			border-radius: 8px;
			color: white;
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s;
		}

		.action-btn:hover {
			background: #b779d6;
		}

		.action-btn:active {
			background: #7d3c98;
			transform: scale(0.98);
		}

		/* 图例 */
		.legend {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			padding-top: 6px;
			border-top: 1px solid #2a2a3e;
		}

		.legend-item {
			display: flex;
			align-items: center;
			gap: 4px;
			font-size: 10px;
			color: #888;
		}

		.legend-icon {
			width: 14px;
			height: 14px;
			border-radius: 3px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 9px;
		}

		/* 消息提示 - 亮色 Android Toast 风格 */
		.message {
			position: fixed;
			bottom: 40px;
			left: 50%;
			transform: translateX(-50%);
			background: rgba(255, 255, 255, 0.95);
			color: #333;
			padding: 10px 20px;
			border-radius: 24px;
			font-size: 13px;
			font-weight: 500;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.2s;
			z-index: 1000;
			box-shadow: 0 4px 16px rgba(0,0,0,0.2);
		}

		.message.show {
			opacity: 1;
		}
	</style>
</head>
<body>
	<!-- 标题 -->
	<div class="header">
		<h1>🧠 Brain Lab</h1>
		<p>平台跳跃实验室</p>
	</div>

	<!-- 游戏世界 -->
	<div class="world-section">
		<div class="world-title">
			<span>🎮 游戏世界</span>
			<span style="color: #666;">左下坐标系</span>
		</div>
		<div id="world-container"></div>
	</div>

	<!-- 操作区域 -->
	<div class="control-section">
		<div class="control-area">
			<!-- 上排: 4个跳跃按钮 -->
			<div class="btn-row">
				<button class="ctrl-btn" id="btn-jump-left-far">
					<span class="flip-h">⤴⤴</span>
					<span class="btn-label">左远跳 (x-2)</span>
				</button>
				<button class="ctrl-btn" id="btn-jump-left">
					<span class="flip-h">⤴</span>
					<span class="btn-label">左跳 (↑x-1)</span>
				</button>
				<button class="ctrl-btn" id="btn-jump-right">
					⤴
					<span class="btn-label">右跳 (↑x+1)</span>
				</button>
				<button class="ctrl-btn" id="btn-jump-right-far">
					⤴⤴
					<span class="btn-label">右远跳 (x+2)</span>
				</button>
			</div>

			<!-- 下排: 2个移动按钮 -->
			<div class="btn-row">
				<button class="ctrl-btn" id="btn-left">
					⬅
					<span class="btn-label">左移 (x-1)</span>
				</button>
				<button class="ctrl-btn" id="btn-right">
					➡
					<span class="btn-label">右移 (x+1)</span>
				</button>
			</div>

			<!-- 重置和切换关卡 -->
			<div class="action-buttons" style="margin-top: 20px;">
				<button id="btn-reset" class="action-btn">🔄 重置</button>
				<button id="btn-switch-level" class="action-btn">🗺️ 切换地图</button>
			</div>
		</div>

		<!-- 图例 -->
		<div class="legend">
			<div class="legend-item">
				<div class="legend-icon" style="background: #2ecc71;"></div>
				<span>平台</span>
			</div>
			<div class="legend-item">
				<div class="legend-icon" style="background: #9b59b6;">🔘</div>
				<span>按钮</span>
			</div>
			<div class="legend-item">
				<div class="legend-icon" style="background: #f39c12;">🏁</div>
				<span>终点</span>
			</div>
			<div class="legend-item">
				<div class="legend-icon" style="background: rgba(231, 76, 60, 0.3);">👿</div>
				<span>敌人</span>
			</div>
			<div class="legend-item">
				<div class="legend-icon" style="background: #3498db;">🦊</div>
				<span>狐狸</span>
			</div>
		</div>
	</div>

	<!-- 控制台面板 -->
	<div id="console-panel" class="console-panel"></div>

	<!-- 消息 -->
	<div id="message" class="message"></div>

	<script type="module" src="/src/brain-lab/main.ts"></script>
</body>
</html>
