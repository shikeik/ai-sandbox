<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
	<title>Brain Lab - 有大脑的AI</title>
	<link rel="stylesheet" href="/src/engine/console/console.css">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: #0a0a14;
			color: #fff;
			min-height: 100vh;
			padding: 8px;
			padding-bottom: 80px;
		}

		/* 标题 */
		.header {
			text-align: center;
			margin-bottom: 10px;
		}

		.header h1 {
			font-size: 18px;
			color: #64b5f6;
			margin-bottom: 3px;
		}

		.header p {
			font-size: 12px;
			color: #888;
		}

		/* 游戏世界区域 */
		.world-section {
			background: #151520;
			border-radius: 12px;
			padding: 10px;
			margin-bottom: 10px;
		}

		.world-title {
			font-size: 12px;
			color: #888;
			margin-bottom: 8px;
			display: flex;
			justify-content: space-between;
		}

		/* 世界容器 */
		#world-container {
			width: 100%;
			height: 170px;
			position: relative;
		}

		/* 世界层容器 */
		.world-layers {
			position: relative;
			display: flex;
			justify-content: center;
		}

		.layer-grid, .layer-objects, .layer-effects {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
		}

		.layer-objects, .layer-effects {
			pointer-events: none;
		}

		/* 格子样式 */
		.cell {
			width: 28px;
			height: 28px;
			border-radius: 6px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 16px;
		}

		/* 格子类型 */
		.cell.air {
			background: rgba(26, 26, 46, 0.5);
			border: 1px dashed rgba(100, 100, 150, 0.2);
		}

		/* 平台 - 支撑块设计（实心但有立体感） */
		.cell.platform {
			background: linear-gradient(180deg, #3ddc84 0%, #27ae60 60%, #1e8449 100%);
			border: 2px solid #2ecc71;
			border-radius: 4px;
			position: relative;
			box-shadow: 
				inset 0 2px 0 rgba(255,255,255,0.3),
				inset 0 -2px 0 rgba(0,0,0,0.2),
				0 2px 4px rgba(0,0,0,0.3);
		}

		.cell.platform::before {
			content: '';
			position: absolute;
			top: 4px;
			left: 4px;
			right: 4px;
			height: 2px;
			background: rgba(255,255,255,0.4);
			border-radius: 2px;
		}

		.cell.goal {
			background: transparent;
			border: none;
			font-size: 18px;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* 游戏对象 */
		.game-object {
			transition: none;
			filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
		}

		.game-object.hero {
			filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
		}

		/* 按钮底座 */
		.cell.button-base {
			background: rgba(52, 152, 219, 0.2);
			border: 2px dashed rgba(52, 152, 219, 0.3);
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* 按钮图标 */
		.button-icon {
			width: 18px;
			height: 18px;
			background: radial-gradient(circle, #64b5f6 0%, #3498db 70%);
			border-radius: 50%;
			box-shadow: 
				0 2px 4px rgba(52, 152, 219, 0.4),
				inset 0 -1px 2px rgba(0,0,0,0.2);
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 10px;
		}

		/* 粒子效果 */
		.particle {
			pointer-events: none;
		}

		/* 动画关键帧 */
		@keyframes bounce {
			0%, 100% { transform: translateY(0); }
			50% { transform: translateY(-4px); }
		}

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.6; }
		}

		@keyframes shake {
			0%, 100% { transform: translateX(0); }
			25% { transform: translateX(-2px); }
			75% { transform: translateX(2px); }
		}

		/* 操作区域（Tab切换） */
		.control-section {
			background: #151520;
			border-radius: 12px;
			padding: 10px;
			margin-bottom: 10px;
		}

		/* Tab头部 */
		.tab-header {
			display: flex;
			gap: 6px;
			margin-bottom: 8px;
			border-bottom: 1px solid #2a2a3e;
			padding-bottom: 6px;
		}

		.tab-btn {
			flex: 1;
			padding: 8px;
			background: transparent;
			border: 1px solid transparent;
			border-radius: 8px;
			color: #888;
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 4px;
		}

		.tab-btn:hover {
			background: rgba(100, 100, 150, 0.1);
			color: #aaa;
		}

		.tab-btn.active {
			background: rgba(155, 89, 182, 0.2);
			border-color: #9b59b6;
			color: #b779d6;
		}

		/* Tab内容 */
		.tab-content {
			display: none;
		}

		.tab-content.active {
			display: block;
		}

		/* AI控制面板 */
		.ai-controls {
			display: flex;
			flex-direction: column;
			gap: 6px;
		}

		.ai-buttons {
			display: flex;
			gap: 6px;
		}

		.btn {
			flex: 1;
			padding: 10px 12px;
			border: none;
			border-radius: 8px;
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 4px;
		}

		.btn-primary {
			background: #3498db;
			color: white;
		}

		.btn-primary:active {
			background: #2980b9;
			transform: scale(0.98);
		}

		.btn-secondary {
			background: #2ecc71;
			color: white;
		}

		.btn-secondary:active {
			background: #27ae60;
			transform: scale(0.98);
		}

		.btn-danger {
			background: #e74c3c;
			color: white;
		}

		.btn-danger:active {
			background: #c0392b;
			transform: scale(0.98);
		}

		.slider-row {
			display: flex;
			align-items: center;
			gap: 8px;
			padding-top: 4px;
			border-top: 1px solid #2a2a3e;
		}

		.slider-label {
			font-size: 10px;
			color: #888;
			white-space: nowrap;
		}

		.slider {
			flex: 1;
			-webkit-appearance: none;
			height: 4px;
			border-radius: 2px;
			background: #2a2a3e;
			outline: none;
		}

		.slider::-webkit-slider-thumb {
			-webkit-appearance: none;
			width: 14px;
			height: 14px;
			border-radius: 50%;
			background: #9b59b6;
			cursor: pointer;
		}

		.slider-value {
			font-size: 11px;
			color: #9b59b6;
			font-weight: bold;
			min-width: 16px;
			text-align: center;
		}

		/* 手动控制面板 */
		.manual-controls {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		/* 控制区 - 模仿狐狸跳跃 */
		.control-area {
			display: flex;
			flex-direction: column;
			gap: 16px;
			padding: 12px 16px;
			align-items: center;
		}

		/* 按钮排 - 上下两排 */
		.btn-row {
			display: flex;
			justify-content: center;
			gap: 12px;
			width: 100%;
			max-width: 320px;
		}

		/* 按钮基础样式 */
		.ctrl-btn {
			flex: 1;
			height: 56px;
			border: none;
			border-radius: 16px;
			font-size: 20px;
			cursor: pointer;
			user-select: none;
			-webkit-tap-highlight-color: transparent;
			position: relative;
			transition: transform 0.05s;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.ctrl-btn:active {
			transform: scale(0.92);
		}

		/* 按钮标签 */
		.btn-label {
			position: absolute;
			bottom: -18px;
			left: 50%;
			transform: translateX(-50%);
			font-size: 10px;
			color: #888;
			white-space: nowrap;
		}

		/* 移动按钮 - 绿色 */
		#btn-left, #btn-right {
			background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
			box-shadow: 0 4px 0 #166534, 0 5px 15px rgba(39, 174, 96, 0.4);
			color: white;
			max-width: 120px;
		}

		#btn-left:active, #btn-right:active {
			box-shadow: 0 2px 0 #166534, 0 3px 8px rgba(39, 174, 96, 0.4);
			transform: translateY(2px) scale(0.92);
		}

		/* 跳跃按钮 - 橙色 */
		#btn-jump-left, #btn-jump-right {
			background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
			box-shadow: 0 4px 0 #9c5710, 0 5px 15px rgba(243, 156, 18, 0.4);
			color: white;
		}

		#btn-jump-left:active, #btn-jump-right:active {
			box-shadow: 0 2px 0 #9c5710, 0 3px 8px rgba(243, 156, 18, 0.4);
			transform: translateY(2px) scale(0.92);
		}

		/* 远跳按钮 - 蓝色 */
		#btn-jump-left-far, #btn-jump-right-far {
			background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
			box-shadow: 0 4px 0 #1f5f8b, 0 5px 15px rgba(52, 152, 219, 0.4);
			color: white;
		}

		#btn-jump-left-far:active, #btn-jump-right-far:active {
			box-shadow: 0 2px 0 #1f5f8b, 0 3px 8px rgba(52, 152, 219, 0.4);
			transform: translateY(2px) scale(0.92);
		}

		/* 动作按钮行 */
		.action-buttons {
			display: flex;
			gap: 10px;
			justify-content: center;
		}

		.action-btn {
			padding: 10px 20px;
			background: #9b59b6;
			border: none;
			border-radius: 8px;
			color: white;
			font-size: 12px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.2s;
		}

		.action-btn:hover {
			background: #b779d6;
		}

		.action-btn:active {
			background: #7d3c98;
			transform: scale(0.98);
		}

		/* 当前状态显示 */
		.status-display {
			background: #0a0a14;
			border-radius: 12px;
			padding: 12px 16px;
			text-align: center;
		}

		.status-title {
			font-size: 12px;
			color: #666;
			margin-bottom: 4px;
		}

		.status-value {
			font-size: 18px;
			color: #fff;
			font-weight: 600;
		}

		/* 图例 */
		.legend {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			padding-top: 6px;
			border-top: 1px solid #2a2a3e;
		}

		.legend-item {
			display: flex;
			align-items: center;
			gap: 4px;
			font-size: 10px;
			color: #888;
		}

		.legend-icon {
			width: 14px;
			height: 14px;
			border-radius: 3px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 9px;
		}

		/* 大脑思考区域（现在在Tab内） */
		.brain-panel {
			background: #0a0a14;
			border-radius: 8px;
			padding: 6px;
			margin-bottom: 6px;
		}

		.brain-title {
			font-size: 11px;
			color: #9b59b6;
			margin-bottom: 6px;
			display: flex;
			align-items: center;
			gap: 4px;
		}

		.brain-reasoning {
			background: #151520;
			border-radius: 6px;
			padding: 6px;
			margin-bottom: 6px;
		}

		.reason-title {
			font-size: 9px;
			color: #64b5f6;
			margin-bottom: 4px;
		}

		.reason-text {
			font-size: 10px;
			line-height: 1.4;
			color: #ddd;
		}

		.brain-cards {
			margin-top: 6px;
		}

		.cards-title {
			font-size: 9px;
			color: #888;
			margin-bottom: 10px;
		}

		.cards-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 4px;
		}

		.imagination-card {
			background: #151520;
			border-radius: 5px;
			padding: 5px;
			border: 1px solid transparent;
			transition: all 0.2s;
		}

		.imagination-card.selected {
			border-color: #2ecc71;
			background: rgba(46, 204, 113, 0.1);
		}

		.imagination-card:not(.selected) {
			opacity: 0.6;
		}

		.card-action {
			font-size: 10px;
			font-weight: bold;
			margin-bottom: 2px;
		}

		.card-pos {
			font-size: 8px;
			color: #888;
			margin-bottom: 1px;
		}

		.card-reward {
			font-size: 9px;
			color: #f39c12;
			font-weight: bold;
		}

		.card-bonus {
			font-size: 8px;
			color: #2ecc71;
			margin-top: 2px;
		}

		/* 初始状态提示 */
		.brain-placeholder {
			background: #0a0a14;
			border-radius: 8px;
			padding: 12px;
			text-align: center;
			color: #666;
			font-size: 11px;
		}

		/* 消息提示 - 亮色 Android Toast 风格 */
		.message {
			position: fixed;
			bottom: 40px;
			left: 50%;
			transform: translateX(-50%);
			background: rgba(255, 255, 255, 0.95);
			color: #333;
			padding: 10px 20px;
			border-radius: 24px;
			font-size: 13px;
			font-weight: 500;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.2s;
			z-index: 1000;
			box-shadow: 0 4px 16px rgba(0,0,0,0.2);
		}

		.message.show {
			opacity: 1;
		}
	</style>
</head>
<body>
	<!-- 标题 -->
	<div class="header">
		<h1>🧠 Brain Lab</h1>
		<p>能看到AI在思考的实验室</p>
	</div>

	<!-- 游戏世界 -->
	<div class="world-section">
		<div class="world-title">
			<span>🎮 游戏世界</span>
			<span style="color: #666;">左下坐标系</span>
		</div>
		<div id="world-container"></div>
	</div>

	<!-- 操作区域（Tab切换） -->
	<div class="control-section">
		<!-- Tab头部 -->
		<div class="tab-header">
			<button class="tab-btn active" data-tab="ai">
				🤖 AI模式
			</button>
			<button class="tab-btn" data-tab="manual">
				🎮 手动模式
			</button>
		</div>

		<!-- AI模式内容 -->
		<div id="tab-ai" class="tab-content active">
			<!-- 大脑思考面板 -->
			<div class="brain-panel">
				<div class="brain-title">💭 AI决策</div>
				<div id="brain-container">
					<div class="brain-placeholder">
						点击「单步」按钮<br>
						观察AI如何想象未来并决策
					</div>
				</div>
			</div>

			<!-- AI控制按钮 -->
			<div class="ai-controls">
				<div class="ai-buttons">
					<button id="btn-step" class="btn btn-primary">👣 单步</button>
					<button id="btn-auto" class="btn btn-secondary">▶️ 自动</button>
					<button id="btn-reset" class="btn btn-danger">🔄 重置</button>
				</div>
				
				<div class="slider-row">
					<span class="slider-label">想象深度</span>
					<input type="range" id="depth-slider" class="slider" min="1" max="5" value="3">
					<span class="slider-value" id="depth-value">3</span>
				</div>
			</div>
		</div>

		<!-- 手动模式内容 -->
		<div id="tab-manual" class="tab-content">
			<div class="control-area">
				<!-- 上排: 4个跳跃按钮 -->
				<div class="btn-row">
					<button class="ctrl-btn" id="btn-jump-left-far">
						⬅⤴
						<span class="btn-label">左远跳 (x-2)</span>
					</button>
					<button class="ctrl-btn" id="btn-jump-left">
						⬅⬆
						<span class="btn-label">左跳 (↑x-1)</span>
					</button>
					<button class="ctrl-btn" id="btn-jump-right">
						⬆➡
						<span class="btn-label">右跳 (↑x+1)</span>
					</button>
					<button class="ctrl-btn" id="btn-jump-right-far">
						⤴➡
						<span class="btn-label">右远跳 (x+2)</span>
					</button>
				</div>

				<!-- 下排: 2个移动按钮 -->
				<div class="btn-row">
					<button class="ctrl-btn" id="btn-left">
						⬅
						<span class="btn-label">左移 (x-1)</span>
					</button>
					<button class="ctrl-btn" id="btn-right">
						➡
						<span class="btn-label">右移 (x+1)</span>
					</button>
				</div>

				<!-- 关卡切换和重置 -->
				<div class="action-buttons" style="margin-top: 20px;">
					<button id="btn-switch-level" class="action-btn">🗺️ 切换地图</button>
					<button id="btn-manual-reset" class="action-btn">🔄 重置</button>
				</div>
			</div>
		</div>

		<!-- 图例 -->
		<div class="legend">
			<div class="legend-item">
				<div class="legend-icon" style="background: #2ecc71;"></div>
				<span>平台</span>
			</div>
			<div class="legend-item">
				<div class="legend-icon" style="background: #9b59b6;">🔘</div>
				<span>按钮</span>
			</div>
			<div class="legend-item">
				<div class="legend-icon" style="background: #f39c12;">🏁</div>
				<span>终点</span>
			</div>
			<div class="legend-item">
				<div class="legend-icon" style="background: rgba(231, 76, 60, 0.3);">👿</div>
				<span>敌人</span>
			</div>
			<div class="legend-item">
				<div class="legend-icon" style="background: #3498db;">🦊</div>
				<span>狐狸</span>
			</div>
		</div>
	</div>

	<!-- 控制台面板 -->
	<div id="console-panel" class="console-panel"></div>

	<!-- 消息 -->
	<div id="message" class="message"></div>

	<script type="module" src="/src/brain-lab/main.ts"></script>
</body>
</html>
