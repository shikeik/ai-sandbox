<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLP 神经网络教学演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #4ecdc4;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        /* 层容器 */
        .layer {
            display: flex;
            flex-direction: column;
            gap: 60px;
            position: relative;
        }
        .layer-label {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #4ecdc4;
            white-space: nowrap;
        }
        .node {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            position: relative;
            transition: all 0.3s;
            cursor: pointer;
        }
        .node-value {
            font-weight: bold;
            font-size: 14px;
        }
        .node-label {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 2px;
        }
        
        /* 输入层 */
        .input-node {
            background: #2d4059;
            border: 3px solid #4ecdc4;
        }
        .input-node.active {
            background: #4ecdc4;
            color: #1a1a2e;
        }
        
        /* 隐藏层 */
        .hidden-node {
            background: #3d2c2e;
            border: 3px solid #ff6b6b;
        }
        .hidden-node .z-value {
            position: absolute;
            top: -25px;
            font-size: 11px;
            color: #ff9999;
            white-space: nowrap;
        }
        .hidden-node .relu-indicator {
            position: absolute;
            bottom: -20px;
            font-size: 10px;
            color: #ff9999;
        }
        
        /* 输出层 */
        .output-node {
            background: #2c3e50;
            border: 3px solid #f39c12;
        }
        .output-node .target-diff {
            position: absolute;
            bottom: -25px;
            font-size: 11px;
            color: #f39c12;
            white-space: nowrap;
        }
        
        /* SVG连线 */
        svg {
            width: 100%;
            height: 100%;
        }
        .connection {
            stroke-width: 3;
            transition: all 0.3s;
        }
        .connection.positive {
            stroke: #27ae60;
        }
        .connection.negative {
            stroke: #e74c3c;
        }
        .weight-label {
            font-size: 11px;
            fill: #fff;
            text-anchor: middle;
        }
        .gradient-label {
            font-size: 9px;
            fill: #f39c12;
            text-anchor: middle;
        }
        
        /* 控制面板 */
        .controls {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
        }
        .control-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .control-group {
            flex: 1;
            min-width: 150px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #888;
        }
        input[type="number"], input[type="range"] {
            width: 100%;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #4ecdc4;
            border-radius: 4px;
            color: #fff;
        }
        input[type="range"] {
            padding: 0;
        }
        
        /* 按钮 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-forward {
            background: #4ecdc4;
            color: #1a1a2e;
        }
        .btn-backward {
            background: #ff6b6b;
            color: #fff;
        }
        .btn-reset {
            background: #666;
            color: #fff;
        }
        button:hover {
            opacity: 0.8;
        }
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        /* 计算日志 */
        .log-panel {
            max-width: 800px;
            margin: 20px auto;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .log-title {
            color: #4ecdc4;
            font-weight: bold;
        }
        .log-math {
            color: #ccc;
            margin-left: 10px;
        }
        .log-result {
            color: #f39c12;
            font-weight: bold;
        }
        
        /* 步骤指示 */
        .step-indicator {
            text-align: center;
            margin: 20px 0;
            font-size: 18px;
            color: #4ecdc4;
        }
    </style>
    <style>
        .back-nav {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
        }
        .back-nav a {
            text-decoration: none;
            color: #9aa0a6;
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #2c2f36;
            background: #16181d;
            transition: color .2s, border-color .2s;
        }
        .back-nav a:hover {
            color: #e8eaed;
            border-color: #5f6368;
        }
    </style>
</head>
<body>
    <div class="back-nav"><a href="../index.html">← 返回导航</a></div>
    <h1>🧠 MLP 神经网络教学演示</h1>
    <p class="subtitle">结构: 2输入 → 2隐藏(ReLU) → 1输出 | 点击输入节点设置0/1，观察前向传播和反向传播</p>
    
    <div class="step-indicator" id="stepIndicator">请设置输入值，然后点击【前向传播】</div>
    
    <!-- 网络可视化 -->
    <div style="position: relative; display: flex; justify-content: center; align-items: center; gap: 80px; margin: 40px 0; min-height: 300px;" id="networkWrapper">
        <!-- SVG连线放在最底层 -->
        <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;" id="connections"></svg>
        
        <!-- 输入层 -->
        <div class="layer" style="z-index: 2;">
            <span class="layer-label">输入层 (x)</span>
            <div class="node input-node" id="input0" onclick="toggleInput(0)">
                <span class="node-value" id="val-input0">0</span>
                <span class="node-label">x₁</span>
            </div>
            <div class="node input-node" id="input1" onclick="toggleInput(1)">
                <span class="node-value" id="val-input1">0</span>
                <span class="node-label">x₂</span>
            </div>
        </div>
        
        <!-- 隐藏层 -->
        <div class="layer" style="z-index: 2;">
            <span class="layer-label">隐藏层 (h)</span>
            <div class="node hidden-node" id="hidden0">
                <span class="z-value" id="z-hidden0">z = ?</span>
                <span class="node-value" id="val-hidden0">?</span>
                <span class="node-label">h₁</span>
                <span class="relu-indicator" id="relu-hidden0"></span>
            </div>
            <div class="node hidden-node" id="hidden1">
                <span class="z-value" id="z-hidden1">z = ?</span>
                <span class="node-value" id="val-hidden1">?</span>
                <span class="node-label">h₂</span>
                <span class="relu-indicator" id="relu-hidden1"></span>
            </div>
        </div>
        
        <!-- 输出层 -->
        <div class="layer" style="z-index: 2;">
            <span class="layer-label">输出层 (y)</span>
            <div class="node output-node" id="output0">
                <span class="node-value" id="val-output0">?</span>
                <span class="node-label">预测值</span>
                <span class="target-diff" id="diff-output0">误差: ?</span>
            </div>
        </div>
    </div>
    
    <!-- 控制面板 -->
    <div class="controls">
        <div class="control-row">
            <div class="control-group">
                <label>目标输出 (期望y)</label>
                <input type="number" id="targetOutput" value="1" min="0" max="1" step="0.1">
            </div>
            <div class="control-group">
                <label>学习率 (η)</label>
                <input type="range" id="learningRate" value="0.2" min="0.01" max="1" step="0.01" oninput="updateLRDisplay()">
                <span id="lrDisplay">0.20</span>
            </div>
        </div>
        
        <div class="btn-group">
            <button class="btn-forward" id="btnForward" onclick="forward()">▶ 前向传播</button>
            <button class="btn-backward" id="btnBackward" onclick="backward()" disabled>↺ 反向传播</button>
            <button class="btn-reset" onclick="resetAll()">⟲ 重置</button>
        </div>
    </div>
    
    <!-- 计算日志 -->
    <div class="log-panel" id="logPanel">
        <div class="log-entry">
            <span class="log-title">💡 使用说明:</span><br>
            <span class="log-math">1. 点击输入节点 (x₁, x₂) 设置 0 或 1</span><br>
            <span class="log-math">2. 点击【前向传播】查看计算过程</span><br>
            <span class="log-math">3. 设置目标值，点击【反向传播】查看权重如何更新</span>
        </div>
    </div>

    <script>
        // ==================== 网络状态 ====================
        const state = {
            inputs: [0, 0],
            hiddenZ: [0, 0],
            hidden: [0, 0],
            output: 0,
            weights: {
                ih: [[0.5, 0.3], [0.2, -0.1]],  // 输入→隐藏 [2×2]
                ho: [[0.4, -0.3]]               // 隐藏→输出 [1×2]
            },
            biases: {
                h: [-0.1, 0.1],  // 隐藏层偏置
                o: [0.2]         // 输出层偏置
            },
            target: 1,
            learningRate: 0.2,
            hasForward: false
        };
        
        // ==================== 初始化 ====================
        function init() {
            updateLRDisplay();
            // 延迟绘制确保DOM渲染完成
            setTimeout(drawConnections, 100);
            window.addEventListener('resize', () => {
                setTimeout(drawConnections, 50);
            });
        }
        
        // ==================== 绘制连线 ====================
        function drawConnections() {
            const svg = document.getElementById('connections');
            const wrapper = document.getElementById('networkWrapper');
            
            let html = '';
            
            // 输入→隐藏 连线
            for (let i = 0; i < 2; i++) {
                for (let h = 0; h < 2; h++) {
                    const pos = getConnectionPos('input', i, 'hidden', h);
                    const w = state.weights.ih[h][i];
                    const color = w >= 0 ? '#27ae60' : '#e74c3c';
                    const width = Math.min(4, Math.abs(w) * 4 + 1);
                    
                    // 计算标签位置 - 沿连线方向偏移到1/3处，避免交叉点
                    const t = 0.35 + (i * 0.15) + (h * 0.05); // 不同连线在不同位置显示
                    const labelX = pos.x1 + (pos.x2 - pos.x1) * t;
                    const labelY = pos.y1 + (pos.y2 - pos.y1) * t;
                    
                    // 根据连线斜率决定偏移方向
                    const slope = (pos.y2 - pos.y1) / (pos.x2 - pos.x1 + 0.001);
                    const perpX = slope > 0 ? -12 : 12;
                    const perpY = -15;
                    
                    html += `<line x1="${pos.x1}" y1="${pos.y1}" x2="${pos.x2}" y2="${pos.y2}" 
                              stroke="${color}" stroke-width="${width}" opacity="0.85"/>`;
                    html += `<text x="${labelX + perpX}" y="${labelY + perpY}" class="weight-label" 
                              style="font-size: 10px; fill: #fff; text-shadow: 1px 1px 2px #000;">w${i+1}${h+1}=${w.toFixed(2)}</text>`;
                }
            }
            
            // 隐藏→输出 连线
            for (let h = 0; h < 2; h++) {
                const pos = getConnectionPos('hidden', h, 'output', 0);
                const w = state.weights.ho[0][h];
                const color = w >= 0 ? '#27ae60' : '#e74c3c';
                const width = Math.min(4, Math.abs(w) * 4 + 1);
                
                const t = 0.4 + (h * 0.2);
                const labelX = pos.x1 + (pos.x2 - pos.x1) * t;
                const labelY = pos.y1 + (pos.y2 - pos.y1) * t;
                
                const offsetX = h === 0 ? -15 : 15;
                const offsetY = -12;
                
                html += `<line x1="${pos.x1}" y1="${pos.y1}" x2="${pos.x2}" y2="${pos.y2}" 
                          stroke="${color}" stroke-width="${width}" opacity="0.85"/>`;
                html += `<text x="${labelX + offsetX}" y="${labelY + offsetY}" class="weight-label"
                          style="font-size: 10px; fill: #fff; text-shadow: 1px 1px 2px #000;">v${h+1}=${w.toFixed(2)}</text>`;
            }
            
            svg.innerHTML = html;
        }
        
        function getConnectionPos(fromLayer, fromIdx, toLayer, toIdx) {
            const wrapper = document.getElementById('networkWrapper');
            const getCenter = (id) => {
                const el = document.getElementById(id);
                if (!el) return { x: 0, y: 0 };
                const rect = el.getBoundingClientRect();
                const wrapRect = wrapper.getBoundingClientRect();
                return {
                    x: rect.left + rect.width/2 - wrapRect.left,
                    y: rect.top + rect.height/2 - wrapRect.top
                };
            };
            
            const start = getCenter(fromLayer + fromIdx);
            const end = getCenter(toLayer + toIdx);
            
            return { x1: start.x, y1: start.y, x2: end.x, y2: end.y };
        }
        
        // ==================== 输入控制 ====================
        function toggleInput(idx) {
            state.inputs[idx] = state.inputs[idx] ? 0 : 1;
            document.getElementById('val-input' + idx).textContent = state.inputs[idx];
            document.getElementById('input' + idx).classList.toggle('active', state.inputs[idx]);
            resetForward();
        }
        
        function updateLRDisplay() {
            state.learningRate = parseFloat(document.getElementById('learningRate').value);
            document.getElementById('lrDisplay').textContent = state.learningRate.toFixed(2);
        }
        
        // ==================== 前向传播 ====================
        function forward() {
            logClear();
            log('🚀 前向传播开始', 'title');
            
            const [x1, x2] = state.inputs;
            log(`输入: x₁=${x1}, x₂=${x2}`);
            
            // 隐藏层计算
            for (let h = 0; h < 2; h++) {
                const [w1, w2] = state.weights.ih[h];
                const b = state.biases.h[h];
                const z = w1 * x1 + w2 * x2 + b;
                
                log(`\n隐藏神经元 h${h+1}:`, 'title');
                log(`  z${h+1} = ${w1.toFixed(2)}×${x1} + ${w2.toFixed(2)}×${x2} + ${b.toFixed(2)} = ${z.toFixed(3)}`, 'math');
                
                state.hiddenZ[h] = z;
                const a = relu(z);
                state.hidden[h] = a;
                
                document.getElementById('z-hidden' + h).textContent = `z = ${z.toFixed(2)}`;
                document.getElementById('val-hidden' + h).textContent = a.toFixed(2);
                document.getElementById('relu-hidden' + h).textContent = z > 0 ? 'ReLU: 保留' : 'ReLU: 置0';
                document.getElementById('relu-hidden' + h).style.color = z > 0 ? '#4ecdc4' : '#ff6b6b';
            }
            
            // 输出层计算
            const [v1, v2] = state.weights.ho[0];
            const b = state.biases.o[0];
            const h1 = state.hidden[0];
            const h2 = state.hidden[1];
            const y = v1 * h1 + v2 * h2 + b;
            
            log(`\n输出神经元 y:`, 'title');
            log(`  y = ${v1.toFixed(2)}×${h1.toFixed(2)} + ${v2.toFixed(2)}×${h2.toFixed(2)} + ${b.toFixed(2)} = ${y.toFixed(3)}`, 'math');
            
            state.output = y;
            document.getElementById('val-output0').textContent = y.toFixed(3);
            
            state.target = parseFloat(document.getElementById('targetOutput').value);
            const error = y - state.target;
            document.getElementById('diff-output0').textContent = `误差: ${error.toFixed(3)}`;
            document.getElementById('diff-output0').style.color = Math.abs(error) < 0.1 ? '#4ecdc4' : '#ff6b6b';
            
            log(`\n目标值: ${state.target}, 误差: ${error.toFixed(3)}`, error > 0 ? 'negative' : 'result');
            
            state.hasForward = true;
            document.getElementById('btnBackward').disabled = false;
            document.getElementById('stepIndicator').textContent = '前向传播完成！现在可以反向传播修正权重';
        }
        
        function relu(x) {
            return Math.max(0, x);
        }
        
        // ==================== 反向传播 ====================
        function backward() {
            if (!state.hasForward) {
                alert('请先进行前向传播！');
                return;
            }
            
            log('\n🔄 反向传播开始', 'title');
            
            const lr = state.learningRate;
            const error = state.output - state.target;
            
            // 输出层梯度
            const dY = error;  // 损失函数对输出的导数
            
            log(`输出层误差: dL/dy = y - target = ${state.output.toFixed(3)} - ${state.target} = ${dY.toFixed(3)}`);
            
            // 隐藏层→输出层权重梯度
            log('\n隐藏→输出层权重梯度:', 'title');
            const dV = [dY * state.hidden[0], dY * state.hidden[1]];
            log(`  ∂L/∂v₁ = dL/dy × h₁ = ${dY.toFixed(3)} × ${state.hidden[0].toFixed(2)} = ${dV[0].toFixed(3)}`);
            log(`  ∂L/∂v₂ = dL/dy × h₂ = ${dY.toFixed(3)} × ${state.hidden[1].toFixed(2)} = ${dV[1].toFixed(3)}`);
            
            // 隐藏层梯度（反向传播误差）
            const [v1, v2] = state.weights.ho[0];
            const dH = [
                dY * v1 * (state.hiddenZ[0] > 0 ? 1 : 0),
                dY * v2 * (state.hiddenZ[1] > 0 ? 1 : 0)
            ];
            
            log('\n隐藏层误差 (链式法则):', 'title');
            log(`  dL/dh₁ = dL/dy × v₁ × ReLU'(z₁) = ${dY.toFixed(3)} × ${v1.toFixed(2)} × ${state.hiddenZ[0] > 0 ? 1 : 0} = ${dH[0].toFixed(3)}`);
            log(`  dL/dh₂ = dL/dy × v₂ × ReLU'(z₂) = ${dY.toFixed(3)} × ${v2.toFixed(2)} × ${state.hiddenZ[1] > 0 ? 1 : 0} = ${dH[1].toFixed(3)}`);
            
            // 输入→隐藏层权重梯度
            log('\n输入→隐藏层权重梯度:', 'title');
            const [x1, x2] = state.inputs;
            const dW = [
                [dH[0] * x1, dH[0] * x2],
                [dH[1] * x1, dH[1] * x2]
            ];
            log(`  ∂L/∂w₁₁ = dL/dh₁ × x₁ = ${dH[0].toFixed(3)} × ${x1} = ${dW[0][0].toFixed(3)}`);
            log(`  ∂L/∂w₁₂ = dL/dh₁ × x₂ = ${dH[0].toFixed(3)} × ${x2} = ${dW[0][1].toFixed(3)}`);
            log(`  ∂L/∂w₂₁ = dL/dh₂ × x₁ = ${dH[1].toFixed(3)} × ${x1} = ${dW[1][0].toFixed(3)}`);
            log(`  ∂L/∂w₂₂ = dL/dh₂ × x₂ = ${dH[1].toFixed(3)} × ${x2} = ${dW[1][1].toFixed(3)}`);
            
            // 更新权重
            log('\n权重更新 (新 = 旧 - 学习率×梯度):', 'title');
            
            // 更新输入→隐藏
            for (let h = 0; h < 2; h++) {
                for (let i = 0; i < 2; i++) {
                    const oldW = state.weights.ih[h][i];
                    const newW = oldW - lr * dW[h][i];
                    state.weights.ih[h][i] = newW;
                    log(`  w${h+1}${i+1}: ${oldW.toFixed(2)} - ${lr}×${dW[h][i].toFixed(3)} = ${newW.toFixed(3)}`);
                }
            }
            
            // 更新隐藏→输出
            for (let i = 0; i < 2; i++) {
                const oldV = state.weights.ho[0][i];
                const newV = oldV - lr * dV[i];
                state.weights.ho[0][i] = newV;
                log(`  v${i+1}: ${oldV.toFixed(2)} - ${lr}×${dV[i].toFixed(3)} = ${newV.toFixed(3)}`);
            }
            
            // 更新偏置
            state.biases.o[0] -= lr * dY;
            for (let h = 0; h < 2; h++) {
                state.biases.h[h] -= lr * dH[h];
            }
            
            log('\n✅ 反向传播完成！权重已更新', 'result');
            log('现在可以再次点击【前向传播】查看预测是否改善');
            
            drawConnections();
            resetForward();
            document.getElementById('stepIndicator').textContent = '权重已更新！再次前向传播看看预测值的变化';
        }
        
        // ==================== 日志工具 ====================
        function logClear() {
            document.getElementById('logPanel').innerHTML = '';
        }
        
        function log(msg, type = 'math') {
            const panel = document.getElementById('logPanel');
            const div = document.createElement('div');
            div.className = 'log-entry';
            
            const colors = {
                title: '#4ecdc4',
                math: '#ccc',
                result: '#f39c12',
                negative: '#ff6b6b'
            };
            
            div.innerHTML = `<span style="color: ${colors[type] || '#ccc'}">${msg}</span>`;
            panel.appendChild(div);
            panel.scrollTop = panel.scrollHeight;
        }
        
        // ==================== 重置 ====================
        function resetForward() {
            state.hasForward = false;
            document.getElementById('btnBackward').disabled = true;
            
            // 清空显示
            for (let h = 0; h < 2; h++) {
                document.getElementById('z-hidden' + h).textContent = 'z = ?';
                document.getElementById('val-hidden' + h).textContent = '?';
                document.getElementById('relu-hidden' + h).textContent = '';
            }
            document.getElementById('val-output0').textContent = '?';
            document.getElementById('diff-output0').textContent = '误差: ?';
        }
        
        function resetAll() {
            state.inputs = [0, 0];
            state.weights = {
                ih: [[0.5, 0.3], [0.2, -0.1]],
                ho: [[0.4, -0.3]]
            };
            state.biases = {
                h: [-0.1, 0.1],
                o: [0.2]
            };
            
            for (let i = 0; i < 2; i++) {
                document.getElementById('val-input' + i).textContent = '0';
                document.getElementById('input' + i).classList.remove('active');
            }
            
            resetForward();
            drawConnections();
            logClear();
            log('🔄 已重置所有权重和状态', 'title');
            document.getElementById('stepIndicator').textContent = '请设置输入值，然后点击【前向传播】';
        }
        
        // 启动
        init();
    </script>
</body>
</html>
