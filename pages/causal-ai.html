<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>因果链 AI | 经验学习系统</title>
	<style>
		* { box-sizing: border-box; font-family: system-ui, 'Segoe UI', monospace; }
		body { background: #1a1e2a; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 16px; }
		/* 全屏覆盖层 */
		.fullscreen-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background: linear-gradient(135deg, #0b0e14 0%, #1a1e2a 50%, #0b0e14 100%);
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			z-index: 9999;
			cursor: pointer;
			transition: opacity 0.3s ease;
		}
		.fullscreen-overlay.hidden {
			opacity: 0;
			pointer-events: none;
		}
		.fullscreen-overlay .icon {
			font-size: 72px;
			margin-bottom: 24px;
			animation: pulse 2s ease-in-out infinite;
		}
		.fullscreen-overlay .title {
			font-size: 28px;
			color: #aac8ff;
			margin-bottom: 12px;
			font-weight: 600;
		}
		.fullscreen-overlay .hint {
			font-size: 16px;
			color: #7a8fa8;
			margin-top: 24px;
		}
		@keyframes pulse {
			0%, 100% { transform: scale(1); opacity: 1; }
			50% { transform: scale(1.1); opacity: 0.8; }
		}
		/* 全屏模式下的 body 样式 */
		body.is-fullscreen {
			padding: 0;
		}
		body.is-fullscreen .game-container {
			max-width: none;
			width: 100vw;
			height: 100vh;
			border-radius: 0;
			display: flex;
			flex-direction: column;
			justify-content: center;
		}
		.game-container { background: #0b0e14; border-radius: 24px; padding: 24px; box-shadow: 0 12px 30px rgba(0,0,0,0.7); border: 1px solid #2f3a4c; max-width: 1400px; }
		.main-panel { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
		.canvas-area { text-align: center; }
		canvas { background: #10141c; border-radius: 16px; box-shadow: inset 0 0 0 1px #2e3a48; display: block; margin-bottom: 10px; image-rendering: crisp-edges; }
		.info-bar { display: flex; justify-content: space-between; color: #b7cdff; background: #1e2533; padding: 8px 16px; border-radius: 40px; }
		.panel { background: #131a24; border-radius: 20px; padding: 16px; border: 1px solid #2e405b; color: #d6e3ff; }
		.control-panel { width: 300px; display: flex; flex-direction: column; max-height: 700px; overflow-y: auto; }
		.exp-panel { width: 380px; display: flex; flex-direction: column; max-height: 700px; }
		.rule-panel { width: 380px; display: flex; flex-direction: column; max-height: 700px; }
		h3 { margin: 0 0 12px; text-align: center; color: #aac8ff; }
		.btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
		.btn { background: #252f3f; border: none; border-bottom: 2px solid #0f141c; color: #eef3ff; padding: 8px 12px; border-radius: 36px; font-weight: bold; font-size: 14px; cursor: pointer; flex: 1 0 calc(50% - 8px); transition: all 0.1s; box-shadow: 0 2px 4px black; border: 1px solid #3d5470; }
		.btn:hover { background: #2f3e55; }
		.btn.special { background: #3f2e4e; border-color: #a07ab0; flex: 1 0 100%; }
		.list-container { background: #0a0f16; border-radius: 14px; padding: 10px; flex: 1; overflow-y: auto; font-size: 12px; border: 1px solid #263340; margin-top: 8px; min-height: 150px; max-height: 300px; }
		.entry { 
			border-bottom: 1px solid #1f2e40; 
			padding: 8px 4px; 
			font-family: monospace; 
			white-space: normal; 
			line-height: 1.5;
		}
		.badge { background: #1f2a3c; padding: 6px 12px; border-radius: 28px; text-align: center; margin-bottom: 12px; }
		.plan-log { background: #050a10; border-radius: 12px; padding: 12px; font-family: monospace; font-size: 13px; color: #c6e0ff; max-height: 200px; overflow-y: auto; white-space: pre-wrap; margin-top: 16px; line-height: 1.5; }
	</style>
</head>
<body>
<!-- 全屏进入覆盖层 -->
<div id="fullscreenOverlay" class="fullscreen-overlay hidden">
	<div class="icon">📱</div>
	<div class="title">因果链 AI</div>
	<div class="hint">点击进入横屏全屏模式</div>
</div>
<div class="game-container">
	<div class="main-panel">
		<div class="canvas-area">
			<canvas id="worldCanvas" width="400" height="400"></canvas>
			<div class="info-bar">
				<span>🧭 <span id="posDisplay">(0,0)</span></span>
				<span>📦 <span id="holdDisplay">空手</span></span>
				<span>🚪 <span id="doorDisplay">关闭</span></span>
			</div>
		</div>
		<div class="control-panel panel">
			<h3>🎮 操控</h3>
			<div class="btn-group">
				<button class="btn" data-action="move_up">⬆️</button>
				<button class="btn" data-action="move_down">⬇️</button>
				<button class="btn" data-action="move_left">⬅️</button>
				<button class="btn" data-action="move_right">➡️</button>
				<button class="btn" data-action="pickup">🤚拾取</button>
				<button class="btn" data-action="reset">🔄重置</button>
			</div>
			<div class="btn-group">
				<button class="btn special" id="exploreBtn">🎲 随机探索10步</button>
				<button class="btn special" id="generalizeBtn">🧠 从经验泛化规则</button>
				<button class="btn special" id="planBtn">🔮 后向规划 & 执行</button>
			</div>
			<div class="badge">
				<div>📚 经验: <span id="expCount">0</span> 条</div>
				<div>📐 规则: <span id="ruleCount">0</span> 条</div>
			</div>
			<div class="list-container" id="logContainer">
				<div>✨ 操作日志</div>
			</div>
		</div>
		<div class="exp-panel panel">
			<h3>📋 经验库 (具体)</h3>
			<div style="display:flex; gap:8px; margin-bottom:8px;">
				<button id="clearExpBtn" class="btn">🧹 清空</button>
			</div>
			<div class="list-container" id="expListContainer"></div>
		</div>
		<div class="rule-panel panel">
			<h3>📐 规则库 (泛化)</h3>
			<div class="list-container" id="ruleListContainer"></div>
		</div>
	</div>
	<div class="plan-log" id="planLogContainer">
		📝 规划过程 (点击「后向规划」查看)
	</div>
</div>
<script type="module" src="../src/causal-ai/main.ts"></script>
</body>
</html>
