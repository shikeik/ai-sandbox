<!DOCTYPE html>
<html lang="zh">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>因果链 AI | 经验学习系统</title>
	<style>
		* { box-sizing: border-box; font-family: system-ui, 'Segoe UI', monospace; }
		body {
			background: #0b0e14;
			min-height: 100vh;
			margin: 0;
			padding: 16px;
			display: flex;
			justify-content: center;
			align-items: center;
			overflow: hidden;
		}

		/* 全屏覆盖层 */
		.fullscreen-overlay {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background: linear-gradient(135deg, #0b0e14 0%, #1a1e2a 50%, #0b0e14 100%);
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			z-index: 9999;
			cursor: pointer;
			transition: opacity 0.3s ease;
		}
		.fullscreen-overlay.hidden {
			opacity: 0;
			pointer-events: none;
		}
		.fullscreen-overlay .icon {
			font-size: 72px;
			margin-bottom: 24px;
			animation: pulse 2s ease-in-out infinite;
		}
		.fullscreen-overlay .title {
			font-size: 28px;
			color: #aac8ff;
			margin-bottom: 12px;
			font-weight: 600;
		}
		.fullscreen-overlay .hint {
			font-size: 16px;
			color: #7a8fa8;
			margin-top: 24px;
		}
		@keyframes pulse {
			0%, 100% { transform: scale(1); opacity: 1; }
			50% { transform: scale(1.1); opacity: 0.8; }
		}

		/* 全屏模式 */
		body.is-fullscreen {
			padding: 0;
		}
		body.is-fullscreen .game-container {
			border-radius: 0;
			max-width: none;
			width: 100vw;
			height: 100vh;
		}

		/* 主容器 - 两列布局 */
		.game-container {
			background: #0b0e14;
			border-radius: 20px;
			padding: 20px;
			box-shadow: 0 12px 30px rgba(0,0,0,0.7);
			border: 1px solid #2f3a4c;
			max-width: 1400px;
			width: 100%;
			height: calc(100vh - 32px);
			display: flex;
			gap: 20px;
			overflow: hidden;
		}

		/* 左侧：游戏视图 */
		.left-panel {
			flex: 0 0 auto;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
		}
		.canvas-area {
			text-align: center;
		}
		canvas {
			background: #10141c;
			border-radius: 16px;
			box-shadow: inset 0 0 0 1px #2e3a48;
			display: block;
			margin-bottom: 12px;
			image-rendering: crisp-edges;
		}
		.info-bar {
			display: flex;
			justify-content: space-between;
			color: #b7cdff;
			background: #1e2533;
			padding: 10px 20px;
			border-radius: 40px;
			font-size: 14px;
		}

		/* 右侧：数据面板 */
		.right-panel {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-width: 0;
			background: #131a24;
			border-radius: 16px;
			border: 1px solid #2e405b;
			overflow: hidden;
		}

		/* 翻页标签栏 */
		.tab-bar {
			display: flex;
			background: #0f141c;
			border-bottom: 1px solid #2e405b;
			flex-shrink: 0;
		}
		.tab {
			flex: 1;
			padding: 14px 16px;
			background: transparent;
			border: none;
			color: #7a8fa8;
			font-size: 14px;
			cursor: pointer;
			transition: all 0.2s;
			border-bottom: 2px solid transparent;
			white-space: nowrap;
		}
		.tab:hover {
			color: #aac8ff;
			background: #1a2330;
		}
		.tab.active {
			color: #aac8ff;
			border-bottom-color: #4ea1d3;
			background: #1a2330;
		}

		/* 翻页内容区 */
		.tab-content {
			flex: 1;
			overflow: hidden;
			position: relative;
		}
		.tab-pane {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			padding: 16px;
			overflow-y: auto;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.2s;
		}
		.tab-pane.active {
			opacity: 1;
			pointer-events: auto;
		}

		/* 面板通用样式 */
		h3 {
			margin: 0 0 12px;
			color: #aac8ff;
			font-size: 16px;
		}
		.btn-group {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			margin-bottom: 12px;
		}
		.btn {
			background: #252f3f;
			border: 1px solid #3d5470;
			border-bottom: 2px solid #0f141c;
			color: #eef3ff;
			padding: 8px 12px;
			border-radius: 36px;
			font-weight: bold;
			font-size: 13px;
			cursor: pointer;
			transition: all 0.1s;
			box-shadow: 0 2px 4px black;
		}
		.btn:hover { background: #2f3e55; }
		.btn.special { background: #3f2e4e; border-color: #a07ab0; }
		.btn.active { background: #4ea1d3; }

		.badge {
			background: #1f2a3c;
			padding: 10px 16px;
			border-radius: 28px;
			text-align: center;
			margin-bottom: 12px;
			color: #d6e3ff;
		}

		.list-container {
			background: #0a0f16;
			border-radius: 14px;
			padding: 10px;
			font-size: 12px;
			border: 1px solid #263340;
			min-height: 150px;
		}
		.entry {
			border-bottom: 1px solid #1f2e40;
			padding: 8px 4px;
			font-family: monospace;
			white-space: normal;
			line-height: 1.5;
		}
		.entry:last-child { border-bottom: none; }

		.plan-log {
			background: #050a10;
			border-radius: 12px;
			padding: 12px;
			font-family: monospace;
			font-size: 13px;
			color: #c6e0ff;
			white-space: pre-wrap;
			line-height: 1.5;
			min-height: 150px;
		}

		/* 操控面板特殊样式 */
		.control-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 8px;
			margin-bottom: 16px;
		}
		.control-grid .btn {
			aspect-ratio: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 20px;
		}
		.control-grid .btn:first-child { grid-column: 2; }

		/* 统计信息 */
		.stats-row {
			display: flex;
			gap: 12px;
			margin-bottom: 12px;
		}
		.stat-box {
			flex: 1;
			background: #1a2330;
			padding: 12px;
			border-radius: 12px;
			text-align: center;
		}
		.stat-box .label {
			color: #7a8fa8;
			font-size: 12px;
			margin-bottom: 4px;
		}
		.stat-box .value {
			color: #aac8ff;
			font-size: 20px;
			font-weight: bold;
		}
	</style>
</head>
<body>
<!-- 全屏进入覆盖层 -->
<div id="fullscreenOverlay" class="fullscreen-overlay hidden">
	<div class="icon">📱</div>
	<div class="title">因果链 AI</div>
	<div class="hint">点击进入横屏全屏模式</div>
</div>

<div class="game-container">
	<!-- 左侧：游戏视图 -->
	<div class="left-panel">
		<div class="canvas-area">
			<canvas id="worldCanvas" width="400" height="400"></canvas>
			<div class="info-bar">
				<span>🧭 <span id="posDisplay">(0,0)</span></span>
				<span>📦 <span id="holdDisplay">空手</span></span>
				<span>🚪 <span id="doorDisplay">关闭</span></span>
			</div>
		</div>
	</div>

	<!-- 右侧：翻页数据面板 -->
	<div class="right-panel">
		<!-- 标签栏 -->
		<div class="tab-bar">
			<button class="tab active" data-tab="control">🎮 操控</button>
			<button class="tab" data-tab="experience">📋 经验</button>
			<button class="tab" data-tab="rules">📐 规则</button>
			<button class="tab" data-tab="plan">🔮 规划</button>
		</div>

		<!-- 内容区 -->
		<div class="tab-content">
			<!-- 操控面板 -->
			<div class="tab-pane active" id="tab-control">
				<div class="control-grid">
					<button class="btn" data-action="move_up">⬆️</button>
					<button class="btn" data-action="move_left">⬅️</button>
					<button class="btn" data-action="move_down">⬇️</button>
					<button class="btn" data-action="move_right">➡️</button>
				</div>
				<div class="btn-group">
					<button class="btn" data-action="pickup">🤚 拾取</button>
					<button class="btn" data-action="reset">🔄 重置</button>
				</div>
				<div class="btn-group">
					<button class="btn special" id="exploreBtn">🎲 随机探索</button>
					<button class="btn special" id="generalizeBtn">🧠 泛化规则</button>
					<button class="btn special" id="planBtn">🔮 规划执行</button>
				</div>
				<div class="stats-row">
					<div class="stat-box">
						<div class="label">📚 经验</div>
						<div class="value" id="expCount">0</div>
					</div>
					<div class="stat-box">
						<div class="label">📐 规则</div>
						<div class="value" id="ruleCount">0</div>
					</div>
				</div>
				<div class="list-container" id="logContainer">
					<div class="entry">✨ 操作日志将显示在这里</div>
				</div>
			</div>

			<!-- 经验面板 -->
			<div class="tab-pane" id="tab-experience">
				<div class="btn-group">
					<button class="btn" id="clearExpBtn">🧹 清空经验</button>
				</div>
				<h3>📋 经验库记录</h3>
				<div class="list-container" id="expListContainer">
					<div class="entry">暂无经验数据</div>
				</div>
			</div>

			<!-- 规则面板 -->
			<div class="tab-pane" id="tab-rules">
				<h3>📐 规则库 (泛化)</h3>
				<div class="list-container" id="ruleListContainer">
					<div class="entry">暂无规则，请先探索并点击「泛化规则」</div>
				</div>
			</div>

			<!-- 规划面板 -->
			<div class="tab-pane" id="tab-plan">
				<h3>🔮 规划过程</h3>
				<div class="plan-log" id="planLogContainer">
📝 点击「规划执行」查看规划过程

规划器将自动寻找从当前位置到终点的最优路径。
				</div>
			</div>
		</div>
	</div>
</div>

<script type="module" src="../src/causal-ai/main.ts"></script>
</body>
</html>
