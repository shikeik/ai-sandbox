<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>向量化参数演示</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
			background: #0b0c0f;
			color: #e8eaed;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 24px;
		}
		.back {
			position: absolute;
			top: 20px;
			left: 20px;
			text-decoration: none;
			color: #9aa0a6;
			font-size: 14px;
			padding: 8px 14px;
			border-radius: 8px;
			border: 1px solid #2c2f36;
			background: #16181d;
			transition: color .2s, border-color .2s;
		}
		.back:hover {
			color: #e8eaed;
			border-color: #5f6368;
		}
		.icon {
			font-size: 56px;
			margin-bottom: 18px;
			opacity: .9;
		}
		h1 {
			font-size: 22px;
			font-weight: 500;
			margin-bottom: 10px;
		}
		.desc {
			color: #9aa0a6;
			font-size: 14px;
			max-width: 320px;
			text-align: center;
			line-height: 1.6;
		}
		.status {
			margin-top: 24px;
			font-size: 12px;
			padding: 6px 14px;
			border-radius: 999px;
			background: #3e2c14;
			color: #f9ab00;
		}
	</style>
</head>
<body>
	<a class="back" href="../index.html">← 返回导航</a>
	<div class="icon">🚧</div>
	<h1>向量化参数演示</h1>
	<p class="desc">这里将展示向量空间与参数映射的可视化交互。内容尚未完工，敬请期待。</p>
	<span class="status">施工中</span>
</body>
</html>
