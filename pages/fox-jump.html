<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
	<title>AI 神经元训练沙盘</title>
</head>
<body>
	<div class="ever-portrait active" id="ep-container">
		<div id="app">
			<!-- 控制栏 -->
			<div class="control-bar">
				<button class="ctrl-btn icon-only" id="btn-toggle" title="恒竖切换">↻</button>
				<button class="ctrl-btn icon-only" id="btn-fullscreen" title="全屏">⛶</button>
				<button class="ctrl-btn icon-only" id="btn-neuron" title="神经元面板">🧠</button>
				<button class="ctrl-btn icon-only" id="btn-console" title="控制台">🖥️</button>
				<button class="ctrl-btn icon-only" id="btn-reload" title="刷新页面">🔄</button>
				<div class="eps-status" id="eps-st">-</div>
				<div id="neuron-menu-container"></div>
			</div>

			<!-- 主容器：四区域 flex 布局（控制台 + 游戏 + 神经元 + 控制）-->
			<div id="main-container">

				<!-- 控制台面板（默认收起，展开时占 20%）-->
				<div class="console-panel" id="console-panel">
					<div class="console-toolbar">
						<button class="ctrl-btn icon-only active" id="btn-autoscroll" title="自动滚动">⬇️</button>
						<button class="ctrl-btn icon-only" id="btn-filter-console" title="筛选">🔍</button>
						<button class="ctrl-btn icon-only" id="btn-clear-console" title="清空">🗑️</button>
						<button class="ctrl-btn icon-only" id="btn-download-console" title="下载日志">💾</button>
						<div class="console-filter-menu" id="console-filter-menu">
							<div class="console-filter-header">
								<button class="console-filter-header-btn" id="btn-filter-all">全选</button>
								<button class="console-filter-header-btn" id="btn-filter-none">全不选</button>
							</div>
							<div class="console-filter-list" id="console-filter-list"></div>
						</div>
					</div>
					<div class="console-content" id="console-logs"></div>
				</div>

				<!-- 游戏区域（35%）-->
				<div id="game-area">
					<div id="game-info">
						POS: <span id="pos-display">0</span> | 
						GEN: <span id="gen-display">1</span>
					</div>
					<div id="status-text"></div>
					<div id="game-world"></div>

					<!-- 开始游戏遮罩 -->
					<div id="start-overlay" class="game-overlay">
						<div class="overlay-content">
							<h2>AI 神经元训练沙盘</h2>
							<button id="start-btn" class="start-button">开始游戏</button>
							<p class="overlay-hint">点击按钮开始挑战</p>
						</div>
					</div>
				</div>

				<!-- 神经元区域（35%，可收缩）-->
				<div id="neuron-area">
					<div id="neuron-placeholder">
						<div class="neuron-icon">🧠</div>
						<div>[ 神经元网络区域 ]</div>
						<div style="font-size: 12px; margin-top: 10px; opacity: 0.5;">等待 AI 接入控制...</div>
					</div>
				</div>

				<!-- 控制区域（20%，固定）-->
				<div id="control-area">
					<button class="btn" id="btn-right">
						▶
						<span class="btn-label">移动 (x+1)</span>
					</button>
					<button class="btn" id="btn-jump">
						⬆
						<span class="btn-label">跳跃 (x+2)</span>
					</button>
					<button class="btn" id="btn-long-jump">
						⤴
						<span class="btn-label">远跳 (x+3)</span>
					</button>
				</div>
			</div><!-- /#main-container -->
		</div>
	</div>

	<script type="module" src="/src/fox-jump/main.ts"></script>
</body>
</html>
