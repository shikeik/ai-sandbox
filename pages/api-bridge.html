<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>🌉 API Bridge 测试</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
			background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
			min-height: 100vh;
			padding: 20px;
			color: #eaeaea;
		}

		.container {
			max-width: 900px;
			margin: 0 auto;
		}

		h1 {
			text-align: center;
			margin-bottom: 10px;
			font-size: 28px;
			background: linear-gradient(90deg, #00d4ff, #7b2cbf);
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.subtitle {
			text-align: center;
			color: #888;
			font-size: 14px;
			margin-bottom: 20px;
		}

		/* 游戏区域 */
		.game-board {
			background: rgba(0, 0, 0, 0.5);
			border-radius: 16px;
			padding: 20px;
			margin-bottom: 20px;
			border: 1px solid rgba(255, 255, 255, 0.1);
		}

		.board-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 15px;
			padding-bottom: 15px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
		}

		.status {
			display: flex;
			gap: 20px;
			font-size: 14px;
		}

		.status-item {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.status-label {
			color: #888;
		}

		.status-value {
			color: #00d4ff;
			font-weight: bold;
		}

		/* 地图网格 */
		.grid-container {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 4px;
			font-size: 32px;
			line-height: 1;
			padding: 20px;
			background: rgba(0, 0, 0, 0.3);
			border-radius: 12px;
		}

		.grid-row {
			display: flex;
			gap: 4px;
		}

		.cell {
			width: 48px;
			height: 48px;
			display: flex;
			align-items: center;
			justify-content: center;
			background: rgba(255, 255, 255, 0.05);
			border-radius: 8px;
			transition: all 0.2s;
		}

		.cell:hover {
			background: rgba(255, 255, 255, 0.1);
			transform: scale(1.05);
		}

		/* 列标签 */
		.col-labels {
			display: flex;
			gap: 4px;
			margin-bottom: 8px;
			padding-left: 0;
		}

		.col-label {
			width: 48px;
			text-align: center;
			font-size: 12px;
			color: #666;
		}

		/* 行标签 */
		.row-with-label {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.row-label {
			width: 40px;
			text-align: right;
			font-size: 12px;
			color: #666;
		}

		/* 控制区 */
		.controls {
			background: rgba(0, 0, 0, 0.5);
			border-radius: 16px;
			padding: 20px;
			margin-bottom: 20px;
			border: 1px solid rgba(255, 255, 255, 0.1);
		}

		.controls-title {
			font-size: 16px;
			margin-bottom: 15px;
			color: #aaa;
		}

		.btn-group {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
		}

		button {
			padding: 10px 20px;
			border: none;
			border-radius: 8px;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			font-family: inherit;
			font-size: 14px;
			cursor: pointer;
			transition: all 0.2s;
		}

		button:hover {
			transform: translateY(-2px);
			box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
		}

		button:active {
			transform: translateY(0);
		}

		button.secondary {
			background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
		}

		button.danger {
			background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
		}

		/* 日志区 */
		.logs {
			background: rgba(0, 0, 0, 0.5);
			border-radius: 16px;
			padding: 20px;
			border: 1px solid rgba(255, 255, 255, 0.1);
		}

		.logs-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 15px;
		}

		.logs-title {
			font-size: 16px;
			color: #aaa;
		}

		.log-container {
			background: rgba(0, 0, 0, 0.3);
			border-radius: 8px;
			padding: 15px;
			max-height: 300px;
			overflow-y: auto;
			font-size: 13px;
		}

		.log-entry {
			margin-bottom: 8px;
			padding: 8px 12px;
			border-radius: 6px;
			background: rgba(255, 255, 255, 0.03);
			display: flex;
			gap: 10px;
		}

		.log-entry:last-child {
			margin-bottom: 0;
		}

		.log-time {
			color: #666;
			flex-shrink: 0;
		}

		.log-incoming {
			border-left: 3px solid #00d4ff;
		}

		.log-outgoing {
			border-left: 3px solid #f39c12;
		}

		.log-action {
			border-left: 3px solid #2ecc71;
		}

		.log-error {
			border-left: 3px solid #e74c3c;
		}

		/* 说明卡片 */
		.info-card {
			background: rgba(0, 212, 255, 0.1);
			border: 1px solid rgba(0, 212, 255, 0.3);
			border-radius: 12px;
			padding: 15px;
			margin-bottom: 20px;
			font-size: 13px;
		}

		.info-card code {
			background: rgba(0, 0, 0, 0.3);
			padding: 2px 6px;
			border-radius: 4px;
			font-family: inherit;
		}

		/* 动画 */
		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.5; }
		}

		.connecting {
			animation: pulse 1.5s infinite;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>🌉 API Bridge 测试场</h1>
		<p class="subtitle">通过 HTTP API 控制浏览器中的游戏</p>

		<div class="info-card">
			<strong>💡 使用方法：</strong><br>
			1. 确保此页面保持打开<br>
			2. 在终端运行：<code>node scripts/api-bridge/kimi-cli.mjs 走</code><br>
			3. 或使用 curl：<code>curl -X POST http://localhost:4000/api/kimi?pretty -d '{"action":"走"}'</code>
		</div>

		<div class="info-card" style="background: rgba(255,193,7,0.1); border-color: rgba(255,193,7,0.3);">
			<strong>📖 游戏规则（通关秘籍）：</strong><br>
			<table id="rules-table" style="width:100%; margin-top:10px; font-size:13px; border-collapse:collapse;">
				<!-- 动态填充 -->
			</table>
			<p id="rules-hint" style="margin-top:10px; font-size:12px; color:#aaa;">
				<!-- 动态填充 -->
			</p>
		</div>

		<!-- 游戏面板 -->
		<div class="game-board">
			<div class="board-header">
				<div class="status">
					<div class="status-item">
						<span class="status-label">狐狸位置:</span>
						<span class="status-value" id="hero-pos">0 / 31</span>
					</div>
					<div class="status-item">
						<span class="status-label">步数:</span>
						<span class="status-value" id="step-count">0</span>
					</div>
					<div class="status-item">
						<span class="status-label">状态:</span>
						<span class="status-value" id="game-status">就绪</span>
					</div>
				</div>
			</div>

			<!-- 地图 -->
			<div class="grid-container" id="grid-container">
				<div class="col-labels" id="col-labels"></div>
				<div id="grid-content"></div>
			</div>
		</div>

		<!-- 控制区 -->
		<div class="controls">
			<div class="controls-title">🎮 手动控制</div>
			<div class="btn-group">
				<button onclick="game.executeAction('走')">走 (→1)</button>
				<button onclick="game.executeAction('跳')">跳 (→2)</button>
				<button onclick="game.executeAction('远跳')">远跳 (→3)</button>
				<button onclick="game.executeAction('走A')">走A (击杀)</button>
				<button class="secondary" onclick="game.reset()">重置地图</button>
				<button class="danger" onclick="logs.clear()">清空日志</button>
			</div>
		</div>

		<!-- 日志 -->
		<div class="logs">
			<div class="logs-header">
				<span class="logs-title">📡 通信日志</span>
				<span id="ws-status" class="connecting">🟡 连接中...</span>
			</div>
			<div class="log-container" id="log-container">
				<div class="log-entry">
					<span class="log-time">--:--:--</span>
					<span>等待 WebSocket 连接...</span>
				</div>
			</div>
		</div>
	</div>

	<script type="module">
		// ========== 加载统一规则 ==========
		const GAME_RULES = await fetch('../scripts/api-bridge/rules.json').then(r => r.json())
		
		// 规则工具函数
		const EMOJIS = { 0: '⬛', 1: '🦊', 2: '🟩', 3: '🦠', 4: '👿', 5: '🪙' }
		const ELEMENT_NAMES = { 0: '空气', 1: '狐狸', 2: '平地', 3: '史莱姆', 4: '恶魔', 5: '金币' }
		
		// ========== 游戏核心逻辑 ==========
		class SimpleGame {
			constructor() {
				this.mapLength = 32
				this.heroCol = 0
				this.steps = 0
				this.status = '就绪'
				this.viewportWidth = 5
				this.grid = []
				this.reset()
			}

			// 生成可通关的地图（action-based 生成）
			generateMap() {
				const ELEM_AIR = 0, ELEM_HERO = 1, ELEM_GROUND = 2, ELEM_SLIME = 3, ELEM_DEMON = 4, ELEM_COIN = 5
				
				// 初始化全空气地图
				this.grid = [
					Array(this.mapLength).fill(ELEM_AIR),  // 天空层
					Array(this.mapLength).fill(ELEM_AIR),  // 中层
					Array(this.mapLength).fill(ELEM_AIR)   // 地面层
				]
				
				// 起点
				this.grid[1][0] = ELEM_HERO
				this.grid[2][0] = ELEM_GROUND

				// 候选池
				const skyPool = [ELEM_AIR, ELEM_DEMON, ELEM_DEMON, ELEM_DEMON, ELEM_COIN]
				const midPool = [ELEM_AIR, ELEM_SLIME, ELEM_SLIME, ELEM_COIN]
				const pick = (pool, exclude = []) => {
					const available = pool.filter(e => !exclude.includes(e))
					return available[Math.floor(Math.random() * available.length)] || ELEM_AIR
				}

				// action-based 生成：从起点开始，一步步生成确保可通关
				let heroCol = 0
				while (heroCol < this.mapLength - 1) {
					// 随机选择动作
					const actions = [0, 1, 2] // 走, 跳, 远跳
					const action = actions[Math.floor(Math.random() * actions.length)]
					
					// 根据动作生成地形
					switch (action) {
						case 0: // 走（+1）
							if (heroCol + 1 >= this.mapLength) break
							this.grid[2][heroCol + 1] = ELEM_GROUND
							this.grid[0][heroCol + 1] = pick(skyPool)
							this.grid[1][heroCol + 1] = pick(midPool, [ELEM_SLIME])
							heroCol += 1
							break
							
						case 1: // 跳（+2）
							if (heroCol + 2 >= this.mapLength) {
								// 不够跳，改走
								this.grid[2][heroCol + 1] = ELEM_GROUND
								heroCol += 1
								break
							}
							this.grid[2][heroCol + 1] = ELEM_AIR // 坑
							this.grid[2][heroCol + 2] = ELEM_GROUND // 落点
							this.grid[0][heroCol + 1] = pick(skyPool, [ELEM_DEMON]) // x+1无恶魔
							this.grid[0][heroCol + 2] = pick(skyPool, [ELEM_DEMON]) // x+2无恶魔
							this.grid[1][heroCol + 1] = pick(midPool)
							this.grid[1][heroCol + 2] = pick(midPool, [ELEM_SLIME])
							heroCol += 2
							break
							
						case 2: // 远跳（+3）
							if (heroCol + 3 >= this.mapLength) {
								// 不够远跳，改走
								this.grid[2][heroCol + 1] = ELEM_GROUND
								heroCol += 1
								break
							}
							this.grid[2][heroCol + 1] = ELEM_AIR // 坑
							this.grid[2][heroCol + 2] = ELEM_AIR // 坑
							this.grid[2][heroCol + 3] = ELEM_GROUND // 落点
							this.grid[0][heroCol + 1] = pick(skyPool, [ELEM_DEMON])
							this.grid[0][heroCol + 2] = pick(skyPool, [ELEM_DEMON])
							this.grid[0][heroCol + 3] = pick(skyPool, [ELEM_DEMON])
							this.grid[1][heroCol + 1] = pick(midPool)
							this.grid[1][heroCol + 2] = pick(midPool)
							this.grid[1][heroCol + 3] = pick(midPool, [ELEM_SLIME])
							heroCol += 3
							break
					}
				}

				// 终点必须是平地
				this.grid[2][this.mapLength - 1] = ELEM_GROUND
				// 清除终点上的障碍
				this.grid[0][this.mapLength - 1] = ELEM_AIR
				this.grid[1][this.mapLength - 1] = ELEM_AIR
			}

			reset() {
				this.heroCol = 0
				this.steps = 0
				this.status = '就绪'
				this.generateMap()
				this.render()
				return this.getViewport()
			}

			// 执行动作（强制执行，不管合不合法）
			executeAction(action) {
				const ELEM_AIR = 0, ELEM_HERO = 1, ELEM_GROUND = 2, ELEM_SLIME = 3, ELEM_DEMON = 4, ELEM_COIN = 5
				const moveMap = { '走': 1, '跳': 2, '远跳': 3, '走A': 1 }
				const move = moveMap[action] || 1
				const targetCol = this.heroCol + move

				let death = false
				let deathReason = null
				let killedSlime = false

				// 边界检查 → 死亡
				if (targetCol >= this.mapLength) {
					death = true
					deathReason = '飞出地图边界'
				}
				// 路径检查（跳/远跳时遇到恶魔）→ 死亡
				else if ((action === '跳' || action === '远跳') && !death) {
					for (let i = 1; i < move; i++) {
						if (this.grid[0][this.heroCol + i] === ELEM_DEMON) {
							death = true
							deathReason = '撞到恶魔！'
							break
						}
					}
				}

				// 走A 检查
				if (action === '走A' && !death) {
					if (this.grid[1][targetCol] === ELEM_SLIME) {
						this.grid[1][targetCol] = ELEM_AIR
						killedSlime = true
					}
					// 走A 没有史莱姆也继续前进（只是没击杀）
				}

				// 落地检查 → 死亡
				if (!death && this.grid[2][targetCol] !== ELEM_GROUND) {
					death = true
					deathReason = '掉进坑里了！'
				}

				// 强制执行移动
				this.grid[1][this.heroCol] = ELEM_AIR
				this.heroCol = Math.min(targetCol, this.mapLength - 1)
				this.grid[1][this.heroCol] = ELEM_HERO
				this.steps++

				// 更新状态
				if (death) {
					this.status = '💀 游戏结束: ' + deathReason
				} else if (this.heroCol >= this.mapLength - 1) {
					this.status = '🎉 胜利！'
				} else {
					this.status = '进行中'
				}

				this.render()
				return { 
					success: !death, 
					death,
					deathReason,
					killedSlime
				}
			}

			// 获取视野
			getViewport() {
				const startCol = Math.max(0, this.heroCol - 1)
				const viewport = []
				
				for (let row = 0; row < 3; row++) {
					const viewportRow = []
					for (let i = 0; i < this.viewportWidth; i++) {
						const col = startCol + i
						if (col < this.mapLength) {
							viewportRow.push(this.grid[row][col])
						} else {
							viewportRow.push(0)
						}
					}
					viewport.push(viewportRow)
				}

				return {
					grid: viewport,
					heroPos: { col: this.heroCol - startCol, row: 1 },
					heroWorldCol: this.heroCol,
					steps: this.steps,
					status: this.status
				}
			}

			// 渲染到页面
			render() {
				const vp = this.getViewport()

				// 列标签 - 显示相对狐狸的位置 [-1, 0, +1, +2, +3]
				const colLabels = ['-1', '▼', '+1', '+2', '+3']
				const labels = colLabels.map(l => `<div class="col-label">${l}</div>`).join('')
				document.getElementById('col-labels').innerHTML = labels

				// 网格 - 层信息硬编码（rules.json 是数组格式）
				const layerNames = ['天空层', '中层', '地面层']
				const layerChecks = ['跳/远跳检查恶魔', '走A检查史莱姆', '所有动作检查平地']
				let html = ''
				for (let row = 0; row < 3; row++) {
					html += `<div class="row-with-label">`
					html += `<div class="row-label" style="font-size:11px; color:#888; width:100px;">${layerNames[row]}<br><span style="font-size:9px;">${layerChecks[row]}</span></div>`
					html += `<div class="grid-row">`
					for (let col = 0; col < 5; col++) {
						const cell = vp.grid[row][col]
						const isHero = cell === 1
						const highlight = isHero ? 'background:rgba(255,193,7,0.3); border:1px solid #ffc107;' : ''
						html += `<div class="cell" style="${highlight}">${EMOJIS[cell]}</div>`
					}
					html += `</div></div>`
				}
				document.getElementById('grid-content').innerHTML = html

				// 状态
				document.getElementById('hero-pos').textContent = `${this.heroCol} / ${this.mapLength - 1}`
				document.getElementById('step-count').textContent = this.steps
				document.getElementById('game-status').textContent = this.status
			}
		}

		// ========== 日志系统 ==========
		class LogManager {
			constructor() {
				this.container = document.getElementById('log-container')
			}

			add(message, type = 'info') {
				const time = new Date().toLocaleTimeString('zh-CN', { hour12: false })
				const entry = document.createElement('div')
				entry.className = `log-entry log-${type}`
				entry.innerHTML = `<span class="log-time">${time}</span><span>${message}</span>`
				this.container.appendChild(entry)
				this.container.scrollTop = this.container.scrollHeight
			}

			clear() {
				this.container.innerHTML = ''
			}
		}

		// ========== 初始化 ==========
		const game = new SimpleGame()
		const logs = new LogManager()
		window.game = game
		window.logs = logs

		// 渲染初始地图
		game.render()

		// 渲染规则表格（从 rules.json）
		function renderRulesTable() {
			const { actions, hint } = GAME_RULES
			const table = document.getElementById('rules-table')
			
			let html = `<tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
				<td style="padding:8px 0;"><strong>动作</strong></td>
				<td style="padding:8px 0;"><strong>检查条件</strong></td>
			</tr>`
			
			const actionIcons = { '走': '🚶', '跳': '🦘', '远跳': '🚀', '走A': '⚔️' }
			
			Object.entries(actions).forEach(([name, action], idx) => {
				const isLast = idx === Object.keys(actions).length - 1
				const border = isLast ? '' : 'border-bottom:1px solid rgba(255,255,255,0.05);'
				html += `<tr style="${border}">
					<td style="padding:6px 0;">${actionIcons[name]} ${name} (+${action.move})</td>
					<td style="padding:6px 0; font-size:12px;">${action.check}</td>
				</tr>`
			})
			
			table.innerHTML = html
			document.getElementById('rules-hint').innerHTML = `💡 <strong>提示：</strong>${hint}`
		}
		renderRulesTable()

		// ========== WebSocket / HMR 通信 ==========
		if (import.meta.hot) {
			logs.add('✅ HMR WebSocket 已连接', 'action')
			document.getElementById('ws-status').textContent = '🟢 已连接'
			document.getElementById('ws-status').classList.remove('connecting')

			// 接收 API 请求
			import.meta.hot.on('api-request', async (data) => {
				logs.add(`📥 请求 #${data.id}: ${JSON.stringify(data.body)}`, 'incoming')

				let { action } = data.body
				
				// 支持数字ID：0=走, 1=跳, 2=远跳, 3=走A
				const actionIdMap = { 0: '走', 1: '跳', 2: '远跳', 3: '走A' }
				if (typeof action === 'number' || /^[0-3]$/.test(action)) {
					action = actionIdMap[parseInt(action)] || action
				}
				
				let result

				if (action === 'reset') {
					result = game.reset()
					result.success = true
				} else if (['走', '跳', '远跳', '走A'].includes(action)) {
					const actionResult = game.executeAction(action)
					result = { ...actionResult, viewport: game.getViewport() }
				} else if (action === 'viewport') {
					result = { success: true, viewport: game.getViewport() }
				} else {
					result = { success: false, error: '未知动作: ' + action }
				}

				result.timestamp = Date.now()

				// 返回响应
				import.meta.hot.send('api-response', {
					id: data.id,
					result
				})
				logs.add(`📤 响应 #${data.id}: success=${result.success}`, 'outgoing')
			})
		} else {
			logs.add('❌ HMR 不可用，API Bridge 无法工作', 'error')
			document.getElementById('ws-status').textContent = '🔴 未连接'
		}
	</script>
</body>
</html>
