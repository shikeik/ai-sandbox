<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>Fox Remake</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%;
			height: 100%;
			background: #000;
			overflow: hidden;
		}

		/* ---------- EPS 核心：恒竖布局 ---------- */
		.ever-portrait {
			position: absolute;
			top: 50%;
			left: 50%;
			width: var(--ep-avail-width, 100vw);
			height: var(--ep-avail-height, 100vh);
			transform: translate(-50%, -50%);
			overflow: hidden;
			background: #0b0c0f;
		}

		@media (orientation: landscape) {
			.ever-portrait.active {
				width: var(--ep-avail-height, 100vh);
				height: var(--ep-avail-width, 100vw);
				transform: translate(-50%, -50%) rotate(-90deg);
			}
		}

		/* ---------- 顶部工具栏 ---------- */
		.top-toolbar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 12px 16px;
			background: #16181d;
			border-bottom: 1px solid #2c2f36;
			position: relative;
			z-index: 100;
		}
		.toolbar-left .logo {
			font-size: 16px;
			font-weight: 600;
			color: #e8eaed;
		}
		.toolbar-center {
			display: flex;
			gap: 8px;
		}
		.toolbar-right {
			display: flex;
			align-items: center;
			gap: 8px;
		}
		.ctrl-btn {
			width: 36px;
			height: 36px;
			border: 1px solid #3c4043;
			border-radius: 8px;
			background: #1f2227;
			color: #bdc1c6;
			font-size: 16px;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.2s;
		}
		.ctrl-btn:hover {
			background: #2c2f36;
			border-color: #5f6368;
		}
		.ctrl-btn.active {
			background: #34a853;
			border-color: #34a853;
			color: #fff;
		}
		.eps-status {
			font-size: 12px;
			color: #9aa0a6;
			min-width: 40px;
			text-align: right;
		}

		/* ---------- 主内容区 ---------- */
		#main-area {
			display: flex;
			align-items: center;
			justify-content: center;
			height: calc(100% - 61px);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
		}
		#app {
			font-size: 24px;
			padding: 40px;
			background: #16181d;
			border: 1px solid #2c2f36;
			border-radius: 16px;
			color: #e8eaed;
		}
	</style>
</head>
<body>
	<div class="ever-portrait active" id="ep-container">
		<div class="top-toolbar">
			<div class="toolbar-left">
				<span class="logo">🔄 Fox Remake</span>
			</div>
			<div class="toolbar-center">
				<button class="ctrl-btn" id="btn-toggle" title="恒竖切换">↻</button>
				<button class="ctrl-btn" id="btn-fullscreen" title="全屏">⛶</button>
			</div>
			<div class="toolbar-right">
				<div class="eps-status" id="eps-st">-</div>
			</div>
		</div>
		<div id="main-area">
			<div id="app">Fox Remake 空页面</div>
		</div>
	</div>
	<script type="module" src="/src/fox-remake/main.ts"></script>
</body>
</html>
