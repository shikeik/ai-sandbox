<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>Fox Remake</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		html, body {
			width: 100%;
			height: 100%;
			background: #000;
			overflow: hidden;
		}

		/* ---------- EPS 核心：恒竖布局 ---------- */
		.ever-portrait {
			position: absolute;
			top: 50%;
			left: 50%;
			width: var(--ep-avail-width, 100vw);
			height: var(--ep-avail-height, 100vh);
			transform: translate(-50%, -50%);
			overflow: hidden;
			background: #0b0c0f;
		}

		@media (orientation: landscape) {
			.ever-portrait.active {
				width: var(--ep-avail-height, 100vh);
				height: var(--ep-avail-width, 100vw);
				transform: translate(-50%, -50%) rotate(-90deg);
			}
		}

		/* ---------- 顶部工具栏 ---------- */
		.top-toolbar {
			display: flex;
			align-items: center;
			justify-content: flex-start;
			gap: 6px;
			padding: 8px 12px;
			background: #16181d;
			border-bottom: 1px solid #2c2f36;
			position: relative;
			z-index: 100;
		}
		.ctrl-btn {
			width: 28px;
			height: 28px;
			border: 1px solid #3c4043;
			border-radius: 6px;
			background: #1f2227;
			color: #bdc1c6;
			font-size: 12px;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: all 0.2s;
		}
		.ctrl-btn:hover {
			background: #2c2f36;
			border-color: #5f6368;
		}
		.ctrl-btn.active {
			background: #34a853;
			border-color: #34a853;
			color: #fff;
		}
		.toolbar-spacer {
			flex: 1;
		}

		/* ---------- 主内容区 ---------- */
		#main-area {
			display: flex;
			align-items: center;
			justify-content: center;
			height: calc(100% - 45px);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
			position: relative;
		}
		#app {
			font-size: 16px;
			padding: 24px;
			background: #16181d;
			border: 1px solid #2c2f36;
			border-radius: 12px;
			color: #e8eaed;
		}

		/* ---------- 悬浮命令行 ---------- */
		#command-line {
			position: absolute;
			bottom: 0;
			left: 0;
			right: 0;
			background: #16181d;
			border-top: 1px solid #2c2f36;
			padding: 8px 12px;
			z-index: 200;
			display: none;
			font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
		}
		#command-line.active {
			display: block;
		}
		.cmd-input-row {
			display: flex;
			align-items: center;
			gap: 8px;
			background: #0b0c0f;
			border: 1px solid #3c4043;
			border-radius: 6px;
			padding: 6px 10px;
		}
		.cmd-prompt {
			color: #34a853;
			font-size: 14px;
			font-weight: bold;
		}
		.cmd-input {
			flex: 1;
			background: transparent;
			border: none;
			outline: none;
			color: #e8eaed;
			font-size: 14px;
			font-family: inherit;
		}
		.cmd-input::placeholder {
			color: #5f6368;
		}
	</style>
</head>
<body>
	<div class="ever-portrait active" id="ep-container">
		<div class="top-toolbar">
			<button class="ctrl-btn" id="btn-toggle" title="恒竖切换">↻</button>
			<button class="ctrl-btn" id="btn-fullscreen" title="全屏">⛶</button>
			<div class="toolbar-spacer"></div>
			<button class="ctrl-btn" id="btn-menu" title="菜单">☰</button>
			<button class="ctrl-btn" id="btn-cmd" title="命令行">⌘</button>
		</div>

		<div id="main-area">
			<div id="app">Fox Remake 空页面</div>
		</div>

		<!-- 悬浮命令行 -->
		<div id="command-line">
			<div class="cmd-input-row">
				<span class="cmd-prompt">></span>
				<input type="text" class="cmd-input" id="cmd-input" placeholder="输入命令..." autocomplete="off">
			</div>
		</div>
	</div>
	<script type="module" src="/src/fox-remake/main.ts"></script>
</body>
</html>
