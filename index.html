<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="mobile-web-app-capable" content="yes">
	<title>AI 神经元训练沙盘</title>
</head>
<body>
	<div class="ever-portrait active" id="ep-container">
		<div id="app">
			<!-- 控制栏 -->
			<div class="control-bar">
				<button class="ctrl-btn" id="btn-toggle">↻ 恒竖</button>
				<button class="ctrl-btn" id="btn-fullscreen">⛶ 全屏</button>
				<div class="eps-status" id="eps-st">-</div>
				<div id="neuron-menu-container"></div>
			</div>

			<!-- 游戏主容器：三区域在此容器内分配比例 -->
			<div id="game-container">

				<!-- 游戏区域 -->
				<div id="game-area">
					<div id="game-info">
						POS: <span id="pos-display">0</span> | 
						GEN: <span id="gen-display">1</span>
					</div>
					<div id="status-text"></div>
					<div id="game-world"></div>

					<!-- 开始游戏遮罩 -->
					<div id="start-overlay" class="game-overlay">
						<div class="overlay-content">
							<h2>AI 神经元训练沙盘</h2>
							<button id="start-btn" class="start-button">开始游戏</button>
							<p class="overlay-hint">点击按钮开始挑战</p>
						</div>
					</div>
				</div>

				<!-- 神经元区域 -->
				<div id="neuron-area">
					<div id="neuron-placeholder">
						<div class="neuron-icon">🧠</div>
						<div>[ 神经元网络区域 ]</div>
						<div style="font-size: 12px; margin-top: 10px; opacity: 0.5;">等待 AI 接入控制...</div>
					</div>
				</div>

				<!-- 控制区域 -->
				<div id="control-area">
					<button class="btn" id="btn-right">
						▶
						<span class="btn-label">移动 (x+1)</span>
					</button>
					<button class="btn" id="btn-jump">
						⬆
						<span class="btn-label">跳跃 (x+2)</span>
					</button>
				</div>

			</div><!-- /#game-container -->
		</div>
	</div>

	<script type="module" src="/src/main.js"></script>
</body>
</html>
