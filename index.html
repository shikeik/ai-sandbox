<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>AI 神经元训练沙盘</title>
</head>
<body>
  <!-- 游戏区域 -->
  <div id="game-area">
    <div id="game-info">
      POS: <span id="pos-display">0</span> | 
      GEN: <span id="gen-display">1</span>
    </div>
    <div id="status-text"></div>
    <div id="game-world"></div>
  </div>
  
  <!-- 神经元区域 -->
  <div id="neuron-area">
    <div id="neuron-placeholder">
      <div class="neuron-icon">🧠</div>
      <div>[ 神经元网络区域 ]</div>
      <div style="font-size: 12px; margin-top: 10px; opacity: 0.5;">等待 AI 接入控制...</div>
    </div>
  </div>
  
  <!-- 控制区域 -->
  <div id="control-area">
    <button class="btn" id="btn-right">
      ▶
      <span class="btn-label">移动 (x+1)</span>
    </button>
    <button class="btn" id="btn-jump">
      ⬆
      <span class="btn-label">跳跃 (x+2)</span>
    </button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
