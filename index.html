<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AI 神经元训练沙盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            color: #eee;
            font-family: 'Courier New', monospace;
            height: 100dvh;  /* 动态视口高度，排除工具栏 */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-bottom: env(safe-area-inset-bottom);  /* 安全区域 */
        }
        
        /* ========== 游戏区 ========== */
        #game-area {
            flex: 0 0 50%;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid #333;
        }
        
        #game-world {
            position: absolute;
            height: 100%;
            transform-origin: left center;
            will-change: transform;
        }
        
        /* 世界格子线 - 淡淡的 */
        .world-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        .grid-vline {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255, 255, 255, 0.08);
        }
        
        .grid-label {
            position: absolute;
            top: 10px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.25);
            transform: translateX(-50%);
            font-family: monospace;
        }
        
        /* 地面 */
        .ground {
            position: absolute;
            bottom: 0;
            height: 80px;
            background: linear-gradient(180deg, #4a3728 0%, #2d1f16 50%, #1a120c 100%);
            border-top: 4px solid #5a4738;
        }
        
        /* 坑 */
        .pit-zone {
            position: absolute;
            bottom: 0;
            width: 100px;
            height: 20px;
            background: #000;
        }
        
        .pit-zone::after {
            content: '▼▼▼';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: #222;
            letter-spacing: 2px;
        }
        
        /* 终点 */
        .goal {
            position: absolute;
            bottom: 80px;
            width: 60px;
            height: 100px;
        }
        
        .goal-pole {
            position: absolute;
            left: 10px;
            bottom: 0;
            width: 4px;
            height: 100px;
            background: linear-gradient(90deg, #666 0%, #ddd 50%, #666 100%);
        }
        
        .goal-flag {
            position: absolute;
            left: 14px;
            top: 10px;
            width: 40px;
            height: 30px;
            background: #27ae60;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
            animation: wave 2s ease-in-out infinite;
        }
        
        @keyframes wave {
            0%, 100% { transform: skewY(0deg); }
            50% { transform: skewY(5deg); }
        }
        
        /* 玩家 */
        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4a90d9 0%, #2d5aa0 100%);
            border: 2px solid #6ab0f9;
            border-radius: 6px;
            box-shadow: 0 0 20px rgba(74, 144, 217, 0.6);
            z-index: 100;
        }
        
        #player::before {
            content: '🤖';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        
        #player.falling {
            animation: falling 0.5s ease-in forwards;
        }
        
        @keyframes falling {
            to {
                transform: translateY(200px) rotate(180deg);
                opacity: 0;
            }
        }
        
        /* 游戏信息 */
        #game-info {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            z-index: 1000;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        
        /* 状态提示 */
        #status-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 30px currentColor;
            opacity: 0;
            pointer-events: none;
            z-index: 2000;
            transition: opacity 0.3s;
        }
        
        #status-text.show {
            opacity: 1;
        }
        
        #status-text.dead { color: #e74c3c; }
        #status-text.win { color: #27ae60; }
        
        /* ========== 神经元区 ========== */
        #neuron-area {
            flex: 1;
            background: #12121a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #333;
        }
        
        #neuron-placeholder {
            width: 90%;
            height: 85%;
            background: #0a0a10;
            border: 2px dashed #3a3a45;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 14px;
        }
        
        .neuron-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }
        
        /* ========== 操作区 ========== */
        #control-area {
            flex: 0 0 auto;
            min-height: 120px;
            background: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom, 0px));
        }
        
        .btn {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 50%;
            font-size: 36px;
            cursor: pointer;
            user-select: none;
            position: relative;
            transition: transform 0.05s;
        }
        
        .btn:active {
            transform: scale(0.92);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #btn-right {
            background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%);
            box-shadow: 0 8px 0 #166534, 0 10px 30px rgba(39, 174, 96, 0.4);
            color: white;
        }
        
        #btn-right:active:not(:disabled) {
            box-shadow: 0 4px 0 #166534, 0 5px 15px rgba(39, 174, 96, 0.4);
            transform: translateY(4px) scale(0.92);
        }
        
        #btn-jump {
            background: linear-gradient(135deg, #f39c12 0%, #d68910 100%);
            box-shadow: 0 8px 0 #9c5710, 0 10px 30px rgba(243, 156, 18, 0.4);
            color: white;
        }
        
        #btn-jump:active:not(:disabled) {
            box-shadow: 0 4px 0 #9c5710, 0 5px 15px rgba(243, 156, 18, 0.4);
            transform: translateY(4px) scale(0.92);
        }
        
        .btn-label {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #888;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <!-- 游戏区 -->
    <div id="game-area">
        <div id="game-info">
            POS: <span id="pos-display">0</span> | 
            GEN: <span id="gen-display">1</span>
        </div>
        <div id="status-text"></div>
        
        <div id="game-world">
            <!-- 动态生成 -->
        </div>
    </div>
    
    <!-- 神经元区 -->
    <div id="neuron-area">
        <div id="neuron-placeholder">
            <div class="neuron-icon">🧠</div>
            <div>[ 神经元网络区域 ]</div>
            <div style="font-size: 12px; margin-top: 10px; opacity: 0.5;">等待 AI 接入控制...</div>
        </div>
    </div>
    
    <!-- 操作区 -->
    <div id="control-area">
        <button class="btn" id="btn-right">
            ▶
            <span class="btn-label">移动 (x+1)</span>
        </button>
        <button class="btn" id="btn-jump">
            ⬆
            <span class="btn-label">跳跃 (x+2)</span>
        </button>
    </div>

    <script>
        // ========== 配置 ==========
        const CONFIG = {
            WORLD_LENGTH: 32,
            GRID_SIZE: 100,
            GROUND_HEIGHT: 80,
            JUMP_HEIGHT: 100,
            MOVE_DURATION: 400,
            JUMP_DURATION: 600,
            VIEWPORT_WIDTH: 0,
            CAMERA_OFFSET: 0.3
        };
        
        CONFIG.VIEWPORT_WIDTH = document.getElementById('game-area').clientWidth;
        
        // ========== 状态 ==========
        let world = [];
        let player = { x: 50, y: 80, state: 'idle' };
        let camera = { x: 0 };
        let generation = 1;
        let isProcessing = false;
        
        // ========== 初始化 ==========
        function initWorld() {
            const container = document.getElementById('game-world');
            container.innerHTML = '';
            world = [];
            
            // 格子线和编号
            const gridOverlay = document.createElement('div');
            gridOverlay.className = 'world-grid';
            for (let i = 0; i <= CONFIG.WORLD_LENGTH; i++) {
                const x = i * CONFIG.GRID_SIZE;
                const line = document.createElement('div');
                line.className = 'grid-vline';
                line.style.left = x + 'px';
                gridOverlay.appendChild(line);
                
                if (i % 5 === 0) {
                    const label = document.createElement('div');
                    label.className = 'grid-label';
                    label.style.left = x + 'px';
                    label.textContent = i;
                    gridOverlay.appendChild(label);
                }
            }
            container.appendChild(gridOverlay);
            
            // 生成地形（确保没有连续坑，玩家跳+走能通过）
            let currentX = 0;
            let lastWasPit = false;
            
            // 起点（强制平地）
            createGround(0, 2);
            currentX = 2;
            
            while (currentX < CONFIG.WORLD_LENGTH - 2) {
                if (lastWasPit) {
                    // 上一个必须是坑，这次必须是地面（至少1格）
                    const len = 1 + Math.floor(Math.random() * 2);
                    createGround(currentX, len);
                    currentX += len;
                    lastWasPit = false;
                } else {
                    // 上一个不是坑，可以随机
                    if (Math.random() < 0.6) {
                        const len = 1 + Math.floor(Math.random() * 2);
                        createGround(currentX, len);
                        currentX += len;
                        lastWasPit = false;
                    } else {
                        createPit(currentX);
                        currentX += 1;
                        lastWasPit = true;
                    }
                }
            }
            
            // 终点前强制平地
            createGround(currentX, 2);
            createGoal(CONFIG.WORLD_LENGTH - 1);
            
            resetPlayer();
        }
        
        function createGround(startGrid, length) {
            const el = document.createElement('div');
            el.className = 'ground';
            el.style.left = (startGrid * CONFIG.GRID_SIZE) + 'px';
            el.style.width = (length * CONFIG.GRID_SIZE) + 'px';
            document.getElementById('game-world').appendChild(el);
            
            world.push({
                type: 'ground',
                start: startGrid * CONFIG.GRID_SIZE,
                end: (startGrid + length) * CONFIG.GRID_SIZE
            });
        }
        
        function createPit(gridIndex) {
            const el = document.createElement('div');
            el.className = 'pit-zone';
            el.style.left = (gridIndex * CONFIG.GRID_SIZE) + 'px';
            document.getElementById('game-world').appendChild(el);
            
            world.push({
                type: 'pit',
                start: gridIndex * CONFIG.GRID_SIZE,
                end: (gridIndex + 1) * CONFIG.GRID_SIZE
            });
        }
        
        function createGoal(gridIndex) {
            const el = document.createElement('div');
            el.className = 'goal';
            el.style.left = (gridIndex * CONFIG.GRID_SIZE) + 'px';
            el.innerHTML = '<div class="goal-pole"></div><div class="goal-flag"></div>';
            document.getElementById('game-world').appendChild(el);
        }
        
        function resetPlayer() {
            player.x = CONFIG.GRID_SIZE * 0.5 - 20;
            player.y = CONFIG.GROUND_HEIGHT;
            player.state = 'idle';
            isProcessing = false;
            
            let el = document.getElementById('player');
            if (!el) {
                el = document.createElement('div');
                el.id = 'player';
                document.getElementById('game-world').appendChild(el);
            }
            el.className = '';
            
            updatePlayer();
            updateCamera();
        }
        
        function updatePlayer() {
            const el = document.getElementById('player');
            el.style.left = player.x + 'px';
            el.style.bottom = player.y + 'px';
        }
        
        function updateCamera() {
            const targetX = player.x - CONFIG.VIEWPORT_WIDTH * CONFIG.CAMERA_OFFSET;
            const maxX = (CONFIG.WORLD_LENGTH * CONFIG.GRID_SIZE) - CONFIG.VIEWPORT_WIDTH;
            camera.x = Math.max(0, Math.min(targetX, maxX));
            
            document.getElementById('game-world').style.transform = `translateX(${-camera.x}px)`;
            document.getElementById('pos-display').textContent = Math.floor(player.x / CONFIG.GRID_SIZE);
            document.getElementById('gen-display').textContent = generation;
        }
        
        // ========== 碰撞检测 ==========
        function checkGround(x) {
            for (const seg of world) {
                if (seg.type === 'ground' && x >= seg.start && x < seg.end) return true;
            }
            return false;
        }
        
        function isInPit(x) {
            for (const seg of world) {
                if (seg.type === 'pit' && x >= seg.start && x < seg.end) return true;
            }
            return false;
        }
        
        // ========== 动作 ==========
        function execute(action) {
            if (isProcessing || player.state === 'dead') return;
            isProcessing = true;
            
            if (action === 'right') {
                const targetX = player.x + CONFIG.GRID_SIZE;
                animateMove(targetX, CONFIG.GROUND_HEIGHT, false);
            } else if (action === 'jump') {
                const targetX = player.x + CONFIG.GRID_SIZE * 2;
                animateMove(targetX, CONFIG.GROUND_HEIGHT, true);
            }
        }
        
        function animateMove(targetX, targetY, isJump) {
            const startX = player.x;
            const startY = player.y;
            const duration = isJump ? CONFIG.JUMP_DURATION : CONFIG.MOVE_DURATION;
            const startTime = performance.now();
            
            function animate(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                const t = ease(progress);
                
                player.x = startX + (targetX - startX) * t;
                
                if (isJump) {
                    const height = Math.sin(progress * Math.PI) * CONFIG.JUMP_HEIGHT;
                    player.y = startY + height;
                } else {
                    player.y = startY + (targetY - startY) * t;
                }
                
                // 移动中检测踩空
                if (!isJump && !checkGround(player.x)) {
                    die();
                    return;
                }
                
                updatePlayer();
                updateCamera();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // 结束检测
                    player.y = CONFIG.GROUND_HEIGHT;
                    
                    if (isInPit(player.x)) {
                        die();
                    } else if (Math.floor(player.x / CONFIG.GRID_SIZE) >= CONFIG.WORLD_LENGTH - 1) {
                        win();
                    } else {
                        player.state = 'idle';
                        isProcessing = false;
                    }
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        function die() {
            player.state = 'dead';
            document.getElementById('player').classList.add('falling');
            showStatus('💀', 'dead');
            setTimeout(() => {
                generation++;
                initWorld();
            }, 1500);
        }
        
        function win() {
            showStatus('🏆', 'win');
            setTimeout(() => {
                generation++;
                initWorld();
            }, 1500);
        }
        
        function showStatus(emoji, type) {
            const el = document.getElementById('status-text');
            el.textContent = emoji;
            el.className = 'show ' + type;
            setTimeout(() => el.className = '', 1200);
        }
        
        // ========== 事件 ==========
        document.getElementById('btn-right').addEventListener('click', () => execute('right'));
        document.getElementById('btn-jump').addEventListener('click', () => execute('jump'));
        
        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            if (e.key === 'ArrowRight' || e.key === 'd') execute('right');
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') execute('jump');
        });
        
        window.addEventListener('resize', () => {
            CONFIG.VIEWPORT_WIDTH = document.getElementById('game-area').clientWidth;
            updateCamera();
        });
        
        // ========== 启动 ==========
        initWorld();
    </script>
</body>
</html>
