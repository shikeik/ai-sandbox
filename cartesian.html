<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>笛卡尔坐标系 - DOM实现</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		body {
			font-family: sans-serif;
			background: #1a1a2e;
			padding: 20px;
		}
		.container {
			max-width: 900px;
			margin: 0 auto;
		}
		h1 {
			color: #00d4ff;
			text-align: center;
			margin-bottom: 20px;
		}
		
		/* ========== 笛卡尔坐标系画布 ========== */
		.cartesian-canvas {
			position: relative;
			width: 100%;
			height: 600px;
			background: #0a0a0a;
			border: 2px solid #0f3460;
			border-radius: 8px;
			overflow: hidden;
		}
		
		/* 网格背景 */
		.cartesian-canvas::before {
			content: "";
			position: absolute;
			inset: 0;
			background-image: 
				linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
			background-size: 20px 20px;
			pointer-events: none;
		}
		
		/* 坐标轴 */
		.axis-x, .axis-y {
			position: absolute;
			background: #ff4444;
		}
		.axis-x {
			bottom: 0;
			left: 0;
			right: 0;
			height: 2px;
		}
		.axis-y {
			bottom: 0;
			left: 0;
			top: 0;
			width: 2px;
			background: #44ff44;
		}
		
		/* 三角形 */
		.triangle {
			position: absolute;
			width: 0;
			height: 0;
			border-style: solid;
		}
		
		/* 中心点标记 */
		.center-dot {
			position: absolute;
			width: 6px;
			height: 6px;
			background: #ffd700;
			border-radius: 50%;
			transform: translate(-50%, 50%);  /* 中心对齐 */
			z-index: 10;
		}
		
		/* 坐标标签 */
		.coord-label {
			position: absolute;
			color: #888;
			font-size: 12px;
			transform: translate(-50%, 50%);
		}
		
		/* 说明 */
		.info {
			margin-top: 15px;
			color: #888;
			font-size: 14px;
		}
		.code {
			background: #16213e;
			padding: 15px;
			border-radius: 8px;
			margin-top: 10px;
			font-family: monospace;
			font-size: 13px;
			color: #ce9178;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>📐 笛卡尔坐标系 (DOM实现)</h1>
		
		<div class="cartesian-canvas" id="canvas">
			<!-- 坐标轴 -->
			<div class="axis-x"></div>
			<div class="axis-y"></div>
		</div>
		
		<div class="info">
			<p>CSS的 <code>bottom</code> 就是 Y 坐标，<code>left</code> 就是 X 坐标</p>
			<p>原点 (0,0) 在左下角，Y 轴向上为正，无需任何转换！</p>
		</div>
		
		<div class="code">
// 创建等边三角形<br>
createTriangle(x, y, sideLength, color, parent)<br>
<br>
// 示例：在 (100, 100) 位置画一个边长为 100 的红色等边三角形<br>
createTriangle(100, 100, 100, "#e94560", canvas)
		</div>
	</div>

	<script>
		/**
		 * 在笛卡尔坐标系中创建等边三角形（尖朝上）
		 * @param {number} x - 三角形中心点 X 坐标
		 * @param {number} y - 三角形中心点 Y 坐标
		 * @param {number} sideLength - 边长
		 * @param {string} color - 颜色
		 * @param {HTMLElement} parent - 父容器
		 */
		function createTriangle(x, y, sideLength, color, parent) {
			// 等边三角形的高 = 边长 * √3 / 2
			const height = sideLength * Math.sqrt(3) / 2
			
			// 等边三角形的重心位置：
			// - 重心在高度方向的 1/3 处（从底边算起）
			// - 或者说，重心到顶点距离 = 2/3 * 高度
			// - 重心到底边距离 = 1/3 * 高度
			// 
			// 为了让重心对准 (x, y)，需要把三角形向上偏移 1/3 高度
			// 因为 clip-path(50% 0%, 0% 100%, 100% 100%) 的三角形
			// 重心在元素的 (50%, 1/3) 处
			
			// 创建三角形元素
			const triangle = document.createElement("div")
			triangle.className = "triangle"
			
			// 三角形元素的重心在 (50%, height/3) 处
			// 为了让这个点对准 (x, y)：
			// - X: translate(-50%) 把元素中心对准 x
			// - Y: 需要额外偏移，让 height/3 对准 y
			//   y = bottom + (height - height/3) = bottom + 2*height/3
			//   所以 bottom = y - 2*height/3
			const bottomOffset = y - (2 * height / 3)
			
			triangle.style.cssText = `
				left: ${x}px;
				bottom: ${bottomOffset}px;
				width: ${sideLength}px;
				height: ${height}px;
				background: ${color};
				clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
				transform: translateX(-50%);
			`
			
			parent.appendChild(triangle)
			
			return triangle
		}
		
		/**
		 * 在指定位置画一个点（标记中心）
		 */
		function createDot(x, y, parent, label = "") {
			const dot = document.createElement("div")
			dot.className = "center-dot"
			dot.style.left = x + "px"
			dot.style.bottom = y + "px"
			parent.appendChild(dot)
			
			if (label) {
				const labelEl = document.createElement("div")
				labelEl.className = "coord-label"
				labelEl.textContent = label
				labelEl.style.left = x + "px"
				labelEl.style.bottom = (y + 15) + "px"
				parent.appendChild(labelEl)
			}
			
			return dot
		}
		
		// ========== 演示 ==========
		const canvas = document.getElementById("canvas")
		
		// 在 (100, 100) 画一个等边三角形
		createTriangle(100, 100, 100, "#e94560", canvas)
		createDot(100, 100, canvas, "(100, 100)")
		
		// 再画几个不同大小和位置的
		createTriangle(300, 200, 80, "#00d4ff", canvas)
		createDot(300, 200, canvas, "(300, 200)")
		
		createTriangle(500, 150, 120, "#ffd700", canvas)
		createDot(500, 150, canvas, "(500, 150)")
		
		// 画一个大的在中心
		const centerX = canvas.offsetWidth / 2
		const centerY = canvas.offsetHeight / 2
		createTriangle(centerX, centerY, 150, "#44ff44", canvas)
		createDot(centerX, centerY, canvas, "中心")
	</script>
</body>
</html>
