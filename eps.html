<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>恒竖布局 - EPS底层API封装版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: monospace; }
        
        /* 物理层：唯一处理屏幕旋转的容器 */
        .ever-portrait { 
            position: absolute; 
            top: 50%; left: 50%; 
            width: 100vw; height: 100vh; 
            transform: translate(-50%, -50%); 
            overflow: hidden; 
            background: #111; 
        }
        
        @media (orientation: landscape) { 
            .ever-portrait.active { 
                width: 100vh; height: 100vw; 
                transform: translate(-50%, -50%) rotate(-90deg); 
            } 
        }
        
        /* 逻辑层：内部组件的参照系（左下原点） */
        .stage { 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; 
            background: #1a1a2e; color: #0f0; 
            position: relative;
        }
        
        .control-bar { 
            height: 40px; 
            background: #0f0f23; 
            border-bottom: 1px solid #0f0; 
            display: flex; align-items: center; 
            padding: 0 10px; gap: 10px; 
        }
        
        .ctrl-btn { 
            padding: 6px 12px; 
            background: #222; 
            border: 1px solid #0f0; 
            color: #0f0; 
            font-size: 12px; 
            cursor: pointer; 
        }
        
        .status { flex: 1; text-align: right; font-size: 11px; }
        
        .content { 
            flex: 1; 
            display: flex; 
            position: relative;
        }
        
        .sidebar { 
            width: 50px; 
            background: rgba(0,255,0,0.05); 
            border-right: 1px solid #0f03; 
            display: flex; flex-direction: column; 
            align-items: center; padding: 10px 0; 
        }
        
        .btn-icon { 
            width: 40px; height: 40px; 
            background: rgba(0,255,0,0.1); 
            border: 1px solid #0f03; 
            border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 20px; margin-bottom: 10px; cursor: pointer; 
        }
        
        .main { 
            flex: 1; 
            position: relative; 
            padding: 10px;
        }
        
        /* 组件：拖拽盒子 - 使用逻辑坐标系（左下原点） */
        .box { 
            position: absolute; 
            width: 60px; height: 60px; 
            background: rgba(255,0,0,0.8); 
            border: 2px solid #f00; 
            border-radius: 6px; 
            cursor: move; 
            user-select: none; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; font-size: 10px; 
            left: 20px; 
            bottom: 150px; 
            z-index: 10; 
        }
        
        .box.dragging { opacity: 0.7; }
        
        .info { 
            position: absolute; 
            top: 10px; right: 10px; 
            background: rgba(0,0,0,0.9); 
            border: 1px solid #0f0; 
            border-radius: 4px; 
            padding: 10px; 
            font-size: 10px; 
            min-width: 160px; 
            z-index: 20;
        }
        
        .row { display: flex; justify-content: space-between; margin: 3px 0; }
        .label { color: #666; }
        .val { color: #0f0; }
        
        .log { 
            position: absolute; 
            bottom: 10px; left: 60px; right: 10px; 
            height: 100px; 
            background: rgba(0,0,0,0.95); 
            border: 1px solid #0f0; 
            border-radius: 4px; 
            padding: 8px; 
            font-size: 10px; 
            overflow-y: auto; 
            z-index: 20;
        }
        
        .log-item { margin: 2px 0; }
        .t { color: #555; }
        .d { color: #fa0; }
        .v { color: #0f0; }
        .e { color: #f55; }
        
        #dl { display: none; }
        
        /* 三页卡片组件 - 完全使用逻辑坐标系 */
        .card-container {
            position: absolute;
            left: 50%;
            bottom: 50%;
            transform: translate(-50%, 50%);
            width: 280px;
            height: 180px;
            background: #0f0f23;
            border: 2px solid #0f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
            z-index: 15;
        }
        
        .card-track {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .card-page {
            width: 33.333%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card-page:nth-child(1) { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .card-page:nth-child(2) { background: linear-gradient(135deg, #16213e 0%, #0f3460 100%); }
        .card-page:nth-child(3) { background: linear-gradient(135deg, #0f3460 0%, #533483 100%); }
        
        .page-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px currentColor; }
        .page-desc { font-size: 12px; color: #aaa; text-align: center; line-height: 1.4; }
        .page-icon { font-size: 48px; margin-bottom: 10px; opacity: 0.8; }
        
        .card-indicators {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        
        .indicator {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: rgba(0,255,0,0.3);
            border: 1px solid #0f0;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .indicator.active {
            background: #0f0;
            box-shadow: 0 0 8px #0f0;
            transform: scale(1.2);
        }
        
        .gesture-hint {
            position: absolute;
            top: 8px; right: 8px;
            font-size: 10px;
            color: #666;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <a id="dl"></a>
    <div class="ever-portrait active" id="ep-container">
        <div class="stage">
            <div class="control-bar">
                <button class="ctrl-btn" onclick="EPS.toggle()">↻ 恒竖</button>
                <button class="ctrl-btn" onclick="EPS.fullscreen()">⛶ 全屏</button>
                <button class="ctrl-btn" onclick="EPS.exportLog()">导出</button>
                <div class="status" id="st">-</div>
            </div>
            <div class="content">
                <div class="sidebar">
                    <div class="btn-icon">🏠</div>
                    <div class="btn-icon">🔍</div>
                </div>
                <div class="main" id="main-area">
                    <div class="info">
                        <div class="row"><span class="label">逻辑坐标:</span><span class="val" id="lc">-</span></div>
                        <div class="row"><span class="label">物理坐标:</span><span class="val" id="pc">-</span></div>
                        <div class="row"><span class="label">卡片页:</span><span class="val" id="cp">1/3</span></div>
                        <div style="font-size:9px; color:#666; margin-top:5px;">开发者使用EPS底层API自由构建</div>
                    </div>
                    
                    <div class="card-container" id="card">
                        <div class="gesture-hint">👆 双指横滑</div>
                        <div class="card-track" id="track">
                            <div class="card-page">
                                <div class="page-icon">📊</div>
                                <div class="page-title" style="color: #4ade80;">数据概览</div>
                                <div class="page-desc">使用EPS.on()监听事件<br>双指右滑进入下一页</div>
                            </div>
                            <div class="card-page">
                                <div class="page-icon">⚡</div>
                                <div class="page-title" style="color: #60a5fa;">性能分析</div>
                                <div class="page-desc">接收逻辑坐标事件<br>当前第2页共3页</div>
                            </div>
                            <div class="card-page">
                                <div class="page-icon">🔮</div>
                                <div class="page-title" style="color: #c084fc;">预测模型</div>
                                <div class="page-desc">开发者零感知横竖屏<br>双指左滑返回</div>
                            </div>
                        </div>
                        <div class="card-indicators">
                            <div class="indicator active" data-index="0"></div>
                            <div class="indicator" data-index="1"></div>
                            <div class="indicator" data-index="2"></div>
                        </div>
                    </div>
                    
                    <div class="box" id="box">拖拽我</div>
                    <div class="log" id="log"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // EverPortrait System (EPS) - 底层API封装层
        // 职责：封装坐标转换，提供类原生DOM API，开发者自由构建上层
        // 原则：只封装基础能力，不封装业务逻辑
        // ============================================================
        const EPS = {
            _active: true,
            logs: [],
            
            // 查询接口
            isActive() { return this._active; },
            isLandscape() { return window.innerWidth > window.innerHeight; },
            
            // 获取逻辑画布尺寸
            getCanvasSize() {
                const w = window.innerWidth, h = window.innerHeight;
                if (!this._active || w < h) return { width: w, height: h };
                return { width: h, height: w };
            },
            
            // ==========================================================
            // 核心API 1: 坐标转换
            // ==========================================================
            transform: {
                screenToLogical(screenX, screenY) {
                    const eps = EPS;
                    const w = window.innerWidth, h = window.innerHeight;
                    if (!eps._active || w < h) {
                        return { x: screenX, y: h - screenY };
                    } else {
                        return { x: screenY, y: w - screenX };
                    }
                },
                
                logicalToScreen(logicalX, logicalY) {
                    const eps = EPS;
                    const w = window.innerWidth, h = window.innerHeight;
                    if (!eps._active || w < h) {
                        return { x: logicalX, y: h - logicalY };
                    } else {
                        return { x: w - logicalY, y: logicalX };
                    }
                },
                
                deltaScreenToLogical(screenDx, screenDy) {
                    const eps = EPS;
                    const w = window.innerWidth, h = window.innerHeight;
                    if (!eps._active || w < h) {
                        return { dx: screenDx, dy: -screenDy };
                    } else {
                        return { dx: -screenDy, dy: -screenDx };
                    }
                }
            },
            
            // ==========================================================
            // 核心API 2: 事件系统（类原生addEventListener）
            // ==========================================================
            on(element, eventType, handler, options = {}) {
                element.addEventListener(eventType, (nativeEvent) => {
                    const logicalEvent = this._wrapEvent(nativeEvent);
                    handler(logicalEvent);
                }, options);
            },
            
            once(element, eventType, handler, options = {}) {
                const wrapped = (logicalEvent) => {
                    handler(logicalEvent);
                    element.removeEventListener(eventType, wrapped);
                };
                this.on(element, eventType, wrapped, options);
            },
            
            _wrapEvent(nativeEvent) {
                const getTouches = () => {
                    if (nativeEvent.touches?.length > 0) {
                        return Array.from(nativeEvent.touches).map(t => ({
                            identifier: t.identifier,
                            screenX: t.clientX,
                            screenY: t.clientY,
                            logicalX: this.transform.screenToLogical(t.clientX, t.clientY).x,
                            logicalY: this.transform.screenToLogical(t.clientX, t.clientY).y,
                            pressure: t.force || 1
                        }));
                    }
                    if (nativeEvent.changedTouches?.length > 0) {
                        return Array.from(nativeEvent.changedTouches).map(t => ({
                            identifier: t.identifier,
                            screenX: t.clientX,
                            screenY: t.clientY,
                            logicalX: this.transform.screenToLogical(t.clientX, t.clientY).x,
                            logicalY: this.transform.screenToLogical(t.clientX, t.clientY).y,
                            pressure: t.force || 1
                        }));
                    }
                    return [{
                        identifier: 0,
                        screenX: nativeEvent.clientX,
                        screenY: nativeEvent.clientY,
                        logicalX: this.transform.screenToLogical(nativeEvent.clientX, nativeEvent.clientY).x,
                        logicalY: this.transform.screenToLogical(nativeEvent.clientX, nativeEvent.clientY).y,
                        pressure: 1
                    }];
                };
                
                const touches = getTouches();
                const primary = touches[0];
                
                return {
                    native: nativeEvent,
                    x: primary.logicalX,
                    y: primary.logicalY,
                    screenX: primary.screenX,
                    screenY: primary.screenY,
                    touches: touches,
                    touchCount: touches.length,
                    timeStamp: nativeEvent.timeStamp,
                    preventDefault: () => nativeEvent.preventDefault(),
                    stopPropagation: () => nativeEvent.stopPropagation(),
                    target: nativeEvent.target,
                    currentTarget: nativeEvent.currentTarget,
                    type: nativeEvent.type,
                    button: nativeEvent.button,
                    buttons: nativeEvent.buttons,
                    shiftKey: nativeEvent.shiftKey,
                    ctrlKey: nativeEvent.ctrlKey,
                    altKey: nativeEvent.altKey
                };
            },
            
            // ==========================================================
            // 核心API 3: DOM操作（逻辑坐标系）
            // ==========================================================
            dom: {
                getLogicalRect(element) {
                    const eps = EPS;
                    const rect = element.getBoundingClientRect();
                    const tl = eps.transform.screenToLogical(rect.left, rect.top);
                    const br = eps.transform.screenToLogical(rect.right, rect.bottom);
                    return {
                        x: Math.min(tl.x, br.x),
                        y: Math.min(tl.y, br.y),
                        width: Math.abs(br.x - tl.x),
                        height: Math.abs(br.y - tl.y),
                        left: Math.min(tl.x, br.x),
                        bottom: Math.min(tl.y, br.y),
                        right: Math.max(tl.x, br.x),
                        top: Math.max(tl.y, br.y)
                    };
                },
                
                setPosition(element, style) {
                    if ('x' in style) element.style.left = style.x + 'px';
                    if ('y' in style) element.style.bottom = style.y + 'px';
                    if ('left' in style) element.style.left = style.left + 'px';
                    if ('bottom' in style) element.style.bottom = style.bottom + 'px';
                    if ('width' in style) element.style.width = style.width + 'px';
                    if ('height' in style) element.style.height = style.height + 'px';
                },
                
                getPosition(element) {
                    return {
                        left: parseFloat(element.style.left) || 0,
                        bottom: parseFloat(element.style.bottom) || 0,
                        width: element.offsetWidth,
                        height: element.offsetHeight
                    };
                }
            },
            
            // ==========================================================
            // 日志与控制
            // ==========================================================
            log(msg, type = 'v') {
                const d = new Date();
                const t = d.toLocaleTimeString('zh-CN', { hour12: false });
                const logEl = document.getElementById('log');
                if (!logEl) return;
                const item = document.createElement('div');
                item.className = 'log-item';
                item.innerHTML = `<span class="t">${t}</span> <span class="${type}">${msg}</span>`;
                logEl.appendChild(item);
                logEl.scrollTop = logEl.scrollHeight;
                this.logs.push(`${t} ${msg}`);
                if (this.logs.length > 30) this.logs.shift();
            },
            
            updateStatus() {
                const st = document.getElementById('st');
                if (st) {
                    const mode = this.isLandscape() ? '横' : '竖';
                    st.textContent = `${mode}屏 | EPS:${this._active ? '开' : '关'}`;
                }
            },
            
            toggle() {
                this._active = !this._active;
                document.getElementById('ep-container').classList.toggle('active', this._active);
                this.updateStatus();
                this.log(`EPS ${this._active ? '开启' : '关闭'}`, 'd');
            },
            
            async fullscreen() {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                    if (screen.orientation?.lock) {
                        await screen.orientation.lock('landscape').catch(() => {});
                    }
                } else {
                    if (screen.orientation?.unlock) await screen.orientation.unlock();
                    await document.exitFullscreen();
                }
                this.updateStatus();
            },
            
            exportLog() {
                const blob = new Blob([this.logs.join('\n')], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.getElementById('dl');
                a.href = url;
                a.download = `eps-log-${Date.now()}.txt`;
                a.click();
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            },
            
            init() {
                window.addEventListener('resize', () => this.updateStatus());
                this.updateStatus();
                this.log('EPS底层API初始化完成', 'd');
                this.log('提供：on()事件、transform坐标、dom操作', 'v');
            }
        };
        
        // ============================================================
        // 应用层：开发者使用EPS底层API自由构建
        // ============================================================
        
        // ------------------ 示例1: 拖拽盒子 ------------------
        const box = document.getElementById('box');
        let boxState = {
            dragging: false,
            startLogicalX: 0,
            startLogicalY: 0,
            elemStartLeft: 0,
            elemStartBottom: 0
        };
        
        EPS.on(box, 'mousedown', (e) => {
            if (e.native.button !== 0) return;
            e.preventDefault();
            boxState.dragging = true;
            boxState.startLogicalX = e.x;
            boxState.startLogicalY = e.y;
            const pos = EPS.dom.getPosition(box);
            boxState.elemStartLeft = pos.left;
            boxState.elemStartBottom = pos.bottom;
            box.classList.add('dragging');
            EPS.log('Box拖拽开始', 't');
        });
        
        EPS.on(document, 'mousemove', (e) => {
            if (!boxState.dragging) return;
            const dx = e.x - boxState.startLogicalX;
            const dy = e.y - boxState.startLogicalY;
            EPS.dom.setPosition(box, {
                left: boxState.elemStartLeft + dx,
                bottom: boxState.elemStartBottom + dy
            });
            document.getElementById('lc').textContent = `(${e.x.toFixed(0)}, ${e.y.toFixed(0)})`;
            document.getElementById('pc').textContent = `(${e.screenX.toFixed(0)}, ${e.screenY.toFixed(0)})`;
        });
        
        EPS.on(document, 'mouseup', (e) => {
            if (!boxState.dragging) return;
            boxState.dragging = false;
            box.classList.remove('dragging');
            EPS.log('Box拖拽结束', 't');
        });
        
        // 触摸支持
        EPS.on(box, 'touchstart', (e) => {
            if (e.touchCount !== 1) return;
            e.preventDefault();
            boxState.dragging = true;
            boxState.startLogicalX = e.x;
            boxState.startLogicalY = e.y;
            const pos = EPS.dom.getPosition(box);
            boxState.elemStartLeft = pos.left;
            boxState.elemStartBottom = pos.bottom;
            box.classList.add('dragging');
            EPS.log('Box触摸拖拽开始', 't');
        });
        
        EPS.on(document, 'touchmove', (e) => {
            if (!boxState.dragging || e.touchCount !== 1) return;
            e.preventDefault();
            const dx = e.x - boxState.startLogicalX;
            const dy = e.y - boxState.startLogicalY;
            EPS.dom.setPosition(box, {
                left: boxState.elemStartLeft + dx,
                bottom: boxState.elemStartBottom + dy
            });
            document.getElementById('lc').textContent = `(${e.x.toFixed(0)}, ${e.y.toFixed(0)})`;
            document.getElementById('pc').textContent = `(${e.screenX.toFixed(0)}, ${e.screenY.toFixed(0)})`;
        });
        
        EPS.on(document, 'touchend', (e) => {
            if (!boxState.dragging) return;
            boxState.dragging = false;
            box.classList.remove('dragging');
            EPS.log('Box触摸拖拽结束', 't');
        });
        
        // ------------------ 示例2: 双指滑动卡片 ------------------
        const card = document.getElementById('card');
        const cardState = {
            currentPage: 0,
            totalPages: 3,
            twoFingerStart: null
        };
        
        function updateCardPage(index) {
            cardState.currentPage = Math.max(0, Math.min(index, cardState.totalPages - 1));
            document.getElementById('track').style.transform = 
                `translateX(-${cardState.currentPage * 33.333}%)`;
            document.querySelectorAll('.indicator').forEach((ind, i) => {
                ind.classList.toggle('active', i === cardState.currentPage);
            });
            document.getElementById('cp').textContent = `${cardState.currentPage + 1}/${cardState.totalPages}`;
            EPS.log(`卡片切至 ${cardState.currentPage + 1} 页`, 'd');
        }
        
        EPS.on(card, 'touchstart', (e) => {
            if (e.touchCount === 2) {
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                cardState.twoFingerStart = {
                    x: (t1.logicalX + t2.logicalX) / 2,
                    y: (t1.logicalY + t2.logicalY) / 2
                };
            }
        });
        
        EPS.on(card, 'touchmove', (e) => {
            if (e.touchCount === 2 && cardState.twoFingerStart) {
                const t1 = e.touches[0];
                const t2 = e.touches[1];
                const currentCenter = {
                    x: (t1.logicalX + t2.logicalX) / 2,
                    y: (t1.logicalY + t2.logicalY) / 2
                };
                
                const dx = currentCenter.x - cardState.twoFingerStart.x;
                const dy = currentCenter.y - cardState.twoFingerStart.y;
                
                if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) * 2) {
                    if (dx > 0 && cardState.currentPage > 0) {
                        updateCardPage(cardState.currentPage - 1);
                        cardState.twoFingerStart = null;
                    } else if (dx < 0 && cardState.currentPage < cardState.totalPages - 1) {
                        updateCardPage(cardState.currentPage + 1);
                        cardState.twoFingerStart = null;
                    }
                }
            }
        });
        
        EPS.on(card, 'touchend', (e) => {
            if (e.touchCount < 2) {
                cardState.twoFingerStart = null;
            }
        });
        
        document.querySelectorAll('.indicator').forEach((ind, i) => {
            ind.addEventListener('click', () => updateCardPage(i));
        });
        
        EPS.init();
    </script>
</body>
</html>
